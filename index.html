// ── Player Archetype ──────────────────────────────────────────────────────────
// Assigns an archetype label based on the player's skill rating profile.
// Archetypes are purely cosmetic/descriptive — they don't affect ratings.
function computeArchetype(posGroup, r) {
  const g = (k) => r[k] || 0;
  switch (posGroup) {
    case 'QB': {
      const mob = g('mobility'), pass = g('passRating'), acc = g('accuracy'), deep = g('deepBall');
      if (mob >= 82 && pass >= 78) return 'Dual Threat';
      if (mob >= 82) return 'Scrambler';
      if (deep >= 82 && acc >= 78) return 'Big Arm';
      if (acc >= 82 && pass >= 80) return 'Precision Passer';
      if (pass >= 78) return 'Pocket Passer';
      return 'Game Manager';
    }
    case 'RB': {
      const rush = g('rushing'), rec = g('receiving'), pwr = g('powerRunning');
      if (rec >= 78 && rush >= 75) return 'All-Purpose Back';
      if (rec >= 78) return 'Receiving Back';
      if (pwr >= 82) return 'Power Back';
      if (rush >= 80) return 'Speed Back';
      return 'Backup Back';
    }
    case 'FB': return 'Fullback';
    case 'WR': {
      const rec = g('receiving'), rte = g('routeRunning'), yac = g('yac');
      if (yac >= 82 && rec >= 78) return 'YAC Monster';
      if (rte >= 82 && rec >= 78) return 'Route Runner';
      if (rec >= 82) return 'No. 1 Receiver';
      if (rte >= 75) return 'Slot Receiver';
      return 'Role Player';
    }
    case 'TE': {
      const rec = g('receiving'), blk = g('blocking'), rte = g('routeRunning');
      if (rec >= 78 && blk >= 72) return 'Complete TE';
      if (rec >= 78) return 'Pass Catcher';
      if (blk >= 78) return 'Blocking TE';
      return 'H-Back';
    }
    case 'OL': {
      const rb = g('runBlock'), pb = g('passBlock');
      if (rb >= 80 && pb >= 80) return 'Complete Lineman';
      if (pb >= rb + 5) return 'Pass Blocker';
      if (rb >= pb + 5) return 'Run Blocker';
      return 'Lineman';
    }
    case 'DL': {
      const pr = g('passRush'), rs = g('runStop');
      if (pr >= 80 && rs >= 78) return 'Complete D-Lineman';
      if (pr >= 80) return 'Pass Rusher';
      if (rs >= 80) return 'Run Stuffer';
      return 'Rotational';
    }
    case 'LB': {
      const cov = g('coverage'), rs = g('runStop'), pr = g('passRush');
      if (pr >= 78 && cov >= 72) return 'Hybrid LB';
      if (pr >= 80) return 'Edge Rusher';
      if (cov >= 80) return 'Coverage LB';
      if (rs >= 80) return 'Run Stopper';
      return 'Linebacker';
    }
    case 'DB': {
      const cov = g('coverage'), hawk = g('ballHawking'), tkl = g('tackling');
      if (hawk >= 82 && cov >= 78) return 'Ball Hawk';
      if (tkl >= 82) return 'Hit Man';
      if (cov >= 80) return 'Shutdown Corner';
      return 'Cover DB';
    }
    case 'K': {
      const pwr = g('power'), acc = g('accuracy');
      if (pwr >= 82) return 'Big Leg';
      if (acc >= 82) return 'Reliable Kicker';
      return 'Kicker';
    }
    case 'P': return g('placement') >= 80 ? 'Coffin Corner Punter' : 'Punter';
    default: return '';
  }
}

// buildDepthPositions: generates the depth chart section config dynamically based on
// what specific positions are actually present on a given team's roster.
// Falls back to generic group labels when only generic positions exist (e.g., "DL" not "DE"/"DT").
function buildDepthPositions(teamPlayers) {
  const hasAny = (group, posList) => {
    const s = new Set(teamPlayers.filter(p => p.positionGroup === group).map(p => p.position));
    return posList ? posList.some(pos => s.has(pos)) : s.size > 0;
  };

  const sections = [
    { group:'QB', label:'Quarterbacks',   slots:3 },
    { group:'RB', label:'Running Backs',  slots:4 },
    { group:'FB', label:'Fullbacks',      slots:2 },
    { group:'WR', label:'Wide Receivers', slots:5 },
    { group:'TE', label:'Tight Ends',     slots:3 },
  ];

  // OL excluded — no reliable individual stats available

  // ── Defensive Line: split edge vs interior if available ────────────────
  const hasEdge     = hasAny('DL', ['DE','EDGE']);
  const hasInterior = hasAny('DL', ['DT','NT']);
  if (hasEdge || hasInterior) {
    const usedDL = [];
    if (hasEdge)     { sections.push({ group:'DL', label:'Edge Rushers',      slots:4, positions:['DE','EDGE'] }); usedDL.push('DE','EDGE'); }
    if (hasInterior) { sections.push({ group:'DL', label:'Interior DL',       slots:3, positions:['DT','NT'] });   usedDL.push('DT','NT'); }
    // Catch-all for generic 'DL' players not matched above
    const remainDL = [...new Set(teamPlayers.filter(p => p.positionGroup === 'DL' && !usedDL.includes(p.position)).map(p => p.position))];
    if (remainDL.length) sections.push({ group:'DL', label:'Defensive Linemen', slots:5, positions: remainDL });
  } else {
    sections.push({ group:'DL', label:'Defensive Line', slots:7 });
  }

  // ── Linebackers: split MLB/ILB vs OLB if available ────────────────────
  const hasOLB = hasAny('LB', ['OLB']);
  const hasMLB = hasAny('LB', ['MLB','ILB']);
  if (hasOLB || hasMLB) {
    const usedLB = [];
    if (hasOLB) { sections.push({ group:'LB', label:'Outside Linebackers', slots:3, positions:['OLB'] }); usedLB.push('OLB'); }
    if (hasMLB) { sections.push({ group:'LB', label:'Middle Linebackers',  slots:3, positions:['MLB','ILB'] }); usedLB.push('MLB','ILB'); }
    const remainLB = [...new Set(teamPlayers.filter(p => p.positionGroup === 'LB' && !usedLB.includes(p.position)).map(p => p.position))];
    if (remainLB.length) sections.push({ group:'LB', label:'Linebackers', slots:4, positions: remainLB });
  } else {
    sections.push({ group:'LB', label:'Linebackers', slots:5 });
  }

  // ── Defensive Backs: split CB vs Safeties if available ────────────────
  const hasCB  = hasAny('DB', ['CB']);
  const hasSaf = hasAny('DB', ['S','FS','SS']);
  if (hasCB || hasSaf) {
    const usedDB = [];
    if (hasCB)  { sections.push({ group:'DB', label:'Cornerbacks', slots:4, positions:['CB'] }); usedDB.push('CB'); }
    if (hasSaf) { sections.push({ group:'DB', label:'Safeties',    slots:3, positions:['S','FS','SS'] }); usedDB.push('S','FS','SS'); }
    const remainDB = [...new Set(teamPlayers.filter(p => p.positionGroup === 'DB' && !usedDB.includes(p.position)).map(p => p.position))];
    if (remainDB.length) sections.push({ group:'DB', label:'Defensive Backs', slots:5, positions: remainDB });
  } else {
    sections.push({ group:'DB', label:'Defensive Backs', slots:7 });
  }

  sections.push({ group:'K', label:'Kickers', slots:2 });
  sections.push({ group:'P', label:'Punters',  slots:2 });
  return sections;
}

// ── Theme helpers ──────────────────────────────────────────────────────────
const isDynasty = () => true;

// ── Color helpers ──────────────────────────────────────────────────────────
const ratingColor = v => {
  if (v >= 95) return '#ffd700';
  if (v >= 88) return '#a78bfa';
  if (v >= 80) return '#00c853';
  if (v >= 70) return '#8bc34a';
  if (v >= 60) return '#ffc107';
  if (v >= 50) return '#ff9800';
  return '#f44336';
};
// Text color that contrasts with a ratingColor background
const ratingTextColor = v => (v >= 95 || (v >= 60 && v < 70)) ? '#111' : '#fff';

// Position group badge color (background, text)
const posGroupColor = g => {
  switch(g) {
    case 'QB':             return ['rgba(200,146,42,0.18)', '#c8922a'];   // gold
    case 'RB': case 'WR':
    case 'TE':             return ['rgba(56,139,253,0.15)', '#4fa3f7'];   // blue
    case 'DL': case 'LB': return ['rgba(216,72,72,0.15)',  '#d84848'];   // red
    case 'DB':             return ['rgba(48,168,87,0.15)',  '#30a857'];   // green
    case 'K':  case 'P':  return ['rgba(128,128,160,0.15)','#8080a0'];   // muted
    default:               return ['var(--surface-deep)', 'var(--text-muted)'];
  }
};

const tierBadge = () => '';

// ── Data loading ───────────────────────────────────────────────────────────
async function loadData() {
  const base = 'app/assets/data/';
  let projectedYears = new Set();
  try {
    const meta = await fetch(base + 'years_meta.json').then(r => r.json());
    years = [...(meta.seasons || []), ...(meta.projected || [])].sort((a, b) => a - b);
    projectedYears = new Set(meta.projected || []);
  } catch {
    try { years = await fetch(base + 'years.json').then(r => r.json()); }
    catch { years = [2024]; }
  }

  const yearSel = document.getElementById('year-select');
  yearSel.innerHTML = years.map(y =>
    `<option value="${y}">${y}${projectedYears.has(y) ? ' (Projected)' : ' Season'}</option>`
  ).join('');
  // Default to 2025 (most recent complete season); fall back to last year if not available
  const defaultYear = years.includes(2025) ? 2025 : years[years.length - 1];
  yearSel.value = defaultYear;
  yearSel.onchange = e => { currentYear = parseInt(e.target.value); onDataReady(); };

  for (const y of years) {
    const yb = base + y + '/';
    try {
      const [tp, pp, rat] = await Promise.all([
        fetch(yb + 'teams_private.json').then(r => r.json()),
        fetch(yb + 'players_private.json').then(r => r.json()),
        fetch(yb + 'ratings.json').then(r => r.json()),
      ]);
      dataByYear[y] = { teams: tp, players: pp, ratings: rat };
    } catch (e) { console.warn(`Failed to load ${y}:`, e); }
  }

  currentYear = defaultYear;
  onDataReady();
}

function getData() { return dataByYear[currentYear] || {}; }
function getTeams() { return getData().teams || []; }
function getPlayers() { return getData().players || []; }
function getRatings() { return getData().ratings || []; }

function onDataReady() {
  buildConfFilter();
  const teams = getTeams();
  if (teams.length) {
    const prev = teams.find(t => t.id === selectedTeamId);
    if (prev) selectedTeamId = prev.id;
    else selectedTeamId = teams[0].id;
  }
  renderActiveTab();
}

function buildConfFilter() {
  const confs = [...new Set(getTeams().map(t => t.conference).filter(Boolean))].sort();
  const sel = document.getElementById('conf-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Conferences</option>' +
    confs.map(c => `<option value="${c}">${c}</option>`).join('');
  if (confs.includes(cur)) sel.value = cur;
}

function renderTeamList() {
  const search = document.getElementById('search').value.toLowerCase();
  const conf = document.getElementById('conf-filter').value;
  let teams = getTeams().filter(t => {
    return t.name.toLowerCase().includes(search) && (!conf || t.conference === conf);
  });
  teams.sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  if (activeTab === 'teams') renderTeams(teams);
}

function renderTeams(filteredTeams) {
  if (!filteredTeams) {
    const search = document.getElementById('search').value.toLowerCase();
    const conf = document.getElementById('conf-filter').value;
    filteredTeams = getTeams().filter(t =>
      t.name.toLowerCase().includes(search) && (!conf || t.conference === conf)
    );
    filteredTeams.sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  }
  if (isDynasty()) {
    document.getElementById('tab-content').innerHTML = `
      <div style="margin-bottom:12px;font-size:12px;color:var(--text-muted);letter-spacing:0.3px">${filteredTeams.length} TEAMS</div>
      <div class="d-team-grid">
        ${filteredTeams.map(t => {
          const ovr = t.ratings?.overall || 0;
          const tc = t.primaryColor || 'var(--accent)';
          return `<div class="d-team-card ${t.id === selectedTeamId ? 'active' : ''}" onclick="selectTeam(${t.id})" style="--d-team-color:${tc}">
            ${t.logoUrl ? `<img class="d-team-card-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : '<div style="height:52px"></div>'}
            <div class="d-team-card-name">${t.name}</div>
            <div class="d-team-card-conf">${t.conference || ''}</div>
            <span class="d-team-card-ovr" style="background:${ratingColor(ovr)};color:${ratingTextColor(ovr)}">${ovr}</span>
          </div>`;
        }).join('')}
      </div>`;
  } else {
    document.getElementById('tab-content').innerHTML = `
      <div style="margin-bottom:8px;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">${filteredTeams.length} teams — click to view</div>
      <div class="a-team-list">
        ${filteredTeams.map(t => {
          const ovr = t.ratings?.overall || 0;
          return `<div class="a-team-row ${t.id === selectedTeamId ? 'active' : ''}" onclick="selectTeam(${t.id})">
            ${t.logoUrl ? `<img class="a-team-row-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : '<div style="width:22px"></div>'}
            <span class="a-team-row-name">${t.name}</span>
            <span class="a-team-row-conf">${t.conference || ''}</span>
            <span class="a-team-row-ovr" style="color:${ratingColor(ovr)}">${ovr}</span>
          </div>`;
        }).join('')}
      </div>`;
  }
}

function selectTeam(id) {
  selectedTeamId = id;
  posFilter = 'ALL';
  teamSubnav = 'roster';
  switchTab('roster', false);
  const t = getTeams().find(t => t.id === id);
  if (t) {
    setBreadcrumb([{label: 'Teams', onclick: "switchTab('teams')"}, {label: t.name}]);
    renderTeamView(t);
  }
}

function setBreadcrumb(parts) {
  const bar = document.getElementById('breadcrumb-bar');
  if (!parts || !parts.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = parts.map((p, i) =>
    i < parts.length - 1
      ? `<span class="bc-link" onclick="${p.onclick}">${p.label}</span><span class="bc-sep">›</span>`
      : `<span>${p.label}</span>`
  ).join('');
}

function renderTeamView(t) {
  if (!t) { switchTab('teams'); return; }
  const subNavHTML = `<div class="team-subnav">
    <button class="team-subnav-btn ${teamSubnav==='roster'?'active':''}" onclick="setTeamSubnav('roster')">Roster</button>
    <button class="team-subnav-btn ${teamSubnav==='depth'?'active':''}" onclick="setTeamSubnav('depth')">Depth Chart</button>
    <button class="team-subnav-btn ${teamSubnav==='schedule'?'active':''}" onclick="setTeamSubnav('schedule')">Schedule</button>
    <button class="team-subnav-btn ${teamSubnav==='analysis'?'active':''}" onclick="setTeamSubnav('analysis')">Analysis</button>
  </div>`;
  if (teamSubnav === 'roster') renderRoster(t, subNavHTML);
  else if (teamSubnav === 'depth') renderDepth(t, subNavHTML);
  else if (teamSubnav === 'schedule') renderSchedule(t, subNavHTML);
  else renderAnalysis(t, subNavHTML);
}

function setTeamSubnav(view) {
  teamSubnav = view;
  const t = getTeams().find(t => t.id === selectedTeamId);
  if (t) renderTeamView(t);
}

function switchTab(tab, render = true) {
  activeTab = tab;
  document.getElementById('tab-content').classList.toggle('map-mode', tab === 'map');
  const tabs = ['teams','roster','depth','schedule','top-players','conferences','compare','map','explain'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.bottom-tab-bar button[data-btab]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.btab === tab);
  });
  if (render) renderActiveTab();
}

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.t === t);
  });
  localStorage.setItem('cfb-theme', t);
  // Re-render active tab so structural HTML (Analytics vs Dynasty) updates immediately
  requestAnimationFrame(() => renderActiveTab());
}

function renderActiveTab() {
  const t = getTeams().find(t => t.id === selectedTeamId);
  if (activeTab === 'teams') { setBreadcrumb([]); renderTeams(); }
  else if (activeTab === 'roster') {
    if (t) { teamSubnav = 'roster'; setBreadcrumb([{label:'Teams',onclick:"switchTab('teams')"},{label:t.name}]); renderTeamView(t); }
    else switchTab('teams');
  }
  else if (activeTab === 'depth') {
    if (t) { teamSubnav = 'depth'; setBreadcrumb([{label:'Teams',onclick:"switchTab('teams')"},{label:t.name}]); renderTeamView(t); }
    else switchTab('teams');
  }
  else if (activeTab === 'schedule') {
    if (t) { teamSubnav = 'schedule'; setBreadcrumb([{label:'Teams',onclick:"switchTab('teams')"},{label:t.name}]); renderTeamView(t); }
    else switchTab('teams');
  }
  else if (activeTab === 'top-players') { setBreadcrumb([]); renderTopPlayers(); }
  else if (activeTab === 'conferences') { setBreadcrumb([]); renderConferences(); }
  else if (activeTab === 'compare') { setBreadcrumb([]); renderCompare(); }
  else if (activeTab === 'map') { setBreadcrumb([]); renderMap(); }
  else if (activeTab === 'explain') { setBreadcrumb([]); renderExplain(); }
}

// ── Roster Tab ─────────────────────────────────────────────────────────────
function renderRoster(t, subNavHTML='') {
  const ps = getPlayers().filter(p => p.teamId === t.id);
  const rMap = buildRatingMap();
  const posGroups = ['ALL', ...new Set(ps.map(p => p.positionGroup).filter(g => g && g !== 'OL'))].sort();

  const yearLabels = ['','Fr','So','Jr','Sr','Gr'];
  const yrLabel = yr => yearLabels[Math.min(yr || 0, 5)] || yr;

  // OL players always go to the secondary block, never in main table
  const olPlayers = ps.filter(p => p.positionGroup === 'OL')
    .sort((a, b) => a.position.localeCompare(b.position) || `${a.lastName}${a.firstName}`.localeCompare(`${b.lastName}${b.firstName}`));

  // For 2026, split into returning vs departing
  if (currentYear === 2026) {
    const nonOl = ps.filter(p => p.positionGroup !== 'OL');
    const returning = nonOl.filter(p => p.status !== 'likely_leaving' && p.status !== 'transferred_out');
    const departing = nonOl.filter(p => p.status === 'likely_leaving' || p.status === 'transferred_out');

    const applyPos = arr => posFilter === 'ALL' ? arr : arr.filter(p => p.positionGroup === posFilter);
    const sortArr = arr => [...arr].sort((a, b) => {
      const ra = rMap[a.id] || {}, rb = rMap[b.id] || {};
      return (rb.overall || 0) - (ra.overall || 0);
    });

    const retFiltered = sortArr(applyPos(returning));
    const depFiltered = sortArr(applyPos(departing));

    const makeRosterRow = (p, isLeaving = false) => {
      const r = rMap[p.id] || {};
      const ovr = r.overall || 0;
      const yr = yrLabel(p.year) || yrLabel(p.yearPrev) || '—';
      const leavingPill = isLeaving
        ? (p.status === 'transferred_out' ? '<span class="status-pill out">Transfer</span>' : '<span class="status-pill leaving">Grad</span>')
        : (p.status === 'transfer_in' ? '<span class="status-pill in">New</span>' : p.status === 'recruit' ? '<span class="status-pill recruit">Recruit</span>' : '');
      return `<tr class="clickable" onclick="showPlayerModal('${p.id}')">
        <td><span class="pos-badge">${p.position || '?'}</span></td>
        <td>${p.firstName} ${p.lastName}${tierBadge(ovr)}${leavingPill}</td>
        <td>${yr}</td>
        <td><span class="ovr" style="background:${ratingColor(ovr)};color:${ratingTextColor(ovr)}">${ovr || '-'}</span></td>
      </tr>`;
    };

    const retTable = retFiltered.length ? `<div class="table-scroll-wrap"><table>
      <tr><th>Pos</th><th>Name</th><th>Yr</th><th>OVR</th></tr>
      ${retFiltered.map(p => makeRosterRow(p, false)).join('')}
    </table></div>` : '<div style="color:var(--text-dim);padding:12px;font-size:13px">No players</div>';

    const depTable = depFiltered.length ? `<div class="table-scroll-wrap"><table>
      <tr><th>Pos</th><th>Name</th><th>Yr</th><th>OVR</th></tr>
      ${depFiltered.map(p => makeRosterRow(p, true)).join('')}
    </table></div>` : '<div style="color:var(--text-dim);padding:12px;font-size:13px">No players</div>';

    const olBlock = olPlayers.length ? `
      <div class="ol-section">
        <div class="ol-section-header">Offensive Line (${olPlayers.filter(p => p.status !== 'likely_leaving' && p.status !== 'transferred_out').length} returning)</div>
        <div class="ol-names-grid">
          ${olPlayers.filter(p => p.status !== 'likely_leaving' && p.status !== 'transferred_out').map(p =>
            `<div class="ol-name-chip" onclick="showPlayerModal('${p.id}')">${p.firstName} ${p.lastName} <span style="color:var(--text-dim);font-size:11px">${p.position}</span></div>`
          ).join('')}
        </div>
      </div>` : '';

    document.getElementById('tab-content').innerHTML = `
      ${teamHeaderHTML(t)}
      ${subNavHTML}
      <div class="filter-row">
        ${posGroups.map(pg => `<span class="pos-chip ${pg === posFilter ? 'active' : ''}" onclick="filterPos('${pg}')">${pg}</span>`).join('')}
      </div>
      <div class="roster-split">
        <div class="roster-split-col">
          <h3><span>${retFiltered.length}</span> Returning</h3>
          ${retTable}
        </div>
        <div class="roster-split-col">
          <h3><span>${depFiltered.length}</span> Graduating / Leaving</h3>
          ${depTable}
        </div>
      </div>
      ${olBlock}
      <div style="padding:8px;color:#666;font-size:11px">${ps.length} total players &bull; click a player for detail</div>
    `;
    requestAnimationFrame(() => initTeamRadar());
    return;
  }

  // Normal (non-projected) year roster
  const filtered = (posFilter === 'ALL' ? ps : ps.filter(p => p.positionGroup === posFilter))
    .filter(p => p.positionGroup !== 'OL');

  filtered.sort((a, b) => {
    const ra = rMap[a.id] || {}, rb = rMap[b.id] || {};
    let va, vb;
    if (sortCol === 'name') { va = a.lastName; vb = b.lastName; }
    else if (sortCol === 'pos') { va = a.position; vb = b.position; }
    else if (sortCol === 'yr') { va = a.year || 0; vb = b.year || 0; }
    else if (sortCol === 'jersey') { va = (a.jersey != null && a.jersey !== '') ? parseInt(a.jersey) : 99; vb = (b.jersey != null && b.jersey !== '') ? parseInt(b.jersey) : 99; }
    else { va = ra[sortCol] || 0; vb = rb[sortCol] || 0; }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  const skillCols = posFilter === 'ALL' ? [] : (SKILL_COLS[posFilter] || []);
  const allCols = [['jersey','#'],['pos','Pos'],['name','Name'],['yr','Yr'],['overall','OVR'], ...skillCols];

  const olBlock = olPlayers.length ? `
    <div class="ol-section">
      <div class="ol-section-header">Offensive Line</div>
      <div class="ol-names-grid">
        ${olPlayers.map(p => `<div class="ol-name-chip" onclick="showPlayerModal('${p.id}')">${p.firstName} ${p.lastName} <span style="color:var(--text-dim);font-size:11px">${p.position}</span></div>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('tab-content').innerHTML = `
    ${teamHeaderHTML(t)}
    ${subNavHTML}
    <div class="filter-row">
      ${posGroups.map(pg => `<span class="pos-chip ${pg === posFilter ? 'active' : ''}" onclick="filterPos('${pg}')">${pg}</span>`).join('')}
    </div>
    <div class="table-scroll-wrap"><table>
      <tr>
        ${allCols.map(([col,lbl]) => {
          const cls = sortCol === col ? (sortAsc ? 'sorted-asc' : 'sorted-desc') : '';
          return `<th class="${cls}" onclick="sortBy('${col}')">${lbl}</th>`;
        }).join('')}
      </tr>
      ${filtered.map(p => {
        const r = rMap[p.id] || {};
        return `<tr class="clickable" onclick="showPlayerModal('${p.id}')">
          <td>${p.jersey != null && p.jersey !== '' ? p.jersey : '-'}</td>
          <td><span class="pos-badge">${p.position || '?'}</span></td>
          <td>${p.firstName} ${p.lastName}${tierBadge(r.overall || 0)}</td>
          <td>${yrLabel(p.year)}</td>
          <td>
            <span class="ovr" style="background:${ratingColor(r.overall || 0)};color:${ratingTextColor(r.overall || 0)}">${r.overall || '-'}</span>
          </td>
          ${skillCols.map(([a]) => `<td>${r[a] != null ? r[a] : '-'}</td>`).join('')}
        </tr>`;
      }).join('')}
    </table></div>
    ${posFilter === 'ALL' ? olBlock : ''}
    <div style="padding:8px;color:#666;font-size:11px">${filtered.length} players${posFilter !== 'ALL' ? ` (${posFilter})` : ''} &bull; ${ps.length} total &bull; click a player for detail</div>
  `;
  requestAnimationFrame(() => initTeamRadar());
}
