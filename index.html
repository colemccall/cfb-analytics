<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFB Analytics</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar { width: 290px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #0f3460; flex-shrink: 0; }
  .sidebar-controls { padding: 8px; display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid #0f3460; }
  .sidebar-controls input, .sidebar-controls select { width: 100%; padding: 8px 10px; background: #0f3460; border: none; color: #fff; font-size: 13px; outline: none; border-radius: 4px; }
  .sidebar-controls input::placeholder { color: #666; }
  .controls-row { display: flex; gap: 6px; }
  .controls-row select, .controls-row button { flex: 1; padding: 6px 8px; background: #0f3460; border: 1px solid #1a3a6e; color: #fff; font-size: 12px; border-radius: 4px; cursor: pointer; }
  .controls-row button.active { background: #e94560; border-color: #e94560; }
  #team-list { flex: 1; overflow-y: auto; }
  .team-item { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #0f346033; display: flex; align-items: center; gap: 8px; }
  .team-item:hover, .team-item.active { background: #0f3460; }
  .team-logo { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; }
  .team-info { flex: 1; min-width: 0; }
  .team-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-conf { font-size: 10px; color: #888; }
  .team-ovr { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }

  /* ── Main area ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .tab-bar { display: flex; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; overflow-x: auto; }
  .tab-btn { padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; color: #888; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; }
  .tab-btn:hover { color: #ccc; }
  .tab-btn.active { color: #fff; border-bottom-color: #e94560; }
  .tab-content { flex: 1; overflow-y: auto; padding: 20px; }

  /* ── Team header ── */
  .team-header { display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: 8px; margin-bottom: 12px; }
  .team-header img { width: 56px; height: 56px; object-fit: contain; }
  .team-header-info { flex: 1; }
  .team-header-info h1 { font-size: 20px; }
  .team-header-info p { font-size: 12px; color: #aaa; margin-top: 2px; }
  .team-header-actions { display: flex; gap: 8px; }
  .btn-compare { padding: 6px 14px; background: #0f3460; border: 1px solid #1a3a6e; color: #a0c4ff; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; }
  .btn-compare:hover { background: #1a3a6e; }

  /* ── Rating cards ── */
  .rating-cards { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .rating-card { background: #16213e; border-radius: 6px; padding: 10px 14px; text-align: center; min-width: 80px; flex: 1; }
  .rating-card .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .rating-card .value { font-size: 22px; font-weight: 800; margin-top: 2px; }

  /* ── Position chips ── */
  .filter-row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .pos-chip { padding: 3px 10px; background: #16213e; border: 1px solid #0f3460; border-radius: 12px; font-size: 11px; cursor: pointer; }
  .pos-chip.active { background: #e94560; border-color: #e94560; }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 6px 8px; background: #16213e; color: #aaa; font-weight: 600; position: sticky; top: 0; z-index: 1; cursor: pointer; user-select: none; }
  th:hover { color: #fff; }
  th.sorted-asc::after { content: ' ▲'; }
  th.sorted-desc::after { content: ' ▼'; }
  td { padding: 5px 8px; border-bottom: 1px solid #16213e22; }
  tr:hover td { background: #16213e55; }
  tr.clickable { cursor: pointer; }
  .ovr { display: inline-block; width: 30px; text-align: center; padding: 2px 4px; border-radius: 4px; font-weight: 700; font-size: 11px; }
  .pos-badge { display: inline-block; background: #0f3460; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; min-width: 28px; text-align: center; }
  .tier-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; margin-left: 4px; vertical-align: middle; }
  .tier-dynasty { background: #ffd700; color: #1a1a2e; }
  .tier-impact  { background: #a78bfa; color: #1a1a2e; }
  .archetype-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; background: #1a3a5c; color: #7ec8e3; margin-left: 4px; vertical-align: middle; border: 1px solid #2a5080; }
  .modal-tab-bar { display: flex; gap: 4px; margin: 12px 0 0; border-bottom: 1px solid #0f3460; }
  .modal-tab-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 4px 4px 0 0; color: #aaa; background: transparent; border: 1px solid transparent; border-bottom: none; }
  .modal-tab-btn.active { color: #e94560; background: #0f1b2d; border-color: #0f3460; }

  /* ── Depth chart ── */
  .depth-section { margin-bottom: 20px; }
  .depth-pos-header { font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; padding: 6px 0 4px; border-bottom: 1px solid #0f3460; margin-bottom: 4px; }
  .depth-row { display: flex; align-items: center; gap: 10px; padding: 5px 6px; border-radius: 4px; cursor: pointer; }
  .depth-row:hover { background: #16213e88; }
  .depth-slot { font-size: 11px; font-weight: 700; color: #555; width: 18px; text-align: right; flex-shrink: 0; }
  .depth-slot.starter { color: #ffd700; }
  .depth-name { flex: 1; font-size: 13px; }
  .depth-skills { display: flex; gap: 6px; flex-shrink: 0; }
  .depth-skill { font-size: 10px; background: #0f3460; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }

  /* ── Conference view ── */
  .conf-section { margin-bottom: 28px; }
  .conf-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 8px; }
  .conf-team-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; cursor: pointer; }
  .conf-team-row:hover { background: #16213e; }
  .conf-rank { font-size: 12px; font-weight: 700; color: #555; width: 22px; text-align: right; flex-shrink: 0; }
  .conf-rank.top3 { color: #ffd700; }
  .conf-team-logo { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }
  .conf-team-name { flex: 1; font-size: 13px; font-weight: 600; }
  .conf-ovr { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }

  /* ── Top players view ── */
  .top-players-controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .top-players-controls input { flex: 1; min-width: 180px; padding: 8px 12px; background: #0f3460; border: none; color: #fff; font-size: 13px; outline: none; border-radius: 4px; }
  .top-players-controls input::placeholder { color: #666; }
  .top-players-controls select { padding: 8px 10px; background: #0f3460; border: 1px solid #1a3a6e; color: #fff; font-size: 12px; border-radius: 4px; cursor: pointer; }
  .player-rank { font-size: 12px; font-weight: 700; color: #555; width: 28px; text-align: right; }
  .player-rank.top3 { color: #ffd700; }
  .player-rank.top10 { color: #a78bfa; }

  /* ── Comparison tab ── */
  .compare-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .compare-controls select { padding: 8px 12px; background: #0f3460; border: 1px solid #1a3a6e; color: #fff; font-size: 13px; border-radius: 4px; cursor: pointer; min-width: 200px; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .compare-team-card { background: #16213e; border-radius: 8px; padding: 16px; }
  .compare-team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .compare-team-header img { width: 44px; height: 44px; object-fit: contain; }
  .compare-team-name { font-size: 15px; font-weight: 700; }
  .compare-team-conf { font-size: 11px; color: #888; }
  .compare-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #0f346033; font-size: 12px; }
  .compare-stat-label { color: #888; font-size: 11px; }
  .compare-bar-wrap { flex: 1; margin: 0 10px; background: #0f3460; border-radius: 2px; height: 6px; overflow: hidden; }
  .compare-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .compare-head-row { display: flex; align-items: center; margin-bottom: 8px; padding: 4px 0; }
  .compare-cat-label { width: 80px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .compare-val-left { width: 36px; text-align: center; font-weight: 700; font-size: 14px; }
  .compare-val-right { width: 36px; text-align: center; font-weight: 700; font-size: 14px; }
  .compare-bars { flex: 1; position: relative; height: 16px; display: flex; align-items: center; }
  .compare-bar-left { height: 10px; border-radius: 2px 0 0 2px; background: #4fc3f7; transition: width 0.3s; }
  .compare-bar-right { height: 10px; border-radius: 0 2px 2px 0; background: #f06292; transition: width 0.3s; }
  .compare-center { width: 2px; background: #333; height: 16px; }
  .compare-section-title { font-size: 14px; font-weight: 700; color: #fff; margin: 16px 0 10px; }

  /* ── Player modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; width: 560px; max-width: 95vw; max-height: 88vh; overflow-y: auto; padding: 24px; position: relative; }
  .modal-close { position: absolute; top: 12px; right: 14px; font-size: 20px; cursor: pointer; color: #555; line-height: 1; }
  .modal-close:hover { color: #fff; }
  .modal-player-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; }
  .modal-player-info h2 { font-size: 20px; font-weight: 800; }
  .modal-player-info .sub { font-size: 12px; color: #aaa; margin-top: 3px; }
  .modal-ovr-badge { font-size: 28px; font-weight: 900; width: 54px; height: 54px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-section { margin-bottom: 20px; }
  .modal-section-title { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .skill-label { font-size: 12px; color: #aaa; width: 100px; flex-shrink: 0; }
  .skill-bar-wrap { flex: 1; background: #0f3460; border-radius: 3px; height: 10px; overflow: hidden; }
  .skill-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .skill-val { font-size: 12px; font-weight: 700; width: 28px; text-align: right; flex-shrink: 0; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-cell { background: #0f3460; border-radius: 5px; padding: 8px 10px; }
  .stat-cell .sv { font-size: 18px; font-weight: 800; }
  .stat-cell .sk { font-size: 10px; color: #888; margin-top: 1px; }
  .yoy-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .yoy-table th { background: #0f3460; padding: 5px 8px; text-align: left; color: #888; }
  .yoy-table td { padding: 5px 8px; border-bottom: 1px solid #0f346033; }
  .yoy-table tr.current-year td { background: #0f346055; }

  /* ── Similarity ── */
  .sim-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #0f346022; cursor: pointer; }
  .sim-row:hover { background: #0f346022; border-radius: 4px; padding-left: 4px; }
  .sim-row:last-child { border-bottom: none; }
  .sim-score { font-size: 11px; font-weight: 700; color: #a78bfa; width: 36px; text-align: right; flex-shrink: 0; }
  .sim-name { flex: 1; font-size: 13px; }
  .sim-team { font-size: 10px; color: #666; }
  .sim-bar-wrap { width: 60px; background: #0f3460; border-radius: 2px; height: 6px; overflow: hidden; }
  .sim-bar-fill { height: 100%; border-radius: 2px; background: #a78bfa; }

  #loading { text-align: center; padding: 60px; font-size: 14px; color: #666; }

  /* ── Mobile / Responsive ── */
  #sidebar-toggle {
    display: none; position: fixed; top: 10px; left: 10px; z-index: 200;
    background: #e94560; border: none; color: #fff; font-size: 20px; line-height: 1;
    width: 40px; height: 40px; border-radius: 6px; cursor: pointer; align-items: center; justify-content: center;
  }

  /* ── Tablet (601–900px): narrower sidebar, smaller type ── */
  @media (max-width: 900px) {
    #sidebar { width: 220px; }
    .tab-btn { padding: 10px 12px; font-size: 12px; }
    .team-header img { width: 44px; height: 44px; }
    .team-header-info h1 { font-size: 17px; }
    .compare-grid { grid-template-columns: 1fr; }
    .depth-skills { display: none; }
  }

  /* ── Phone (≤600px): sidebar overlay, single-column everything ── */
  @media (max-width: 600px) {
    body { overflow: auto; }
    #sidebar-toggle { display: flex; }

    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 150;
      width: 80vw; max-width: 300px;
      transform: translateX(-100%); transition: transform 0.25s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-backdrop {
      display: none; position: fixed; inset: 0; z-index: 140; background: rgba(0,0,0,0.5);
    }
    #sidebar-backdrop.open { display: block; }

    #main { width: 100%; padding-top: 52px; }
    .tab-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-btn { padding: 10px 10px; font-size: 11px; }
    .tab-content { padding: 12px; }

    .team-header { flex-wrap: wrap; gap: 10px; }
    .team-header img { width: 40px; height: 40px; }
    .team-header-info h1 { font-size: 16px; }
    .team-header-actions { width: 100%; }

    .rating-cards { display: grid; grid-template-columns: repeat(3, 1fr); }
    .rating-card .value { font-size: 18px; }

    .compare-grid { grid-template-columns: 1fr; }
    .compare-controls { flex-direction: column; align-items: stretch; }
    .compare-controls select { min-width: unset; }

    .depth-skills { display: none; }

    /* Tables: horizontal scroll wrapper added via JS */
    .table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .modal { padding: 16px; }
    .modal-player-info h2 { font-size: 17px; }
    .modal-ovr-badge { width: 46px; height: 46px; font-size: 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }

    .explain-pipeline { flex-direction: column; }
    .explain-arrow { transform: rotate(90deg); }
  }

  /* ── Explainability tab ── */
  .explain-section { margin-bottom: 32px; }
  .explain-section h2 { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 4px; padding-bottom: 8px; border-bottom: 2px solid #e94560; display: inline-block; }
  .explain-section p, .explain-section li { font-size: 13px; color: #bbb; line-height: 1.65; margin-bottom: 6px; }
  .explain-section ul { padding-left: 18px; margin-top: 6px; }
  .explain-section li { margin-bottom: 3px; }
  .explain-section strong { color: #e0e0e0; }
  .explain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-top: 12px; }
  .explain-pos-card { background: #16213e; border-radius: 8px; padding: 14px 16px; border-left: 3px solid #0f3460; }
  .explain-pos-card h3 { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .explain-pos-card .skill-entry { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; font-size: 12px; }
  .explain-pos-card .skill-name { color: #a78bfa; font-weight: 700; min-width: 110px; }
  .explain-pos-card .skill-desc { color: #999; font-size: 11px; }
  .explain-pos-card .weight-badge { font-size: 10px; background: #0f3460; padding: 1px 5px; border-radius: 3px; color: #aaa; margin-left: auto; flex-shrink: 0; }
  .explain-pipeline { display: flex; align-items: center; gap: 0; flex-wrap: wrap; margin: 12px 0; }
  .explain-step { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 10px 14px; font-size: 12px; min-width: 120px; text-align: center; }
  .explain-step .step-num { font-size: 10px; color: #e94560; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .explain-step .step-name { font-weight: 700; color: #fff; font-size: 13px; }
  .explain-step .step-desc { color: #888; font-size: 10px; margin-top: 3px; }
  .explain-arrow { color: #0f3460; font-size: 18px; padding: 0 6px; }
  .explain-blend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
  .explain-blend-label { color: #888; width: 180px; }
  .explain-blend-bar { flex: 1; background: #0f3460; border-radius: 3px; height: 14px; overflow: hidden; display: flex; }
  .explain-blend-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #000; }
  .explain-note { background: #16213e; border-left: 3px solid #ffd700; padding: 10px 14px; border-radius: 0 6px 6px 0; font-size: 12px; color: #bbb; margin: 10px 0; }
</style>
</head>
<body>
<button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle team list">☰</button>
<div id="sidebar-backdrop" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <div class="sidebar-controls">
    <div class="controls-row">
      <select id="year-select"></select>
    </div>
    <input type="text" id="search" placeholder="Search teams...">
    <select id="conf-filter">
      <option value="">All Conferences</option>
    </select>
  </div>
  <div id="team-list"></div>
</div>
<div id="main">
  <div class="tab-bar">
    <div class="tab-btn active"  onclick="switchTab('roster')">Roster</div>
    <div class="tab-btn"         onclick="switchTab('depth')">Depth Chart</div>
    <div class="tab-btn"         onclick="switchTab('schedule')">Schedule</div>
    <div class="tab-btn"         onclick="switchTab('top-players')">Top Players</div>
    <div class="tab-btn"         onclick="switchTab('conferences')">Conferences</div>
    <div class="tab-btn"         onclick="switchTab('compare')">Compare</div>
    <div class="tab-btn"         onclick="switchTab('explain')">How It Works</div>
  </div>
  <div class="tab-content" id="tab-content">
    <div id="loading">Loading data...</div>
  </div>
</div>

<!-- Player detail modal -->
<div class="modal-overlay" id="player-modal" onclick="handleModalClick(event)">
  <div class="modal" id="modal-inner">
    <span class="modal-close" onclick="closeModal()">&#x2715;</span>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let dataByYear = {};
let years = [];
let currentYear = null;
let selectedTeamId = null;
let sortCol = 'overall';
let sortAsc = false;
let posFilter = 'ALL';
let activeTab = 'roster';
let topSortCol = 'overall';
let topSortAsc = false;
let topSearch = '';
let topPosFilter = 'ALL';
let compareTeamId = null;

// ── Skill attribute definitions (mirrors rating_engine.py SKILL_ATTRS) ────
const SKILL_ATTRS = {
  QB:  [['passRating','Pass Rating'],['deepBall','Deep Ball'],['accuracy','Accuracy'],['mobility','Mobility']],
  RB:  [['rushing','Rushing'],['receiving','Receiving'],['powerRunning','Power Running']],
  FB:  [['blocking','Blocking'],['rushing','Rushing'],['receiving','Receiving']],
  WR:  [['receiving','Receiving'],['routeRunning','Route Running'],['yac','YAC']],
  TE:  [['receiving','Receiving'],['blocking','Blocking'],['routeRunning','Route Running']],
  OL:  [['runBlock','Run Block'],['passBlock','Pass Block']],
  DL:  [['passRush','Pass Rush'],['runStop','Run Stop']],
  LB:  [['coverage','Coverage'],['runStop','Run Stop'],['passRush','Pass Rush']],
  DB:  [['coverage','Coverage'],['tackling','Tackling'],['ballHawking','Ball Hawking']],
  K:   [['power','Power'],['accuracy','Accuracy']],
  P:   [['distance','Distance'],['placement','Placement']],
};

const SKILL_COLS = {  // short labels for table headers
  QB:  [['passRating','PASS'],['deepBall','DEEP'],['accuracy','ACC'],['mobility','MOB']],
  RB:  [['rushing','RUSH'],['receiving','REC'],['powerRunning','PWR']],
  FB:  [['blocking','BLK'],['rushing','RUSH'],['receiving','REC']],
  WR:  [['receiving','REC'],['routeRunning','RTE'],['yac','YAC']],
  TE:  [['receiving','REC'],['blocking','BLK'],['routeRunning','RTE']],
  OL:  [['runBlock','R-BLK'],['passBlock','P-BLK']],
  DL:  [['passRush','P-RSH'],['runStop','R-STP']],
  LB:  [['coverage','COV'],['runStop','R-STP'],['passRush','P-RSH']],
  DB:  [['coverage','COV'],['tackling','TKL'],['ballHawking','HAWK']],
  K:   [['power','PWR'],['accuracy','ACC']],
  P:   [['distance','DIST'],['placement','PLMT']],
};

// Stats display config per position: [key, label]
const STAT_LABELS = {
  QB:  [['passYds','Pass Yds'],['passTDs','Pass TDs'],['comp','Comp'],['att','Att'],['compPct','Comp %'],['ypa','YPA'],['ints','INTs'],['rushYds','Rush Yds']],
  RB:  [['rushYds','Rush Yds'],['rushTDs','Rush TDs'],['ypc','YPC'],['recYds','Rec Yds'],['recTDs','Rec TDs']],
  FB:  [['rushYds','Rush Yds'],['rushTDs','Rush TDs'],['ypc','YPC'],['recYds','Rec Yds']],
  WR:  [['recYds','Rec Yds'],['recTDs','Rec TDs'],['receptions','Receptions'],['ypr','Yds/Rec']],
  TE:  [['recYds','Rec Yds'],['recTDs','Rec TDs'],['receptions','Receptions'],['ypr','Yds/Rec']],
  OL:  [],
  DL:  [['tackles','Tackles'],['sacks','Sacks'],['tfl','TFL'],['qbh','QB Hits'],['ff','FF']],
  LB:  [['tackles','Tackles'],['sacks','Sacks'],['ints','INTs'],['intTDs','INT TDs'],['pds','PDs'],['tfl','TFL'],['ff','FF']],
  DB:  [['tackles','Tackles'],['ints','INTs'],['intTDs','INT TDs'],['pds','PDs'],['ff','FF'],['tfl','TFL']],
  K:   [['fgm','FG Made'],['fga','FG Att'],['fgPct','FG %'],['longFG','Long FG'],['xpm','XPM']],
  P:   [['punts','Punts'],['puntAvg','Avg'],['longPunt','Long'],['in20','Inside 20']],
};

// ── Player Archetype ──────────────────────────────────────────────────────────
// Assigns an archetype label based on the player's skill rating profile.
// Archetypes are purely cosmetic/descriptive — they don't affect ratings.
function computeArchetype(posGroup, r) {
  const g = (k) => r[k] || 0;
  switch (posGroup) {
    case 'QB': {
      const mob = g('mobility'), pass = g('passRating'), acc = g('accuracy'), deep = g('deepBall');
      if (mob >= 82 && pass >= 78) return 'Dual Threat';
      if (mob >= 82) return 'Scrambler';
      if (deep >= 82 && acc >= 78) return 'Big Arm';
      if (acc >= 82 && pass >= 80) return 'Precision Passer';
      if (pass >= 78) return 'Pocket Passer';
      return 'Game Manager';
    }
    case 'RB': {
      const rush = g('rushing'), rec = g('receiving'), pwr = g('powerRunning');
      if (rec >= 78 && rush >= 75) return 'All-Purpose Back';
      if (rec >= 78) return 'Receiving Back';
      if (pwr >= 82) return 'Power Back';
      if (rush >= 80) return 'Speed Back';
      return 'Backup Back';
    }
    case 'FB': return 'Fullback';
    case 'WR': {
      const rec = g('receiving'), rte = g('routeRunning'), yac = g('yac');
      if (yac >= 82 && rec >= 78) return 'YAC Monster';
      if (rte >= 82 && rec >= 78) return 'Route Runner';
      if (rec >= 82) return 'No. 1 Receiver';
      if (rte >= 75) return 'Slot Receiver';
      return 'Role Player';
    }
    case 'TE': {
      const rec = g('receiving'), blk = g('blocking'), rte = g('routeRunning');
      if (rec >= 78 && blk >= 72) return 'Complete TE';
      if (rec >= 78) return 'Pass Catcher';
      if (blk >= 78) return 'Blocking TE';
      return 'H-Back';
    }
    case 'OL': {
      const rb = g('runBlock'), pb = g('passBlock');
      if (rb >= 80 && pb >= 80) return 'Complete Lineman';
      if (pb >= rb + 5) return 'Pass Blocker';
      if (rb >= pb + 5) return 'Run Blocker';
      return 'Lineman';
    }
    case 'DL': {
      const pr = g('passRush'), rs = g('runStop');
      if (pr >= 80 && rs >= 78) return 'Complete D-Lineman';
      if (pr >= 80) return 'Pass Rusher';
      if (rs >= 80) return 'Run Stuffer';
      return 'Rotational';
    }
    case 'LB': {
      const cov = g('coverage'), rs = g('runStop'), pr = g('passRush');
      if (pr >= 78 && cov >= 72) return 'Hybrid LB';
      if (pr >= 80) return 'Edge Rusher';
      if (cov >= 80) return 'Coverage LB';
      if (rs >= 80) return 'Run Stopper';
      return 'Linebacker';
    }
    case 'DB': {
      const cov = g('coverage'), hawk = g('ballHawking'), tkl = g('tackling');
      if (hawk >= 82 && cov >= 78) return 'Ball Hawk';
      if (tkl >= 82) return 'Hit Man';
      if (cov >= 80) return 'Shutdown Corner';
      return 'Cover DB';
    }
    case 'K': {
      const pwr = g('power'), acc = g('accuracy');
      if (pwr >= 82) return 'Big Leg';
      if (acc >= 82) return 'Reliable Kicker';
      return 'Kicker';
    }
    case 'P': return g('placement') >= 80 ? 'Coffin Corner Punter' : 'Punter';
    default: return '';
  }
}

// buildDepthPositions: generates the depth chart section config dynamically based on
// what specific positions are actually present on a given team's roster.
// Falls back to generic group labels when only generic positions exist (e.g., "DL" not "DE"/"DT").
function buildDepthPositions(teamPlayers) {
  const hasAny = (group, posList) => {
    const s = new Set(teamPlayers.filter(p => p.positionGroup === group).map(p => p.position));
    return posList ? posList.some(pos => s.has(pos)) : s.size > 0;
  };

  const sections = [
    { group:'QB', label:'Quarterbacks',   slots:3 },
    { group:'RB', label:'Running Backs',  slots:4 },
    { group:'FB', label:'Fullbacks',      slots:2 },
    { group:'WR', label:'Wide Receivers', slots:5 },
    { group:'TE', label:'Tight Ends',     slots:3 },
  ];

  // ── Offensive Line: split by specific position if available ────────────
  const hasOT = hasAny('OL', ['OT','LT','RT','T']);
  const hasOG = hasAny('OL', ['OG','G']);
  const hasC  = hasAny('OL', ['C']);
  if (hasOT || hasOG || hasC) {
    const usedOL = [];
    if (hasOT) { sections.push({ group:'OL', label:'Offensive Tackles', slots:4, positions:['OT','LT','RT','T'] }); usedOL.push('OT','LT','RT','T'); }
    if (hasOG) { sections.push({ group:'OL', label:'Offensive Guards',  slots:4, positions:['OG','G'] }); usedOL.push('OG','G'); }
    if (hasC)  { sections.push({ group:'OL', label:'Centers',           slots:2, positions:['C'] }); usedOL.push('C'); }
    // Catch-all for generic 'OL' or other positions not matched above
    const remainOL = [...new Set(teamPlayers.filter(p => p.positionGroup === 'OL' && !usedOL.includes(p.position)).map(p => p.position))];
    if (remainOL.length) sections.push({ group:'OL', label:'Offensive Linemen', slots:5, positions: remainOL });
  } else {
    sections.push({ group:'OL', label:'Offensive Line', slots:8 });
  }

  // ── Defensive Line: split edge vs interior if available ────────────────
  const hasEdge     = hasAny('DL', ['DE','EDGE']);
  const hasInterior = hasAny('DL', ['DT','NT']);
  if (hasEdge || hasInterior) {
    const usedDL = [];
    if (hasEdge)     { sections.push({ group:'DL', label:'Edge Rushers',      slots:4, positions:['DE','EDGE'] }); usedDL.push('DE','EDGE'); }
    if (hasInterior) { sections.push({ group:'DL', label:'Interior DL',       slots:3, positions:['DT','NT'] });   usedDL.push('DT','NT'); }
    // Catch-all for generic 'DL' players not matched above
    const remainDL = [...new Set(teamPlayers.filter(p => p.positionGroup === 'DL' && !usedDL.includes(p.position)).map(p => p.position))];
    if (remainDL.length) sections.push({ group:'DL', label:'Defensive Linemen', slots:5, positions: remainDL });
  } else {
    sections.push({ group:'DL', label:'Defensive Line', slots:7 });
  }

  // ── Linebackers: split MLB/ILB vs OLB if available ────────────────────
  const hasOLB = hasAny('LB', ['OLB']);
  const hasMLB = hasAny('LB', ['MLB','ILB']);
  if (hasOLB || hasMLB) {
    const usedLB = [];
    if (hasOLB) { sections.push({ group:'LB', label:'Outside Linebackers', slots:3, positions:['OLB'] }); usedLB.push('OLB'); }
    if (hasMLB) { sections.push({ group:'LB', label:'Middle Linebackers',  slots:3, positions:['MLB','ILB'] }); usedLB.push('MLB','ILB'); }
    const remainLB = [...new Set(teamPlayers.filter(p => p.positionGroup === 'LB' && !usedLB.includes(p.position)).map(p => p.position))];
    if (remainLB.length) sections.push({ group:'LB', label:'Linebackers', slots:4, positions: remainLB });
  } else {
    sections.push({ group:'LB', label:'Linebackers', slots:5 });
  }

  // ── Defensive Backs: split CB vs Safeties if available ────────────────
  const hasCB  = hasAny('DB', ['CB']);
  const hasSaf = hasAny('DB', ['S','FS','SS']);
  if (hasCB || hasSaf) {
    const usedDB = [];
    if (hasCB)  { sections.push({ group:'DB', label:'Cornerbacks', slots:4, positions:['CB'] }); usedDB.push('CB'); }
    if (hasSaf) { sections.push({ group:'DB', label:'Safeties',    slots:3, positions:['S','FS','SS'] }); usedDB.push('S','FS','SS'); }
    const remainDB = [...new Set(teamPlayers.filter(p => p.positionGroup === 'DB' && !usedDB.includes(p.position)).map(p => p.position))];
    if (remainDB.length) sections.push({ group:'DB', label:'Defensive Backs', slots:5, positions: remainDB });
  } else {
    sections.push({ group:'DB', label:'Defensive Backs', slots:7 });
  }

  sections.push({ group:'K', label:'Kickers', slots:2 });
  sections.push({ group:'P', label:'Punters',  slots:2 });
  return sections;
}

// ── Color helpers ──────────────────────────────────────────────────────────
const ratingColor = v => {
  if (v >= 95) return '#ffd700';
  if (v >= 88) return '#a78bfa';
  if (v >= 80) return '#00c853';
  if (v >= 70) return '#8bc34a';
  if (v >= 60) return '#ffc107';
  if (v >= 50) return '#ff9800';
  return '#f44336';
};

const tierBadge = v => {
  if (v >= 95) return '<span class="tier-badge tier-dynasty">Dynasty</span>';
  if (v >= 88) return '<span class="tier-badge tier-impact">Impact</span>';
  return '';
};

// ── Data loading ───────────────────────────────────────────────────────────
async function loadData() {
  const base = 'app/assets/data/';
  let projectedYears = new Set();
  try {
    const meta = await fetch(base + 'years_meta.json').then(r => r.json());
    years = [...(meta.seasons || []), ...(meta.projected || [])].sort((a, b) => a - b);
    projectedYears = new Set(meta.projected || []);
  } catch {
    try { years = await fetch(base + 'years.json').then(r => r.json()); }
    catch { years = [2024]; }
  }

  const yearSel = document.getElementById('year-select');
  yearSel.innerHTML = years.map(y =>
    `<option value="${y}">${y}${projectedYears.has(y) ? ' (Projected)' : ' Season'}</option>`
  ).join('');
  yearSel.value = years[years.length - 1];
  yearSel.onchange = e => { currentYear = parseInt(e.target.value); onDataReady(); };

  for (const y of years) {
    const yb = base + y + '/';
    try {
      const [tp, pp, rat] = await Promise.all([
        fetch(yb + 'teams_private.json').then(r => r.json()),
        fetch(yb + 'players_private.json').then(r => r.json()),
        fetch(yb + 'ratings.json').then(r => r.json()),
      ]);
      dataByYear[y] = { teams: tp, players: pp, ratings: rat };
    } catch (e) { console.warn(`Failed to load ${y}:`, e); }
  }

  currentYear = years[years.length - 1];
  onDataReady();
}

function getData() { return dataByYear[currentYear] || {}; }
function getTeams() { return getData().teams || []; }
function getPlayers() { return getData().players || []; }
function getRatings() { return getData().ratings || []; }

function onDataReady() {
  buildConfFilter();
  renderTeamList();
  const teams = getTeams();
  if (teams.length) {
    const prev = teams.find(t => t.id === selectedTeamId);
    selectTeam(prev ? prev.id : teams[0].id, false);
  }
  if (activeTab !== 'roster') renderActiveTab();
}

function buildConfFilter() {
  const confs = [...new Set(getTeams().map(t => t.conference).filter(Boolean))].sort();
  const sel = document.getElementById('conf-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Conferences</option>' +
    confs.map(c => `<option value="${c}">${c}</option>`).join('');
  if (confs.includes(cur)) sel.value = cur;
}

function renderTeamList() {
  const search = document.getElementById('search').value.toLowerCase();
  const conf = document.getElementById('conf-filter').value;
  let teams = getTeams().filter(t => {
    return t.name.toLowerCase().includes(search) && (!conf || t.conference === conf);
  });
  teams.sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  document.getElementById('team-list').innerHTML = teams.map(t => {
    const ovr = t.ratings?.overall || 0;
    return `<div class="team-item ${t.id === selectedTeamId ? 'active' : ''}" onclick="selectTeam(${t.id})">
      ${t.logoUrl ? `<img class="team-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : ''}
      <div class="team-info">
        <div class="team-name">${t.name}</div>
        <div class="team-conf">${t.conference || ''}</div>
      </div>
      <span class="team-ovr" style="background:${ratingColor(ovr)};color:#000">${ovr}</span>
    </div>`;
  }).join('');
}

function selectTeam(id, switchToRoster = true) {
  selectedTeamId = id;
  posFilter = 'ALL';
  // Close sidebar overlay on mobile after selection
  if (window.innerWidth <= 600) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('open');
  }
  const teamTabs = ['roster','depth','schedule'];
  if (switchToRoster && !teamTabs.includes(activeTab)) switchTab('roster', false);
  const t = getTeams().find(t => t.id === id);
  if (!t) return;
  if (activeTab === 'roster') renderRoster(t);
  else if (activeTab === 'depth') renderDepth(t);
  else if (activeTab === 'schedule') renderSchedule(t);
  renderTeamList();
}

function switchTab(tab, render = true) {
  activeTab = tab;
  const tabs = ['roster','depth','schedule','top-players','conferences','compare','explain'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', tabs[i] === tab);
  });
  if (render) renderActiveTab();
}

function renderActiveTab() {
  const t = getTeams().find(t => t.id === selectedTeamId);
  if (activeTab === 'roster') { if (t) renderRoster(t); }
  else if (activeTab === 'depth') { if (t) renderDepth(t); else document.getElementById('tab-content').innerHTML = '<div id="loading">Select a team from the sidebar.</div>'; }
  else if (activeTab === 'schedule') { if (t) renderSchedule(t); else document.getElementById('tab-content').innerHTML = '<div id="loading">Select a team from the sidebar.</div>'; }
  else if (activeTab === 'top-players') renderTopPlayers();
  else if (activeTab === 'conferences') renderConferences();
  else if (activeTab === 'compare') renderCompare();
  else if (activeTab === 'explain') renderExplain();
}

// ── Roster Tab ─────────────────────────────────────────────────────────────
function renderRoster(t) {
  const ps = getPlayers().filter(p => p.teamId === t.id);
  const rMap = buildRatingMap();
  const posGroups = ['ALL', ...new Set(ps.map(p => p.positionGroup).filter(Boolean))].sort();
  const filtered = posFilter === 'ALL' ? ps : ps.filter(p => p.positionGroup === posFilter);

  filtered.sort((a, b) => {
    const ra = rMap[a.id] || {}, rb = rMap[b.id] || {};
    let va, vb;
    if (sortCol === 'name') { va = a.lastName; vb = b.lastName; }
    else if (sortCol === 'pos') { va = a.position; vb = b.position; }
    else if (sortCol === 'yr') { va = a.year || 0; vb = b.year || 0; }
    else if (sortCol === 'jersey') { va = parseInt(a.jersey) || 99; vb = parseInt(b.jersey) || 99; }
    else { va = ra[sortCol] || 0; vb = rb[sortCol] || 0; }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  const skillCols = posFilter === 'ALL' ? [] : (SKILL_COLS[posFilter] || []);
  const allCols = [['jersey','#'],['pos','Pos'],['name','Name'],['yr','Yr'],['overall','OVR'], ...skillCols];

  document.getElementById('tab-content').innerHTML = `
    ${teamHeaderHTML(t)}
    <div class="filter-row">
      ${posGroups.map(pg => `<span class="pos-chip ${pg === posFilter ? 'active' : ''}" onclick="filterPos('${pg}')">${pg}</span>`).join('')}
    </div>
    <div class="table-scroll-wrap"><table>
      <tr>
        ${allCols.map(([col,lbl]) => {
          const cls = sortCol === col ? (sortAsc ? 'sorted-asc' : 'sorted-desc') : '';
          return `<th class="${cls}" onclick="sortBy('${col}')">${lbl}</th>`;
        }).join('')}
      </tr>
      ${filtered.map(p => {
        const r = rMap[p.id] || {};
        return `<tr class="clickable" onclick="showPlayerModal('${p.id}')">
          <td>${p.jersey || '-'}</td>
          <td><span class="pos-badge">${p.position || '?'}</span></td>
          <td>${p.firstName} ${p.lastName}${tierBadge(r.overall || 0)}</td>
          <td>${p.year || ''}</td>
          <td>
            <span class="ovr" style="background:${ratingColor(r.overall || 0)};color:#000">${r.overall || '-'}</span>
            ${r.projected && r.overallLow != null ? `<span style="font-size:10px;color:#666;display:block;line-height:1">${r.overallLow}–${r.overallHigh}</span>` : ''}
          </td>
          ${skillCols.map(([a]) => `<td>${r[a] != null ? r[a] : '-'}</td>`).join('')}
        </tr>`;
      }).join('')}
    </table></div>
    <div style="padding:8px;color:#666;font-size:11px">${filtered.length} players${posFilter !== 'ALL' ? ` (${posFilter})` : ''} &bull; ${ps.length} total &bull; click a player for detail</div>
  `;
}

// ── Depth Chart Tab ────────────────────────────────────────────────────────
function renderDepth(t) {
  const ps = getPlayers().filter(p => p.teamId === t.id);
  const rMap = buildRatingMap();

  const sections = buildDepthPositions(ps).map(({ group, label, slots, positions }) => {
    const groupPlayers = ps
      .filter(p => p.positionGroup === group && (!positions || positions.includes(p.position)))
      .map(p => ({ p, r: rMap[p.id] || {} }))
      .sort((a, b) => (b.r.overall || 0) - (a.r.overall || 0))
      .slice(0, slots);

    if (!groupPlayers.length) return '';

    const skills = SKILL_COLS[group] || [];
    const rows = groupPlayers.map(({ p, r }, i) => {
      const isStarter = i === 0;
      const skillHtml = skills.map(([a, lbl]) =>
        `<span class="depth-skill" style="color:${ratingColor(r[a] || 0)}">${lbl} ${r[a] || '-'}</span>`
      ).join('');
      return `<div class="depth-row" onclick="showPlayerModal('${p.id}')">
        <span class="depth-slot ${isStarter ? 'starter' : ''}">${i === 0 ? '★' : i + 1}</span>
        <span class="pos-badge" style="flex-shrink:0">${p.position || '?'}</span>
        <span class="depth-name">${p.firstName} ${p.lastName}${tierBadge(r.overall || 0)}</span>
        <span class="ovr" style="background:${ratingColor(r.overall || 0)};color:#000;flex-shrink:0">${r.overall || '-'}</span>
        <div class="depth-skills">${skillHtml}</div>
      </div>`;
    }).join('');

    return `<div class="depth-section">
      <div class="depth-pos-header">${label}</div>
      ${rows}
    </div>`;
  }).join('');

  document.getElementById('tab-content').innerHTML = `
    ${teamHeaderHTML(t)}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px">
      ${sections}
    </div>`;
}

// ── Schedule Tab ───────────────────────────────────────────────────────────
async function renderSchedule(t) {
  document.getElementById('tab-content').innerHTML = `${teamHeaderHTML(t)}<div id="loading">Loading schedule...</div>`;
  const schedule = await loadSchedule(currentYear);
  const games = schedule.filter(g => g.homeTeam === t.name || g.awayTeam === t.name)
                        .sort((a, b) => (a.week || 0) - (b.week || 0));

  if (!games.length) {
    document.getElementById('tab-content').innerHTML = `${teamHeaderHTML(t)}<div style="color:#666;padding:20px">No schedule data available for ${currentYear}.</div>`;
    return;
  }

  const rows = games.map(g => {
    const isHome = g.homeTeam === t.name;
    const opponent = isHome ? g.awayTeam : g.homeTeam;
    const myScore  = isHome ? g.homeScore : g.awayScore;
    const oppScore = isHome ? g.awayScore : g.homeScore;
    const oppSp    = isHome ? g.awaySpRank : g.homeSpRank;
    const loc = g.neutralSite ? 'N' : (isHome ? 'vs' : '@');
    let result = '-', resultColor = '#aaa';
    if (myScore != null && oppScore != null) {
      const win = myScore > oppScore;
      result = `${win ? 'W' : 'L'} ${myScore}-${oppScore}`;
      resultColor = win ? '#00c853' : '#f44336';
    }
    const margin = (myScore != null && oppScore != null) ? (myScore - oppScore) : null;
    return `<tr class="clickable" onclick="showGameDetail(${g.gameId}, '${t.name.replace(/'/g,"\\'")}')">
      <td>${g.week ?? '-'}</td>
      <td style="color:#aaa;font-size:11px">${loc}</td>
      <td>${opponent}</td>
      <td style="color:${resultColor};font-weight:700">${result}</td>
      <td style="color:${margin != null ? (margin > 0 ? '#8bc34a' : '#f44336') : '#aaa'}">${margin != null ? (margin > 0 ? `+${margin}` : margin) : '-'}</td>
      <td style="color:#aaa;font-size:11px">${oppSp != null ? `SP+ ${oppSp}` : '-'}</td>
    </tr>`;
  }).join('');

  document.getElementById('tab-content').innerHTML = `
    ${teamHeaderHTML(t)}
    <div style="padding:12px 0" class="table-scroll-wrap">
      <table class="roster-table" style="width:100%">
        <thead><tr>
          <th onclick="void(0)">Wk</th>
          <th></th>
          <th onclick="void(0)">Opponent</th>
          <th onclick="void(0)">Result</th>
          <th onclick="void(0)">Margin</th>
          <th onclick="void(0)">Opp SP+</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div id="game-detail-panel"></div>`;
}

async function showGameDetail(gameId, teamName) {
  const schedule = await loadSchedule(currentYear);
  const game = schedule.find(g => g.gameId === gameId);
  if (!game) return;

  const gamelog = await loadGamelog(currentYear);
  const rMap = buildRatingMap();
  const players = getPlayers();

  // Find top performers for both teams in this game
  function topPerformers(squadName) {
    const squad = players.filter(p => {
      const t = getTeams().find(t => t.id === p.teamId);
      return t && t.name === squadName;
    });
    const perf = [];
    for (const p of squad) {
      const lg = gamelog[p.id] || gamelog[String(p.id)];
      if (!lg) continue;
      const entry = lg.find(e => e.gameId === gameId);
      if (!entry || !entry.stats) continue;
      const r = rMap[p.id] || rMap[String(p.id)] || {};
      perf.push({ p, stats: entry.stats, ovr: r.overall || 0 });
    }
    perf.sort((a, b) => b.ovr - a.ovr);
    return perf.slice(0, 5);
  }

  function perfRows(performers) {
    return performers.map(({ p, stats, ovr }) => {
      const statStr = Object.entries(stats).slice(0, 4)
        .map(([k, v]) => `${k}: ${v}`).join(' · ');
      return `<div class="depth-row" onclick="showPlayerModal('${p.id}')" style="cursor:pointer">
        <span class="pos-badge" style="flex-shrink:0">${p.position || p.positionGroup}</span>
        <span style="flex:1;padding:0 8px">${p.firstName} ${p.lastName}</span>
        <span class="ovr" style="background:${ratingColor(ovr)};color:#000;flex-shrink:0">${ovr}</span>
        <span style="font-size:11px;color:#aaa;flex-shrink:0;padding-left:8px">${statStr}</span>
      </div>`;
    }).join('') || '<div style="color:#555;font-size:12px;padding:8px">No game log data</div>';
  }

  const homePerf = topPerformers(game.homeTeam);
  const awayPerf = topPerformers(game.awayTeam);
  const panel = document.getElementById('game-detail-panel');
  if (!panel) return;
  panel.innerHTML = `
    <div style="margin-top:20px;border:1px solid #0f3460;border-radius:8px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0;font-size:14px;color:#e94560">Week ${game.week} — ${game.awayTeam} @ ${game.homeTeam}</h3>
        <span style="font-size:13px;color:#aaa">${game.awayScore ?? '?'} – ${game.homeScore ?? '?'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:6px">${game.awayTeam}</div>
          ${perfRows(awayPerf)}
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:6px">${game.homeTeam}</div>
          ${perfRows(homePerf)}
        </div>
      </div>
    </div>`;

  // Append drive-level breakdown (lazy — only fetched on game click)
  const [drivesData, playsData] = await Promise.all([loadDrives(currentYear), loadPlays(currentYear)]);
  const teamName = game.homeTeam; // show home team drives (TODO: add toggle)
  const teamDrives = (drivesData[teamName] || []).filter(d => d.gameId === gameId);
  const teamPlays  = (playsData[teamName]  || []).filter(p => p.gameId === gameId);

  if (!teamDrives.length) return;

  const driveRows = teamDrives.map((d, idx) => {
    const scoreDot = d.scoring ? '<span style="color:#00c853"> ●</span>' : '';
    const drivePlays = teamPlays.filter(p => p.driveNumber === d.driveNumber);
    const playRows = drivePlays.map(pl => {
      const epaColor = pl.ppa > 0 ? '#8bc34a' : pl.ppa < 0 ? '#f44336' : '#aaa';
      return `<tr style="background:#0a1a2e;font-size:11px">
        <td style="padding:4px 8px;color:#aaa">${pl.down ? `${pl.down}&amp;${pl.distance}` : '-'}</td>
        <td style="padding:4px 8px">${pl.playType || '-'}</td>
        <td style="padding:4px 8px;color:#ccc;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pl.playText || ''}</td>
        <td style="padding:4px 8px;text-align:right">${pl.yardsGained ?? '-'}</td>
        <td style="padding:4px 8px;text-align:right;color:${epaColor}">${pl.ppa != null ? pl.ppa.toFixed(2) : '-'}</td>
      </tr>`;
    }).join('');

    const playsSection = drivePlays.length ? `
      <tr id="drive-plays-${idx}" style="display:none"><td colspan="6" style="padding:0 0 4px 16px">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="font-size:10px;color:#666">
            <th style="padding:3px 8px;text-align:left">D&amp;D</th>
            <th style="padding:3px 8px;text-align:left">Type</th>
            <th style="padding:3px 8px;text-align:left">Play</th>
            <th style="padding:3px 8px;text-align:right">Yds</th>
            <th style="padding:3px 8px;text-align:right">EPA</th>
          </tr></thead>
          <tbody>${playRows}</tbody>
        </table>
      </td></tr>` : '';

    return `<tr class="clickable" onclick="toggleDrivePlays(${idx})" style="border-top:1px solid #0f346044">
      <td style="padding:6px 8px;color:#aaa;font-size:11px">#${d.driveNumber ?? idx+1}</td>
      <td style="padding:6px 8px;font-weight:700;color:${d.scoring ? '#00c853' : '#ccc'}">${d.result || '-'}${scoreDot}</td>
      <td style="padding:6px 8px;color:#aaa">${d.plays ?? '-'} plays</td>
      <td style="padding:6px 8px;color:#aaa">${d.yards ?? '-'} yds</td>
      <td style="padding:6px 8px;color:#aaa;font-size:11px">${d.startScore ?? '?'}→${d.endScore ?? '?'}</td>
      <td style="padding:6px 8px;color:#555;font-size:10px">${drivePlays.length ? '▶' : ''}</td>
    </tr>${playsSection}`;
  }).join('');

  const drivesPanel = document.getElementById('game-detail-panel');
  if (drivesPanel) drivesPanel.innerHTML += `
    <div style="margin-top:12px;border:1px solid #0f3460;border-radius:8px;padding:16px">
      <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:8px">${teamName} Drives</div>
      <div class="table-scroll-wrap"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="font-size:10px;color:#666">
          <th style="padding:3px 8px;text-align:left">Drive</th>
          <th style="padding:3px 8px;text-align:left">Result</th>
          <th style="padding:3px 8px;text-align:left">Plays</th>
          <th style="padding:3px 8px;text-align:left">Yards</th>
          <th style="padding:3px 8px;text-align:left">Score</th>
          <th></th>
        </tr></thead>
        <tbody>${driveRows}</tbody>
      </table></div>
    </div>`;
}

function toggleDrivePlays(idx) {
  const row = document.getElementById(`drive-plays-${idx}`);
  if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
}

// ── Top Players Tab ────────────────────────────────────────────────────────
function renderTopPlayers() {
  const rMap = buildRatingMap();
  const teamMap = buildTeamMap();
  const players = getPlayers();
  const allPositions = ['ALL', ...new Set(players.map(p => p.positionGroup).filter(Boolean))].sort();

  let filtered = players.filter(p => {
    const matchPos = topPosFilter === 'ALL' || p.positionGroup === topPosFilter;
    const name = `${p.firstName} ${p.lastName}`.toLowerCase();
    const teamName = (teamMap[p.teamId]?.name || '').toLowerCase();
    return matchPos && (!topSearch || name.includes(topSearch) || teamName.includes(topSearch));
  });

  filtered.sort((a, b) => {
    const ra = rMap[a.id] || {}, rb = rMap[b.id] || {};
    let va = ra[topSortCol] || 0, vb = rb[topSortCol] || 0;
    if (topSortCol === 'name') { va = a.lastName; vb = b.lastName; }
    if (topSortCol === 'team') { va = (teamMap[a.teamId]?.name||''); vb = (teamMap[b.teamId]?.name||''); }
    if (typeof va === 'string') return topSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return topSortAsc ? va - vb : vb - va;
  });

  const displayList = topSearch ? filtered : filtered.slice(0, 250);
  const skillCols = topPosFilter !== 'ALL' ? (SKILL_COLS[topPosFilter] || []) : [];
  const headCols = [['name','Name'],['pos','Pos'],['team','Team'],['overall','OVR'], ...skillCols];

  document.getElementById('tab-content').innerHTML = `
    <div class="top-players-controls">
      <input type="text" id="top-search" placeholder="Search player or team..." value="${topSearch}" oninput="onTopSearch(this.value)">
      <select id="top-pos-filter" onchange="onTopPos(this.value)">
        ${allPositions.map(p => `<option value="${p}" ${p === topPosFilter ? 'selected' : ''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="table-scroll-wrap"><table>
      <tr>
        <th style="width:28px">#</th>
        ${headCols.map(([col,lbl]) => {
          const cls = topSortCol === col ? (topSortAsc ? 'sorted-asc' : 'sorted-desc') : '';
          return `<th class="${cls}" onclick="sortTopBy('${col}')">${lbl}</th>`;
        }).join('')}
      </tr>
      ${displayList.map((p, i) => {
        const r = rMap[p.id] || {};
        const team = teamMap[p.teamId] || {};
        const rank = i + 1;
        const rankCls = rank <= 3 ? 'top3' : rank <= 10 ? 'top10' : '';
        return `<tr class="clickable" onclick="showPlayerModal('${p.id}')">
          <td><span class="player-rank ${rankCls}">${rank}</span></td>
          <td>${p.firstName} ${p.lastName}${tierBadge(r.overall || 0)}</td>
          <td><span class="pos-badge">${p.position || '?'}</span></td>
          <td style="font-size:11px;color:#aaa;cursor:pointer" onclick="event.stopPropagation();goToTeam(${p.teamId})">${team.name || ''}</td>
          <td><span class="ovr" style="background:${ratingColor(r.overall || 0)};color:#000">${r.overall || '-'}</span></td>
          ${skillCols.map(([a]) => `<td>${r[a] != null ? r[a] : '-'}</td>`).join('')}
        </tr>`;
      }).join('')}
    </table></div>
    <div style="padding:8px;color:#666;font-size:11px">
      ${topSearch ? `${filtered.length} results` : `Top ${displayList.length} of ${filtered.length}`} &bull; click a player for detail
    </div>`;
}

function onTopSearch(val) { topSearch = val.toLowerCase(); renderTopPlayers(); }
function onTopPos(val) { topPosFilter = val; renderTopPlayers(); }
function sortTopBy(col) {
  if (topSortCol === col) topSortAsc = !topSortAsc;
  else { topSortCol = col; topSortAsc = col === 'name' || col === 'team' || col === 'pos'; }
  renderTopPlayers();
}
function goToTeam(teamId) { selectTeam(teamId, true); }

          <span class="conf-ovr" style="background:${ratingColor(ovr)};color:#000">${ovr}</span>

}

// ── Compare Tab ────────────────────────────────────────────────────────────
function startCompare(teamId) {
  compareTeamId = teamId;
  switchTab('compare');
}

function renderCompare() {
  const teams = getTeams().slice().sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  const leftTeam = getTeams().find(t => t.id === selectedTeamId);
  const rightTeam = compareTeamId ? getTeams().find(t => t.id === compareTeamId) : null;

  const teamOptions = teams.map(t =>
    `<option value="${t.id}" ${t.id === compareTeamId ? 'selected' : ''}>${t.name} (${t.ratings?.overall || '?'})</option>`
  ).join('');

  let compHTML = '';
  if (leftTeam && rightTeam) {
    const cats = [
      ['overall','Overall'],['passOff','Pass Off'],['runOff','Run Off'],
      ['passDef','Pass Def'],['runDef','Run Def'],['specialTeams','Spec Teams'],
    ];
    const lr = leftTeam.ratings || {}, rr = rightTeam.ratings || {};
    compHTML = `
      <div class="compare-section-title">Team Ratings</div>
      ${cats.map(([k, label]) => {
        const lv = lr[k] || 0, rv = rr[k] || 0;
        const max = Math.max(lv, rv, 1);
        const lPct = (lv / 99) * 100, rPct = (rv / 99) * 100;
        const lWin = lv >= rv;
        return `<div class="compare-head-row">
          <span class="compare-val-left" style="color:${ratingColor(lv)}">${lv}</span>
          <div class="compare-bars">
            <div style="flex:1;display:flex;justify-content:flex-end">
              <div class="compare-bar-left" style="width:${lPct}%;background:${lWin ? ratingColor(lv) : '#2a4070'}"></div>
            </div>
            <div class="compare-center"></div>
            <div style="flex:1">
              <div class="compare-bar-right" style="width:${rPct}%;background:${!lWin ? ratingColor(rv) : '#2a4070'}"></div>
            </div>
          </div>
          <span class="compare-val-right" style="color:${ratingColor(rv)}">${rv}</span>
          <span class="compare-cat-label" style="width:80px;text-align:center;font-size:11px;color:#666">${label}</span>
        </div>`;
      }).join('')}
      ${renderPositionGroupComparison(leftTeam, rightTeam)}
    `;
  } else if (leftTeam) {
    compHTML = `<div style="color:#666;padding:20px 0">Select a team on the right to compare.</div>`;
  }

  document.getElementById('tab-content').innerHTML = `
    <div class="compare-controls">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        ${leftTeam ? `
          <img src="${leftTeam.logoUrl}" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'">
          <div>
            <div style="font-weight:700">${leftTeam.name}</div>
            <div style="font-size:11px;color:#888">${leftTeam.conference||''}</div>
          </div>` : '<span style="color:#666">Select a team from sidebar</span>'}
        <span style="color:#444;font-size:20px;margin:0 8px">vs</span>
        <select onchange="compareTeamId=parseInt(this.value);renderCompare()" style="padding:8px 12px;background:#0f3460;border:1px solid #1a3a6e;color:#fff;font-size:13px;border-radius:4px;cursor:pointer;min-width:200px">
          <option value="">-- Select opponent --</option>
          ${teamOptions}
        </select>
      </div>
    </div>
    ${compHTML}`;
}

function renderPositionGroupComparison(leftTeam, rightTeam) {
  const rMap = buildRatingMap();
  const allPlayers = getPlayers();

  function getGroupRating(team, group) {
    const ps = allPlayers.filter(p => p.teamId === team.id && p.positionGroup === group);
    const vals = ps.map(p => rMap[p.id]?.overall || 0).sort((a,b) => b-a).slice(0, 5);
    return vals.length ? Math.round(vals.reduce((s,v) => s+v, 0) / vals.length) : 0;
  }

  const groups = [
    { group:'QB', label:'QB' }, { group:'RB', label:'RB' }, { group:'WR', label:'WR' },
    { group:'TE', label:'TE' }, { group:'OL', label:'OL' }, { group:'DL', label:'DL' },
    { group:'LB', label:'LB' }, { group:'DB', label:'DB' },
  ];

  const rows = groups.map(({ group, label }) => {
    const lv = getGroupRating(leftTeam, group);
    const rv = getGroupRating(rightTeam, group);
    if (!lv && !rv) return '';
    const lWin = lv >= rv;
    const lPct = (lv / 99) * 100, rPct = (rv / 99) * 100;
    return `<div class="compare-head-row">
      <span class="compare-val-left" style="color:${ratingColor(lv)}">${lv||'-'}</span>
      <div class="compare-bars">
        <div style="flex:1;display:flex;justify-content:flex-end">
          <div class="compare-bar-left" style="width:${lPct}%;background:${lWin ? ratingColor(lv) : '#2a4070'}"></div>
        </div>
        <div class="compare-center"></div>
        <div style="flex:1">
          <div class="compare-bar-right" style="width:${rPct}%;background:${!lWin ? ratingColor(rv) : '#2a4070'}"></div>
        </div>
      </div>
      <span class="compare-val-right" style="color:${ratingColor(rv)}">${rv||'-'}</span>
      <span class="compare-cat-label" style="width:80px;text-align:center;font-size:11px;color:#666">${label}</span>
    </div>`;
  }).join('');

  return `<div class="compare-section-title">Position Groups</div>${rows}`;
}

// ── Player Modal ───────────────────────────────────────────────────────────
function showPlayerModal(playerId) {
  // Find player in current year — coerce to string since IDs are strings in JSON
  const pid = String(playerId);
  const players = getPlayers();
  const p = players.find(pl => String(pl.id) === pid);
  if (!p) return;

  const rMap = buildRatingMap();
  const r = rMap[pid] || {};
  const teamMap = buildTeamMap();
  const team = teamMap[p.teamId] || {};
  const posGroup = p.positionGroup;
  const ovr = r.overall || 0;

  // Skill bars
  const skills = SKILL_ATTRS[posGroup] || [];
  const skillBarsHTML = skills.map(([key, label]) => {
    const val = r[key] || 0;
    const pct = ((val - 40) / 59) * 100;
    return `<div class="skill-row">
      <span class="skill-label">${label}</span>
      <div class="skill-bar-wrap">
        <div class="skill-bar-fill" style="width:${pct}%;background:${ratingColor(val)}"></div>
      </div>
      <span class="skill-val" style="color:${ratingColor(val)}">${val}</span>
    </div>`;
  }).join('');

  // Stats for current year
  const stats = r.stats || {};
  const statDefs = STAT_LABELS[posGroup] || [];
  const statCells = statDefs.filter(([k]) => stats[k] != null && stats[k] !== 0).map(([k, label]) =>
    `<div class="stat-cell"><div class="sv">${stats[k]}</div><div class="sk">${label}</div></div>`
  ).join('');
  const statsHTML = statCells ? `<div class="modal-section">
    <div class="modal-section-title">Stats (${currentYear})</div>
    <div class="stat-grid">${statCells}</div>
  </div>` : '';

  // Year-over-year progression
  const yoyRows = years.map(y => {
    const yData = dataByYear[y];
    if (!yData) return null;
    const yPlayers = yData.players;
    const yTeams = yData.teams;
    const yRatings = yData.ratings;
    if (!yPlayers || !yRatings) return null;
    const yp = yPlayers.find(pl => String(pl.id) === pid);
    if (!yp) return null;
    const yr = yRatings.find(rr => String(rr.playerId) === pid);
    if (!yr) return null;
    const yTeam = (yTeams || []).find(t => t.id === yp.teamId);
    const yTeamName = yTeam ? yTeam.name : '';
    const ySkills = (SKILL_ATTRS[posGroup] || []).map(([k, lbl]) =>
      yr[k] != null ? `<td style="color:${ratingColor(yr[k])}">${yr[k]}</td>` : '<td>-</td>'
    ).join('');
    const yStats = yr.stats || {};
    const yStatsStr = statDefs.filter(([k]) => yStats[k] != null && yStats[k] !== 0)
      .slice(0,3).map(([k,lbl]) => `${lbl}: ${yStats[k]}`).join(' · ');
    return `<tr class="${y === currentYear ? 'current-year' : ''}">
      <td style="font-weight:700">${y}</td>
      <td style="font-size:11px;color:#aaa;white-space:nowrap">${yTeamName}</td>
      <td><span class="ovr" style="background:${ratingColor(yr.overall||0)};color:#000">${yr.overall||'-'}</span></td>
      ${ySkills}
      <td style="font-size:10px;color:#888">${yStatsStr}</td>
    </tr>`;
  }).filter(Boolean);

  const yoyHTML = yoyRows.length > 1 ? `<div class="modal-section">
    <div class="modal-section-title">Year-over-Year</div>
    <table class="yoy-table">
      <tr>
        <th>Year</th><th>Team</th><th>OVR</th>
        ${(SKILL_ATTRS[posGroup] || []).map(([,lbl]) => `<th>${lbl}</th>`).join('')}
        <th>Key Stats</th>
      </tr>
      ${yoyRows.join('')}
    </table>
  </div>` : '';

  // National + conference rank and similarity (need all players + teams)

  // Career stats: sum additive stats across all years where the player appears
  const careerTotals = {};
  const CAREER_ADDITIVE = {
    QB:  ['passYds','passTDs','comp','ints','rushYds'],
    RB:  ['rushYds','rushTDs','recYds','recTDs'],
    FB:  ['rushYds','rushTDs','recYds'],
    WR:  ['recYds','recTDs','receptions'],
    TE:  ['recYds','recTDs','receptions'],
    DL:  ['tackles','sacks','tfl','qbh','ff'],
    LB:  ['tackles','sacks','ints','pds','tfl','ff'],
    DB:  ['tackles','ints','pds','ff','tfl'],
    K:   ['fgm','fga','xpm'],
    P:   ['punts'],
  };
  const careerKeys = CAREER_ADDITIVE[posGroup] || [];
  let careerYears = 0;
  for (const y of years) {
    const yData = dataByYear[y];
    if (!yData) continue;
    const yRatings = yData.ratings;
    if (!yRatings) continue;
    const yr = yRatings.find(rr => String(rr.playerId) === pid);
    if (!yr) continue;
    const yStats = yr.stats || {};
    careerYears++;
    for (const k of careerKeys) {
      if (yStats[k] != null && yStats[k] !== 0) careerTotals[k] = (careerTotals[k] || 0) + yStats[k];
    }
  }
  const careerCells = careerKeys.filter(k => careerTotals[k]).map(k => {
    const lbl = (STAT_LABELS[posGroup] || []).find(([sk]) => sk === k)?.[1] || k;
    const val = typeof careerTotals[k] === 'number' && !Number.isInteger(careerTotals[k])
      ? careerTotals[k].toFixed(1) : careerTotals[k];
    return `<div class="stat-cell"><div class="sv">${val}</div><div class="sk">${lbl}</div></div>`;
  }).join('');
  const careerHTML = careerCells && careerYears > 1 ? `<div class="modal-section">
    <div class="modal-section-title">Career Totals (${careerYears} seasons)</div>
    <div class="stat-grid">${careerCells}</div>
  </div>` : '';

  // Similar players
  const similar = computeSimilar(pid, posGroup, rMap, allPlayers, allTeams, 6);
  const similarHTML = similar.length ? `<div class="modal-section">
    <div class="modal-section-title">Similar Players (${currentYear})</div>
    ${similar.map(({ p: sp, r: sr, similarity, team: st }) => `
      <div class="sim-row" onclick="showPlayerModal('${sp.id}')">
        <div class="sim-score">${similarity}%</div>
        <div class="sim-bar-wrap"><div class="sim-bar-fill" style="width:${similarity}%"></div></div>

          <div class="sim-name">${sp.firstName} ${sp.lastName}</div>
          <div class="sim-team">${st.name || ''}</div>
        </div>
        <span class="pos-badge" style="flex-shrink:0">${sp.position || posGroup}</span>
      </div>`).join('')}
  </div>` : '';

  const classYear = ['Fr','So','Jr','Sr','Gr'][Math.max(0, Math.min(4, (p.year||1) - 1))];
  const archetype = computeArchetype(posGroup, r);
  const archetypeHTML = archetype ? `<span class="archetype-badge">${archetype}</span>` : '';
  const projTypeLabels = { returning: 'Returning', transfer: 'Transfer', recruit: 'Recruit', unknown: 'New Player' };
  const projRangeHTML = r.projected && r.overallLow != null && r.overallHigh != null

          <span style="font-size:10px;color:#555"> (projected season)</span>
        </div>`;
      })()
    : '';
  const trajectoryHTML = r.trajectory && !r.projected
    ? `<div style="margin-top:6px;font-size:12px;color:#aaa">Trajectory: <span style="color:${ratingColor(r.trajectory)};font-weight:700">${r.trajectory}</span> <span style="font-size:10px;color:#555">(projected)</span></div>`
    : '';

  const overviewHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Skill Ratings</div>

    ${yoyHTML}
    ${similarHTML}`;

  document.getElementById('modal-body').innerHTML = `

      <div class="modal-ovr-badge" style="background:${ratingColor(ovr)};color:#000">${ovr}</div>
      <div class="modal-player-info">

          <span style="cursor:pointer;color:#a0c4ff" onclick="closeModal();goToTeam(${p.teamId})">${team.name || ''}</span>

        </div>
        ${rankHTML}
        ${trajectoryHTML}
        ${projRangeHTML}
      </div>
    </div>
    <div class="modal-tab-bar">
      <div class="modal-tab-btn active" data-mtab="overview" onclick="switchModalTab('overview')">Overview</div>

  `;
  document.getElementById('player-modal').classList.add('open');

async function renderModalGamelog(pid) {
  const el = document.getElementById('modal-tab-gamelog');
  if (!el) return;
  const gamelog = await loadGamelog(currentYear);
  const entries = gamelog[pid] || gamelog[String(pid)] || [];
  if (!entries.length) {
    el.innerHTML = '<div style="color:#555;padding:20px;font-size:13px">No game log data available for this season.</div>';
    return;
  }

  const p = getPlayers().find(pl => String(pl.id) === String(pid));
  const posGroup = p ? p.positionGroup : 'QB';
  const statDefs = STAT_LABELS[posGroup] || [];

  // Determine which stat keys actually appear
  const usedKeys = new Set();
  entries.forEach(e => Object.keys(e.stats || {}).forEach(k => usedKeys.add(k)));
  const cols = statDefs.filter(([k]) => usedKeys.has(k));

  const header = `<tr><th>Wk</th><th>Opponent</th><th>Result</th>${cols.map(([,l]) => `<th>${l}</th>`).join('')}</tr>`;

  // Compute per-stat max for highlight threshold
  const maxes = {};
  cols.forEach(([k]) => { maxes[k] = Math.max(...entries.map(e => Number(e.stats?.[k] ?? 0))); });

  const rows = entries.map(e => {
    const resultColor = e.result ? (e.result.startsWith('W') ? '#00c853' : '#f44336') : '#aaa';
    const statCells = cols.map(([k, l]) => {
      const v = e.stats?.[k] ?? '-';
      const isTop = maxes[k] > 0 && Number(v) >= maxes[k] * 0.75;
      return `<td style="${isTop ? 'color:#00c853;font-weight:700' : ''}">${v}</td>`;
    }).join('');
    return `<tr>
      <td>${e.week ?? '-'}</td>
      <td style="font-size:11px">${e.homeGame ? 'vs ' : '@ '}${e.opponent || '-'}</td>
      <td style="color:${resultColor};font-weight:700;font-size:11px">${e.result || '-'}</td>
      ${statCells}
    </tr>`;
  }).join('');

  el.innerHTML = `<div style="overflow-x:auto">
    <table class="roster-table" style="width:100%;margin-top:8px">
      <thead>${header}</thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── Similarity Score ───────────────────────────────────────────────────────
// Euclidean distance across normalized skill attributes within the same
// position group. Returns top N most similar players sorted by similarity.
function computeSimilar(pid, posGroup, rMap, allPlayers, allTeams, n = 6) {
  const skills = (SKILL_ATTRS[posGroup] || []).map(([k]) => k);
  if (!skills.length) return [];

  const ref = rMap[pid];
  if (!ref) return [];

  // Build team map for name lookup
  const tMap = {};
  allTeams.forEach(t => tMap[t.id] = t);

  // Normalize each skill to 0–1 across all players in this position group
  // to give equal weight regardless of rating scale differences
  const peers = allPlayers.filter(p => p.positionGroup === posGroup && String(p.id) !== pid);

  const results = peers.map(p => {
    const r = rMap[String(p.id)];
    if (!r) return null;
    // Euclidean distance in skill space (each skill equally weighted)
    let distSq = 0;
    for (const sk of skills) {
      const diff = (ref[sk] || 0) - (r[sk] || 0);
      distSq += diff * diff;
    }
    const dist = Math.sqrt(distSq / skills.length);  // RMS distance, 0–59 scale
    const similarity = Math.max(0, Math.round(100 - dist * 100 / 59));
    return { p, r, similarity, team: tMap[p.teamId] || {} };
  }).filter(Boolean);

  // Sort by similarity desc, exclude self, take top N
  results.sort((a, b) => b.similarity - a.similarity);
  // Filter to meaningful matches: OVR within ±15 of reference
  const refOvr = ref.overall || 0;
  return results.filter(x => Math.abs((x.r.overall || 0) - refOvr) <= 15).slice(0, n);
}

        <div class="explain-blend-bar">
          <div class="explain-blend-seg" style="width:30%;background:#4fc3f7">Player Ratings 30%</div>
          <div class="explain-blend-seg" style="width:45%;background:#6366f1">SP+ (opp-adj) 45%</div>
          <div class="explain-blend-seg" style="width:25%;background:#8b5cf6">Advanced Stats 25%</div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:12px;color:#999">Advanced stats (25% component) blends: raw yards (60%) + 3rd down conversion rate (20%) + defensive havoc rate — TFL, INTs, fumble recoveries (20%)</p>
      <ul style="margin-top:10px">
        <li><strong>Top 1–2 teams</strong> → 91–94 (national title contenders)</li>
        <li><strong>Top 5–15 teams</strong> → 87–91 (playoff-caliber)</li>
        <li><strong>Bowl-caliber</strong> → 85–87</li>
        <li><strong>Median</strong> → 74–79</li>
        <li><strong>Bottom teams</strong> → 58–64</li>
      </ul>
      <div class="explain-note">SP+ is the dominant component because it's <strong>opponent-adjusted</strong> — a G5 team with great raw stats against weak opponents will be correctly penalized once SP+ is factored in.</div>
    </div>

    <div class="explain-section">
      <h2>Ratings by Position</h2>
      <p>Each position group uses only the skills that its stats actually measure. Weights show how much each skill contributes to overall rating.</p>
      <div class="explain-grid">${posCards}</div>
    </div>

    <div class="explain-section">
      <h2>Data Sources</h2>
      <ul>
        <li><strong>collegefootballdata.com API</strong> — rosters, player stats, team stats, SP+ ratings, recruiting rankings, PPA (predicted points added), player usage rates</li>
        <li><strong>nfl_draft.json</strong> — manually maintained NFL Draft OL picks (2023–2025 drafts) used as OL quality signal</li>
        <li><strong>team_name_map.json</strong> — mapping real school names used for pipeline team lookups</li>
      </ul>
      <div class="explain-note">All data is sourced directly from the College Football Data API and displays real team and player names.</div>
    </div>

    <div class="explain-section">
      <h2>Known Limitations</h2>
      <ul>
        <li><strong>OL individual differentiation:</strong> Two starting OL on the same team are largely identical in ratings — differentiated only by recruiting stars, usage, and a small deterministic jitter. This is the #1 open problem. See the OL section above.</li>
        <li><strong>Awards API:</strong> The <code>/awards</code> endpoint currently returns empty data — award-tier floors for OL (All-American, All-Conference) are wired up but effectively inactive until the API improves.</li>
        <li><strong>Sample size penalty:</strong> Small sample sizes are penalized (≥10 games = 1.0×, 3–5 games = 0.75×, &lt;3 games = 0.55×) but very short high-efficiency appearances can still inflate ratings.</li>
        <li><strong>Transfer continuity:</strong> The OL cross-year floor only applies to same-team returners — transfers enter a new system and do not receive the continuity floor.</li>
        <li><strong>Cross-year comparability:</strong> All ratings are relative within their season. A 99 OVR in 2022 and a 99 OVR in 2024 are not directly comparable — they both mean "best at their position that year."</li>
        <li><strong>Game log coverage:</strong> Game log and schedule data requires the pipeline to have been run with the Phase 2 API calls (<code>fetch_games</code>, <code>fetch_game_player_stats</code>). If these files are missing, the Schedule and Game Log tabs will show "no data available."</li>
        <li><strong>QB mobility:</strong> Mobility is a bonus — pocket passers are rated at a neutral baseline and do not receive a pass-rush penalty for staying in the pocket. Very mobile QBs receive a boost; immobile QBs are unaffected.</li>
      </ul>
    </div>

    </div>`;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('search').addEventListener('input', () => renderTeamList());
document.getElementById('conf-filter').addEventListener('change', () => renderTeamList());
loadData();
</script>
