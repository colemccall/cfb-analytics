<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFB Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  /* ── Theme variables ── */
  :root {
    --bg: #f4f4f5; --surface: #ffffff; --surface-deep: #e8e8ec;
    --text: #1a1a2e; --text-muted: #6b7280; --text-dim: #9ca3af;
    --accent: #e85d04; --accent-dim: rgba(232,93,4,0.12);
    --border: rgba(100,100,120,0.18); --border-mid: rgba(100,100,120,0.32);
    --input-bg: #ededf2; --sidebar-bg: #f0f0f5;
  }
  [data-theme="dark"] {
    --bg: #0f0f14; --surface: #1a1a2e; --surface-deep: #111120;
    --text: #d8d8e8; --text-muted: #8888aa; --text-dim: #555568;
    --accent: #4f9cf9; --accent-dim: rgba(79,156,249,0.12);
    --border: rgba(60,60,100,0.4); --border-mid: rgba(60,60,100,0.65);
    --input-bg: #0f0f22; --sidebar-bg: #131320;
  }
  [data-theme="vintage"] {
    --bg: #2a1f14; --surface: #3d2b1a; --surface-deep: #1f1409;
    --text: #f5e6c8; --text-muted: #b8956a; --text-dim: #8a6540;
    --accent: #c9a227; --accent-dim: rgba(201,162,39,0.15);
    --border: rgba(90,62,40,0.55); --border-mid: #7a5435;
    --input-bg: #1f1409; --sidebar-bg: #341f0f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background 0.15s, color 0.15s; }

  /* ── Top bar ── */
  #top-bar { background: var(--sidebar-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 6px 12px; flex-shrink: 0; flex-wrap: wrap; }
  #top-bar .app-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; color: var(--accent); letter-spacing: 0.5px; white-space: nowrap; margin-right: 4px; }
  #top-bar select, #top-bar input { padding: 6px 10px; background: var(--input-bg); border: 1px solid var(--border-mid); color: var(--text); font-size: 13px; outline: none; border-radius: 4px; font-family: inherit; }
  #top-bar input { flex: 1; min-width: 120px; max-width: 220px; }
  #top-bar input::placeholder { color: var(--text-dim); }
  #top-bar select { cursor: pointer; }
  #year-select { min-width: 130px; }

  /* ── Team grid (Teams tab) ── */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s, background 0.15s; }
  .team-card:hover { border-color: var(--accent); background: var(--surface-deep); }
  .team-card.active { border-color: var(--accent); }
  .team-card-logo { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .team-card-info { flex: 1; min-width: 0; }
  .team-card-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-card-conf { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .team-card-ovr { font-size: 13px; font-weight: 800; padding: 3px 7px; border-radius: 4px; flex-shrink: 0; }

  /* ── Main area ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .tab-bar { display: flex; background: var(--sidebar-bg); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; align-items: center; }
  .tab-btn { padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
  .tab-content.map-mode { padding: 0; overflow: hidden; }

  /* ── Theme switcher ── */
  .theme-switcher { display: flex; gap: 6px; align-items: center; margin-left: auto; padding: 0 12px; flex-shrink: 0; }
  .theme-btn { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .theme-btn:hover { transform: scale(1.2); }
  .theme-btn.active { border-color: var(--text); }
  .theme-btn[data-t=""] { background: linear-gradient(135deg, #e85d04 50%, #f4f4f5 50%); }
  .theme-btn[data-t="dark"] { background: linear-gradient(135deg, #4f9cf9 50%, #0f0f14 50%); }
  .theme-btn[data-t="vintage"] { background: linear-gradient(135deg, #c9a227 50%, #2a1f14 50%); }

  /* ── Hero banner ── */
  .team-hero { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--surface); border-bottom: 3px solid var(--accent); margin-bottom: 16px; border-radius: 8px; flex-wrap: wrap; }
  .team-hero-logo { width: 68px; height: 68px; object-fit: contain; flex-shrink: 0; }
  .team-hero-info { flex: 1; min-width: 0; }
  .team-hero-name { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.1; letter-spacing: 0.5px; }
  .team-hero-meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .team-hero-actions { display: flex; gap: 8px; }
  .btn-compare { padding: 6px 14px; background: var(--input-bg); border: 1px solid var(--border-mid); color: var(--accent); font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; }
  .btn-compare:hover { background: var(--surface-deep); }

  /* ── Rating cards ── */
  .rating-cards { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .rating-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; text-align: center; min-width: 80px; flex: 1; }
  .rating-card .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .rating-card .value { font-size: 22px; font-weight: 800; margin-top: 2px; }

  /* ── Position chips ── */
  .filter-row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .pos-chip { padding: 3px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; font-size: 11px; cursor: pointer; color: var(--text); }
  .pos-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 7px 8px; background: var(--surface); color: var(--text-muted); font-weight: 600; position: sticky; top: 0; z-index: 1; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); font-size: 13px; }
  th:hover { color: var(--text); }
  th.sorted-asc::after { content: ' ▲'; }
  th.sorted-desc::after { content: ' ▼'; }
  td { padding: 7px 8px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:hover td { background: var(--surface); }
  tr.clickable { cursor: pointer; }
  tr.status-transferred-out td { color: #e05555; }
  tr.status-transferred-out td .pos-badge { opacity: 0.7; }
  tr.status-likely-leaving td { color: #e09940; }
  tr.status-transfer-in td { color: #4caf7d; }
  tr.status-recruit td { color: #64b5f6; }
  .status-pill { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: 4px; vertical-align: middle; letter-spacing: 0.3px; text-transform: uppercase; }
  .status-pill.out { background: #e0555533; color: #e05555; border: 1px solid #e0555566; }
  .status-pill.leaving { background: #e0994033; color: #e09940; border: 1px solid #e0994066; }
  .status-pill.in { background: #4caf7d33; color: #4caf7d; border: 1px solid #4caf7d66; }
  .status-pill.recruit { background: #64b5f633; color: #64b5f6; border: 1px solid #64b5f666; }
  .status-pill.draft { background: #ffd70033; color: #ffd700; border: 1px solid #ffd70066; }
  .ovr { display: inline-block; width: 30px; text-align: center; padding: 2px 4px; border-radius: 4px; font-weight: 700; font-size: 11px; }
  .pos-badge { display: inline-block; background: var(--surface-deep); padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; min-width: 28px; text-align: center; color: var(--text); }
  .tier-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; margin-left: 4px; vertical-align: middle; }
  .tier-dynasty { background: #ffd700; color: #1a1a2e; }
  .tier-impact  { background: #a78bfa; color: #1a1a2e; }
  .archetype-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; background: var(--surface-deep); color: var(--accent); margin-left: 4px; vertical-align: middle; border: 1px solid var(--border-mid); }
  .modal-tab-bar { display: flex; gap: 4px; margin: 12px 0 0; border-bottom: 1px solid var(--border); }
  .modal-tab-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 4px 4px 0 0; color: var(--text-muted); background: transparent; border: 1px solid transparent; border-bottom: none; }
  .modal-tab-btn.active { color: var(--accent); background: var(--surface-deep); border-color: var(--border); }

  /* ── Depth chart ── */
  .depth-section { margin-bottom: 20px; }
  .depth-pos-header { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 6px 0 4px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .depth-row { display: flex; align-items: center; gap: 10px; padding: 5px 6px; border-radius: 4px; cursor: pointer; }
  .depth-row:hover { background: var(--surface); }
  .depth-slot { font-size: 11px; font-weight: 700; color: var(--text-dim); width: 18px; text-align: right; flex-shrink: 0; }
  .depth-slot.starter { color: #ffd700; }
  .depth-name { flex: 1; font-size: 14px; color: var(--text); }
  .depth-skills { display: flex; gap: 6px; flex-shrink: 0; }
  .depth-skill { font-size: 10px; background: var(--surface-deep); padding: 2px 6px; border-radius: 3px; white-space: nowrap; color: var(--text); }

  /* ── Conference view ── */
  .conf-section { margin-bottom: 28px; }
  .conf-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .conf-team-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; cursor: pointer; }
  .conf-team-row:hover { background: var(--surface); }
  .conf-rank { font-size: 12px; font-weight: 700; color: var(--text-dim); width: 22px; text-align: right; flex-shrink: 0; }
  .conf-rank.top3 { color: #ffd700; }
  .conf-team-logo { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }
  .conf-team-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
  .conf-ovr { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }

  /* ── Top players view ── */
  .top-players-controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .top-players-controls input { flex: 1; min-width: 180px; padding: 8px 12px; background: var(--input-bg); border: none; color: var(--text); font-size: 13px; outline: none; border-radius: 4px; }
  .top-players-controls input::placeholder { color: var(--text-dim); }
  .top-players-controls select { padding: 8px 10px; background: var(--input-bg); border: 1px solid var(--border-mid); color: var(--text); font-size: 12px; border-radius: 4px; cursor: pointer; }
  .player-rank { font-size: 12px; font-weight: 700; color: var(--text-dim); width: 28px; text-align: right; }
  .player-rank.top3 { color: #ffd700; }
  .player-rank.top10 { color: #a78bfa; }

  /* ── Comparison tab ── */
  .compare-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .compare-controls select { padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border-mid); color: var(--text); font-size: 13px; border-radius: 4px; cursor: pointer; min-width: 200px; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .compare-team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .compare-team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .compare-team-header img { width: 44px; height: 44px; object-fit: contain; }
  .compare-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .compare-team-conf { font-size: 11px; color: var(--text-muted); }
  .compare-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .compare-stat-label { color: var(--text-muted); font-size: 11px; }
  .compare-bar-wrap { flex: 1; margin: 0 10px; background: var(--surface-deep); border-radius: 2px; height: 6px; overflow: hidden; }
  .compare-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .compare-head-row { display: flex; align-items: center; margin-bottom: 8px; padding: 4px 0; }
  .compare-cat-label { width: 80px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .compare-val-left { width: 36px; text-align: center; font-weight: 700; font-size: 14px; }
  .compare-val-right { width: 36px; text-align: center; font-weight: 700; font-size: 14px; }
  .compare-bars { flex: 1; position: relative; height: 16px; display: flex; align-items: center; }
  .compare-bar-left { height: 10px; border-radius: 2px 0 0 2px; background: #4fc3f7; transition: width 0.3s; }
  .compare-bar-right { height: 10px; border-radius: 0 2px 2px 0; background: #f06292; transition: width 0.3s; }
  .compare-center { width: 2px; background: var(--border-mid); height: 16px; }
  .compare-section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); margin: 16px 0 10px; }

  /* ── Player modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 560px; max-width: 95vw; max-height: 88vh; overflow-y: auto; padding: 24px; position: relative; }
  .modal-close { position: absolute; top: 12px; right: 14px; font-size: 20px; cursor: pointer; color: var(--text-dim); line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-player-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; }
  .modal-player-info h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  .modal-player-info .sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .modal-ovr-badge { font-size: 28px; font-weight: 900; width: 54px; height: 54px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-section { margin-bottom: 20px; }
  .modal-section-title { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .skill-label { font-size: 12px; color: var(--text-muted); width: 100px; flex-shrink: 0; }
  .skill-bar-wrap { flex: 1; background: var(--surface-deep); border-radius: 3px; height: 10px; overflow: hidden; }
  .skill-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .skill-val { font-size: 12px; font-weight: 700; width: 28px; text-align: right; flex-shrink: 0; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-cell { background: var(--surface-deep); border-radius: 5px; padding: 8px 10px; }
  .stat-cell .sv { font-size: 18px; font-weight: 800; color: var(--text); }
  .stat-cell .sk { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .yoy-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .yoy-table th { background: var(--surface-deep); padding: 5px 8px; text-align: left; color: var(--text-muted); }
  .yoy-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); color: var(--text); }
  .yoy-table tr.current-year td { background: var(--accent-dim); }

  /* ── Team radar chart ── */
  .team-radar-wrap { width: 160px; height: 140px; flex-shrink: 0; }

  /* ── Similarity ── */
  .sim-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .sim-row:hover { background: var(--accent-dim); border-radius: 4px; padding-left: 4px; }
  .sim-row:last-child { border-bottom: none; }
  .sim-score { font-size: 11px; font-weight: 700; color: #a78bfa; width: 36px; text-align: right; flex-shrink: 0; }
  .sim-name { flex: 1; font-size: 13px; color: var(--text); }
  .sim-team { font-size: 10px; color: var(--text-dim); }
  .sim-bar-wrap { width: 60px; background: var(--surface-deep); border-radius: 2px; height: 6px; overflow: hidden; }
  .sim-bar-fill { height: 100%; border-radius: 2px; background: #a78bfa; }

  #loading { text-align: center; padding: 60px; font-size: 14px; color: var(--text-dim); }

  /* ── Bottom tab bar (mobile only) ── */
  .bottom-tab-bar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--sidebar-bg); border-top: 1px solid var(--border);
    z-index: 90; padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .bottom-tab-bar button {
    flex: 1; padding: 8px 2px 6px; background: none; border: none;
    color: var(--text-muted); font-size: 9px; font-weight: 600;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;
    text-transform: uppercase; letter-spacing: 0.3px; font-family: inherit;
  }
  .bottom-tab-bar button.active { color: var(--accent); }
  .btab-icon { font-size: 15px; line-height: 1; }

/* ── Tablet (601–900px) ── */
  @media (max-width: 900px) {
    .tab-btn { padding: 10px 12px; font-size: 12px; }
    .team-hero-logo { width: 52px; height: 52px; }
    .team-hero-name { font-size: 22px; }
    .compare-grid { grid-template-columns: 1fr; }
    .depth-skills { display: none; }
    .team-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }

  /* ── Phone (≤600px): single-column everything ── */
  @media (max-width: 600px) {
    body { overflow: auto; }
    #top-bar { padding: 5px 8px; gap: 5px; }
    #top-bar .app-title { font-size: 14px; }
    #top-bar input { max-width: 140px; }
    #main { width: 100%; padding-bottom: 58px; }
    .tab-bar { display: none; }
    .bottom-tab-bar { display: flex; }
    .tab-content { padding: 12px; }
    .team-hero { padding: 12px 14px; gap: 10px; }
    .team-hero-logo { width: 44px; height: 44px; }
    .team-hero-name { font-size: 18px; }
    .team-hero-actions { width: 100%; }
    .team-radar-wrap { display: none; }
    .rating-cards { display: grid; grid-template-columns: repeat(3, 1fr); }
    .rating-card .value { font-size: 18px; }
    .compare-grid { grid-template-columns: 1fr; }
    .compare-controls { flex-direction: column; align-items: stretch; }
    .compare-controls select { min-width: unset; }
    .depth-skills { display: none; }
    .table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .modal { padding: 16px; }
    .modal-player-info h2 { font-size: 18px; }
    .modal-ovr-badge { width: 46px; height: 46px; font-size: 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .explain-pipeline { flex-direction: column; }
    .explain-arrow { transform: rotate(90deg); }
    .team-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ── Explainability tab ── */
  .explain-section { margin-bottom: 32px; }
  .explain-section h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 4px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); display: inline-block; }
  .explain-section p, .explain-section li { font-size: 14px; color: var(--text-muted); line-height: 1.65; margin-bottom: 6px; }
  .explain-section ul { padding-left: 18px; margin-top: 6px; }
  .explain-section li { margin-bottom: 3px; }
  .explain-section strong { color: var(--text); }

<script>
// ── State ──────────────────────────────────────────────────────────────────
let dataByYear = {};
let years = [];
let currentYear = null;
let selectedTeamId = null;
let sortCol = 'overall';
let sortAsc = false;
let posFilter = 'ALL';
let activeTab = 'teams';
let topSortCol = 'overall';
let topSortAsc = false;
let topSearch = '';
let topPosFilter = 'ALL';
let compareTeamId = null;

// ── Skill attribute definitions (mirrors rating_engine.py SKILL_ATTRS) ────
const SKILL_ATTRS = {
  QB:  [['passRating','Pass Rating'],['deepBall','Deep Ball'],['accuracy','Accuracy'],['mobility','Mobility']],
  RB:  [['rushing','Rushing'],['receiving','Receiving'],['powerRunning','Power Running']],

  TE:  [['receiving','Receiving'],['blocking','Blocking'],['routeRunning','Route Running']],
  OL:  [['runBlock','Run Block'],['passBlock','Pass Block']],
  DL:  [['passRush','Pass Rush'],['runStop','Run Stop']],
  LB:  [['coverage','Coverage'],['runStop','Run Stop'],['passRush','Pass Rush']],
  DB:  [['coverage','Coverage'],['tackling','Tackling'],['ballHawking','Ball Hawking']],
  K:   [['power','Power'],['accuracy','Accuracy']],
  P:   [['distance','Distance'],['placement','Placement']],
};

const SKILL_COLS = {  // short labels for table headers
  QB:  [['passRating','PASS'],['deepBall','DEEP'],['accuracy','ACC'],['mobility','MOB']],
  RB:  [['rushing','RUSH'],['receiving','REC'],['powerRunning','PWR']],
  FB:  [['blocking','BLK'],['rushing','RUSH'],['receiving','REC']],
  WR:  [['receiving','REC'],['routeRunning','RTE'],['yac','YAC']],
  TE:  [['receiving','REC'],['blocking','BLK'],['routeRunning','RTE']],
  OL:  [['runBlock','R-BLK'],['passBlock','P-BLK']],
  DL:  [['passRush','P-RSH'],['runStop','R-STP']],
  LB:  [['coverage','COV'],['runStop','R-STP'],['passRush','P-RSH']],
  DB:  [['coverage','COV'],['tackling','TKL'],['ballHawking','HAWK']],
  K:   [['power','PWR'],['accuracy','ACC']],
  P:   [['distance','DIST'],['placement','PLMT']],
};

// Stats display config per position: [key, label]
const STAT_LABELS = {
  QB:  [['passYds','Pass Yds'],['passTDs','Pass TDs'],['comp','Comp'],['att','Att'],['compPct','Comp %'],['ypa','YPA'],['ints','INTs'],['rushYds','Rush Yds']],
  RB:  [['rushYds','Rush Yds'],['rushTDs','Rush TDs'],['ypc','YPC'],['recYds','Rec Yds'],['recTDs','Rec TDs']],
  FB:  [['rushYds','Rush Yds'],['rushTDs','Rush TDs'],['ypc','YPC'],['recYds','Rec Yds']],
  WR:  [['recYds','Rec Yds'],['recTDs','Rec TDs'],['receptions','Receptions'],['ypr','Yds/Rec']],
  TE:  [['recYds','Rec Yds'],['recTDs','Rec TDs'],['receptions','Receptions'],['ypr','Yds/Rec']],
  OL:  [],
  DL:  [['tackles','Tackles'],['sacks','Sacks'],['tfl','TFL'],['qbh','QB Hits'],['ff','FF']],
  LB:  [['tackles','Tackles'],['sacks','Sacks'],['ints','INTs'],['intTDs','INT TDs'],['pds','PDs'],['tfl','TFL'],['ff','FF']],
  DB:  [['tackles','Tackles'],['ints','INTs'],['intTDs','INT TDs'],['pds','PDs'],['ff','FF'],['tfl','TFL']],
  K:   [['fgm','FG Made'],['fga','FG Att'],['fgPct','FG %'],['longFG','Long FG'],['xpm','XPM']],
  P:   [['punts','Punts'],['puntAvg','Avg'],['longPunt','Long'],['in20','Inside 20']],
};

// ── Player Archetype ──────────────────────────────────────────────────────────
// Assigns an archetype label based on the player's skill rating profile.
// Archetypes are purely cosmetic/descriptive — they don't affect ratings.
function computeArchetype(posGroup, r) {
  const g = (k) => r[k] || 0;
  switch (posGroup) {
    case 'QB': {
      const mob = g('mobility'), pass = g('passRating'), acc = g('accuracy'), deep = g('deepBall');
      if (mob >= 82 && pass >= 78) return 'Dual Threat';
      if (mob >= 82) return 'Scrambler';
      if (deep >= 82 && acc >= 78) return 'Big Arm';
      if (acc >= 82 && pass >= 80) return 'Precision Passer';
      if (pass >= 78) return 'Pocket Passer';
      return 'Game Manager';
    }
    case 'RB': {
      const rush = g('rushing'), rec = g('receiving'), pwr = g('powerRunning');
      if (rec >= 78 && rush >= 75) return 'All-Purpose Back';
      if (rec >= 78) return 'Receiving Back';
      if (pwr >= 82) return 'Power Back';
      if (rush >= 80) return 'Speed Back';
      return 'Backup Back';
    }
    case 'FB': return 'Fullback';
    case 'WR': {
      const rec = g('receiving'), rte = g('routeRunning'), yac = g('yac');
      if (yac >= 82 && rec >= 78) return 'YAC Monster';
      if (rte >= 82 && rec >= 78) return 'Route Runner';
      if (rec >= 82) return 'No. 1 Receiver';
      if (rte >= 75) return 'Slot Receiver';
      return 'Role Player';
    }
    case 'TE': {
      const rec = g('receiving'), blk = g('blocking'), rte = g('routeRunning');
      if (rec >= 78 && blk >= 72) return 'Complete TE';
      if (rec >= 78) return 'Pass Catcher';
      if (blk >= 78) return 'Blocking TE';
      return 'H-Back';
    }
    case 'OL': {
      const rb = g('runBlock'), pb = g('passBlock');
      if (rb >= 80 && pb >= 80) return 'Complete Lineman';
      if (pb >= rb + 5) return 'Pass Blocker';
      if (rb >= pb + 5) return 'Run Blocker';
      return 'Lineman';
    }
    case 'DL': {
      const pr = g('passRush'), rs = g('runStop');
      if (pr >= 80 && rs >= 78) return 'Complete D-Lineman';
      if (pr >= 80) return 'Pass Rusher';
      if (rs >= 80) return 'Run Stuffer';
      return 'Rotational';
    }
    case 'LB': {
      const cov = g('coverage'), rs = g('runStop'), pr = g('passRush');
      if (pr >= 78 && cov >= 72) return 'Hybrid LB';
      if (pr >= 80) return 'Edge Rusher';
      if (cov >= 80) return 'Coverage LB';
      if (rs >= 80) return 'Run Stopper';
      return 'Linebacker';
    }
    case 'DB': {
      const cov = g('coverage'), hawk = g('ballHawking'), tkl = g('tackling');
      if (hawk >= 82 && cov >= 78) return 'Ball Hawk';
      if (tkl >= 82) return 'Hit Man';
      if (cov >= 80) return 'Shutdown Corner';
      return 'Cover DB';
    }
    case 'K': {
      const pwr = g('power'), acc = g('accuracy');
      if (pwr >= 82) return 'Big Leg';
      if (acc >= 82) return 'Reliable Kicker';
      return 'Kicker';
    }
    case 'P': return g('placement') >= 80 ? 'Coffin Corner Punter' : 'Punter';
    default: return '';
  }
}

// buildDepthPositions: generates the depth chart section config dynamically based on
// what specific positions are actually present on a given team's roster.
// Falls back to generic group labels when only generic positions exist (e.g., "DL" not "DE"/"DT").
function buildDepthPositions(teamPlayers) {
  const hasAny = (group, posList) => {
    const s = new Set(teamPlayers.filter(p => p.positionGroup === group).map(p => p.position));
    return posList ? posList.some(pos => s.has(pos)) : s.size > 0;
  };

  const sections = [
    { group:'QB', label:'Quarterbacks',   slots:3 },
    { group:'RB', label:'Running Backs',  slots:4 },
    { group:'FB', label:'Fullbacks',      slots:2 },
    { group:'WR', label:'Wide Receivers', slots:5 },
    { group:'TE', label:'Tight Ends',     slots:3 },
  ];

  // OL excluded — no reliable individual stats available

  // ── Defensive Line: split edge vs interior if available ────────────────
  const hasEdge     = hasAny('DL', ['DE','EDGE']);
  const hasInterior = hasAny('DL', ['DT','NT']);
  if (hasEdge || hasInterior) {
    const usedDL = [];
    if (hasEdge)     { sections.push({ group:'DL', label:'Edge Rushers',      slots:4, positions:['DE','EDGE'] }); usedDL.push('DE','EDGE'); }
    if (hasInterior) { sections.push({ group:'DL', label:'Interior DL',       slots:3, positions:['DT','NT'] });   usedDL.push('DT','NT'); }
    // Catch-all for generic 'DL' players not matched above
    const remainDL = [...new Set(teamPlayers.filter(p => p.positionGroup === 'DL' && !usedDL.includes(p.position)).map(p => p.position))];
    if (remainDL.length) sections.push({ group:'DL', label:'Defensive Linemen', slots:5, positions: remainDL });
  } else {
    sections.push({ group:'DL', label:'Defensive Line', slots:7 });
  }

  // ── Linebackers: split MLB/ILB vs OLB if available ────────────────────
  const hasOLB = hasAny('LB', ['OLB']);
  const hasMLB = hasAny('LB', ['MLB','ILB']);
  if (hasOLB || hasMLB) {
    const usedLB = [];
    if (hasOLB) { sections.push({ group:'LB', label:'Outside Linebackers', slots:3, positions:['OLB'] }); usedLB.push('OLB'); }
    if (hasMLB) { sections.push({ group:'LB', label:'Middle Linebackers',  slots:3, positions:['MLB','ILB'] }); usedLB.push('MLB','ILB'); }
    const remainLB = [...new Set(teamPlayers.filter(p => p.positionGroup === 'LB' && !usedLB.includes(p.position)).map(p => p.position))];
    if (remainLB.length) sections.push({ group:'LB', label:'Linebackers', slots:4, positions: remainLB });
  } else {
    sections.push({ group:'LB', label:'Linebackers', slots:5 });
  }

  // ── Defensive Backs: split CB vs Safeties if available ────────────────
  const hasCB  = hasAny('DB', ['CB']);
  const hasSaf = hasAny('DB', ['S','FS','SS']);
  if (hasCB || hasSaf) {
    const usedDB = [];
    if (hasCB)  { sections.push({ group:'DB', label:'Cornerbacks', slots:4, positions:['CB'] }); usedDB.push('CB'); }
    if (hasSaf) { sections.push({ group:'DB', label:'Safeties',    slots:3, positions:['S','FS','SS'] }); usedDB.push('S','FS','SS'); }
    const remainDB = [...new Set(teamPlayers.filter(p => p.positionGroup === 'DB' && !usedDB.includes(p.position)).map(p => p.position))];
    if (remainDB.length) sections.push({ group:'DB', label:'Defensive Backs', slots:5, positions: remainDB });
  } else {
    sections.push({ group:'DB', label:'Defensive Backs', slots:7 });
  }

  sections.push({ group:'K', label:'Kickers', slots:2 });
  sections.push({ group:'P', label:'Punters',  slots:2 });
  return sections;
}

// ── Color helpers ──────────────────────────────────────────────────────────
const ratingColor = v => {
  if (v >= 95) return '#ffd700';
  if (v >= 88) return '#a78bfa';
  if (v >= 80) return '#00c853';
  if (v >= 70) return '#8bc34a';
  if (v >= 60) return '#ffc107';
  if (v >= 50) return '#ff9800';
  return '#f44336';
};

const tierBadge = v => {
  if (v >= 95) return '<span class="tier-badge tier-dynasty">Dynasty</span>';
  if (v >= 88) return '<span class="tier-badge tier-impact">Impact</span>';
  return '';
};

// ── Data loading ───────────────────────────────────────────────────────────
async function loadData() {
  const base = 'app/assets/data/';
  let projectedYears = new Set();
  try {
    const meta = await fetch(base + 'years_meta.json').then(r => r.json());
    years = [...(meta.seasons || []), ...(meta.projected || [])].sort((a, b) => a - b);
    projectedYears = new Set(meta.projected || []);
  } catch {
    try { years = await fetch(base + 'years.json').then(r => r.json()); }
    catch { years = [2024]; }
  }

  const yearSel = document.getElementById('year-select');
  yearSel.innerHTML = years.map(y =>
    `<option value="${y}">${y}${projectedYears.has(y) ? ' (Projected)' : ' Season'}</option>`
  ).join('');
  yearSel.value = years[years.length - 1];
  yearSel.onchange = e => { currentYear = parseInt(e.target.value); onDataReady(); };

  for (const y of years) {
    const yb = base + y + '/';
    try {
      const [tp, pp, rat] = await Promise.all([
        fetch(yb + 'teams_private.json').then(r => r.json()),
        fetch(yb + 'players_private.json').then(r => r.json()),
        fetch(yb + 'ratings.json').then(r => r.json()),
      ]);
      dataByYear[y] = { teams: tp, players: pp, ratings: rat };
    } catch (e) { console.warn(`Failed to load ${y}:`, e); }
  }

  currentYear = years[years.length - 1];
  onDataReady();
}

function getData() { return dataByYear[currentYear] || {}; }
function getTeams() { return getData().teams || []; }
function getPlayers() { return getData().players || []; }
function getRatings() { return getData().ratings || []; }

function onDataReady() {
  buildConfFilter();
  const teams = getTeams();
  if (teams.length) {
    const prev = teams.find(t => t.id === selectedTeamId);
    if (prev) selectedTeamId = prev.id;
    else selectedTeamId = teams[0].id;
  }
  renderActiveTab();
}

function buildConfFilter() {
  const confs = [...new Set(getTeams().map(t => t.conference).filter(Boolean))].sort();
  const sel = document.getElementById('conf-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Conferences</option>' +
    confs.map(c => `<option value="${c}">${c}</option>`).join('');
  if (confs.includes(cur)) sel.value = cur;
}

function renderTeamList() {
  const search = document.getElementById('search').value.toLowerCase();
  const conf = document.getElementById('conf-filter').value;
  let teams = getTeams().filter(t => {
    return t.name.toLowerCase().includes(search) && (!conf || t.conference === conf);
  });
  teams.sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  if (activeTab === 'teams') renderTeams(teams);
}

function renderTeams(filteredTeams) {
  if (!filteredTeams) {
    const search = document.getElementById('search').value.toLowerCase();
    const conf = document.getElementById('conf-filter').value;
    filteredTeams = getTeams().filter(t =>
      t.name.toLowerCase().includes(search) && (!conf || t.conference === conf)
    );
    filteredTeams.sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  }
  document.getElementById('tab-content').innerHTML = `
    <div style="margin-bottom:12px;font-size:13px;color:var(--text-muted)">${filteredTeams.length} teams — click to view roster</div>
    <div class="team-grid">
      ${filteredTeams.map(t => {
        const ovr = t.ratings?.overall || 0;
        return `<div class="team-card ${t.id === selectedTeamId ? 'active' : ''}" onclick="selectTeam(${t.id})">
          ${t.logoUrl ? `<img class="team-card-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : '<div style="width:36px"></div>'}
          <div class="team-card-info">
            <div class="team-card-name">${t.name}</div>
            <div class="team-card-conf">${t.conference || ''}</div>
          </div>
          <span class="team-card-ovr" style="background:${ratingColor(ovr)};color:#000">${ovr}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function selectTeam(id) {
  selectedTeamId = id;
  posFilter = 'ALL';
  switchTab('roster', false);
  const t = getTeams().find(t => t.id === id);
  if (t) renderRoster(t);
}

function switchTab(tab, render = true) {
  activeTab = tab;
  document.getElementById('tab-content').classList.toggle('map-mode', tab === 'map');
  const tabs = ['teams','roster','depth','schedule','top-players','conferences','compare','map','explain'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.bottom-tab-bar button[data-btab]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.btab === tab);
  });
  if (render) renderActiveTab();
}

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.t === t);
  });
  // Redraw team radar so it picks up new theme colors
  if (window._teamRadarChart) { window._teamRadarChart.destroy(); window._teamRadarChart = null; requestAnimationFrame(() => initTeamRadar()); }
}

function renderActiveTab() {
  const t = getTeams().find(t => t.id === selectedTeamId);
  if (activeTab === 'teams') renderTeams();
  else if (activeTab === 'roster') { if (t) renderRoster(t); else switchTab('teams'); }
  else if (activeTab === 'depth') { if (t) renderDepth(t); else switchTab('teams'); }
  else if (activeTab === 'schedule') { if (t) renderSchedule(t); else switchTab('teams'); }
  else if (activeTab === 'top-players') renderTopPlayers();
  else if (activeTab === 'conferences') renderConferences();
  else if (activeTab === 'compare') renderCompare();
  else if (activeTab === 'map') renderMap();
  else if (activeTab === 'explain') renderExplain();
}

// ── Team header HTML (shared by Roster + Depth) ───────────────────────────
function teamHeaderHTML(t) {
  const r = t.ratings || {};
  const accentStyle = t.primaryColor ? `border-color:${t.primaryColor}` : '';
  const radarKeys = ['passOff','runOff','passDef','runDef','specialTeams'];
  const radarLabels = {passOff:'Pass Off',runOff:'Run Off',passDef:'Pass Def',runDef:'Run Def',specialTeams:'Spec'};
  const radarData = JSON.stringify(radarKeys.map(k => ({ k, v: r[k] || 0 })));
  return `
    <div class="team-hero" ${accentStyle ? `style="${accentStyle}"` : ''}>
      ${t.logoUrl ? `<img class="team-hero-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : ''}
      <div class="team-hero-info">
        <div class="team-hero-name">${t.name}${t.mascot ? ' ' + t.mascot : ''}</div>
        <div class="team-hero-meta">${[t.conference, t.stadiumName, t.city && t.state ? `${t.city}, ${t.state}` : ''].filter(Boolean).join(' · ')}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
          <span style="font-size:28px;font-weight:900;color:${ratingColor(r.overall||0)}">${r.overall || '—'}</span>

function initTeamRadar() {
  const canvas = document.getElementById('team-radar');
  if (!canvas || typeof Chart === 'undefined') return;
  const dataEl = document.getElementById('team-radar-data');
  if (!dataEl) return;
  const data = JSON.parse(dataEl.textContent);
  if (window._teamRadarChart) { window._teamRadarChart.destroy(); window._teamRadarChart = null; }
  const style = getComputedStyle(document.documentElement);
  const accent = style.getPropertyValue('--accent').trim() || '#4f9cf9';
  const textMuted = style.getPropertyValue('--text-muted').trim() || '#aaa';
  const surfaceDeep = style.getPropertyValue('--surface-deep').trim() || '#0f1b2e';
  window._teamRadarChart = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: data.map(d => d.k === 'passOff' ? 'Pass Off' : d.k === 'runOff' ? 'Run Off' : d.k === 'passDef' ? 'Pass Def' : d.k === 'runDef' ? 'Run Def' : 'Spec'),
      datasets: [{
        data: data.map(d => d.v),
        backgroundColor: accent + '28',
        borderColor: accent,
        borderWidth: 2,
        pointBackgroundColor: accent,
        pointRadius: 3,
      }]
    },
    options: {
      responsive: false,
      scales: {
        r: {
          min: 55, max: 99,
          ticks: { display: false },
          grid: { color: surfaceDeep },
          angleLines: { color: surfaceDeep },
          pointLabels: { color: textMuted, font: { family: "'Barlow Condensed', sans-serif", size: 10, weight: '600' } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

  filtered.sort((a, b) => {

    if (sortCol === 'name') { va = a.lastName; vb = b.lastName; }
    else if (sortCol === 'pos') { va = a.position; vb = b.position; }
    else if (sortCol === 'yr') { va = a.year || 0; vb = b.year || 0; }

    else { va = ra[sortCol] || 0; vb = rb[sortCol] || 0; }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);

        const yearDisplay = p.status === 'recruit' ? 'Fr'

        const statusPill = p.status === 'transferred_out' ? '<span class="status-pill out">Out</span>'

          : p.status === 'transfer_in' ? '<span class="status-pill in">Transfer</span>'
          : p.status === 'recruit' ? '<span class="status-pill recruit">Recruit</span>' : '';
        const ovr = r.overall || 0;
        const isReturning = p.status !== 'transfer_in' && p.status !== 'recruit';
        const isDraftEligible = currentYear === 2026 && isReturning
          && p.positionGroup !== 'OL' && p.year >= 3 && ovr >= 85;

// ── Phase 2: Lazy-load caches ──────────────────────────────────────────────
const _scheduleCache = {};
const _gamelogCache  = {};
const _drivesCache   = {};
const _playsCache    = {};  // keyed by `${year}_wk${week}`

// Fetch JSON, preferring .json.gz (browser-native decompression) then .json fallback
async function _fetchJson(base) {
  const gz = base + '.gz';
  try {
    const r = await fetch(gz);
    if (r.ok && typeof DecompressionStream !== 'undefined') {
      const ds = new DecompressionStream('gzip');
      const blob = await new Response(r.body.pipeThrough(ds)).blob();
      return JSON.parse(await blob.text());
    }
  } catch { /* fall through */ }
  return fetch(base).then(r => r.json());
}

async function loadSchedule(year) {
  if (_scheduleCache[year]) return _scheduleCache[year];
  try {
    const data = await _fetchJson(`app/assets/data/${year}/team_schedule.json`);
    _scheduleCache[year] = data;
    return data;
  } catch { return []; }
}

async function loadGamelog(year) {
  if (_gamelogCache[year]) return _gamelogCache[year];
  try {
    const data = await _fetchJson(`app/assets/data/${year}/player_gamelog.json`);
    _gamelogCache[year] = data;
    return data;
  } catch { return {}; }
}

async function loadDrives(year) {
  if (_drivesCache[year]) return _drivesCache[year];
  try {
    const data = await _fetchJson(`app/assets/data/${year}/team_drives.json`);
    _drivesCache[year] = data;
    return data;
  } catch { return {}; }
}

async function loadPlaysForWeek(year, week) {
  const key = `${year}_wk${week}`;
  if (_playsCache[key]) return _playsCache[key];
  try {
    const wk = String(week || 0).padStart(2, '0');
    const data = await _fetchJson(`app/assets/data/${year}/team_plays_wk${wk}.json`);
    _playsCache[key] = data;
    return data;
  } catch { return {}; }
}

// ── Schedule Tab ───────────────────────────────────────────────────────────
async function renderSchedule(t) {
  document.getElementById('tab-content').innerHTML = `${teamHeaderHTML(t)}<div id="loading">Loading schedule...</div>`;
  const schedule = await loadSchedule(currentYear);
  const games = schedule.filter(g => g.homeTeam === t.name || g.awayTeam === t.name)
                        .sort((a, b) => (a.week || 0) - (b.week || 0));

  if (!games.length) {
    document.getElementById('tab-content').innerHTML = `${teamHeaderHTML(t)}<div style="color:#666;padding:20px">No schedule data available for ${currentYear}.</div>`;
    return;
  }

  const rows = games.map(g => {
    const isHome = g.homeTeam === t.name;
    const opponent = isHome ? g.awayTeam : g.homeTeam;
    const myScore  = isHome ? g.homeScore : g.awayScore;
    const oppScore = isHome ? g.awayScore : g.homeScore;
    const oppSp    = isHome ? g.awaySpRank : g.homeSpRank;
    const loc = g.neutralSite ? 'N' : (isHome ? 'vs' : '@');
    let result = '-', resultColor = '#aaa';
    if (myScore != null && oppScore != null) {
      const win = myScore > oppScore;
      result = `${win ? 'W' : 'L'} ${myScore}-${oppScore}`;
      resultColor = win ? '#00c853' : '#f44336';
    }
    const margin = (myScore != null && oppScore != null) ? (myScore - oppScore) : null;
    return `<tr class="clickable" onclick="showGameDetail(${g.gameId}, '${t.name.replace(/'/g,"\\'")}')">
      <td>${g.week ?? '-'}</td>
      <td style="color:#aaa;font-size:11px">${loc}</td>
      <td>${opponent}</td>
      <td style="color:${resultColor};font-weight:700">${result}</td>
      <td style="color:${margin != null ? (margin > 0 ? '#8bc34a' : '#f44336') : '#aaa'}">${margin != null ? (margin > 0 ? `+${margin}` : margin) : '-'}</td>
      <td style="color:#aaa;font-size:11px">${oppSp != null ? `SP+ ${oppSp}` : '-'}</td>
    </tr>`;
  }).join('');

  document.getElementById('tab-content').innerHTML = `
    ${teamHeaderHTML(t)}
    <div style="padding:12px 0" class="table-scroll-wrap">
      <table class="roster-table" style="width:100%">
        <thead><tr>
          <th onclick="void(0)">Wk</th>
          <th></th>
          <th onclick="void(0)">Opponent</th>
          <th onclick="void(0)">Result</th>
          <th onclick="void(0)">Margin</th>
          <th onclick="void(0)">Opp SP+</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div id="game-detail-panel"></div>`;
}

async function showGameDetail(gameId, teamName) {
  const schedule = await loadSchedule(currentYear);
  const game = schedule.find(g => g.gameId === gameId);
  if (!game) return;

  const gamelog = await loadGamelog(currentYear);
  const rMap = buildRatingMap();
  const players = getPlayers();

  // Find top performers for both teams in this game
  function topPerformers(squadName) {
    const squad = players.filter(p => {
      const t = getTeams().find(t => t.id === p.teamId);
      return t && t.name === squadName;
    });
    const perf = [];
    for (const p of squad) {
      const lg = gamelog[p.id] || gamelog[String(p.id)];
      if (!lg) continue;
      const entry = lg.find(e => e.gameId === gameId);
      if (!entry || !entry.stats) continue;
      const r = rMap[p.id] || rMap[String(p.id)] || {};
      perf.push({ p, stats: entry.stats, ovr: r.overall || 0 });
    }
    perf.sort((a, b) => b.ovr - a.ovr);
    return perf.slice(0, 5);
  }

  function perfRows(performers) {
    return performers.map(({ p, stats, ovr }) => {
      const statStr = Object.entries(stats).slice(0, 4)
        .map(([k, v]) => `${k}: ${v}`).join(' · ');
      return `<div class="depth-row" onclick="showPlayerModal('${p.id}')" style="cursor:pointer">
        <span class="pos-badge" style="flex-shrink:0">${p.position || p.positionGroup}</span>
        <span style="flex:1;padding:0 8px">${p.firstName} ${p.lastName}</span>
        <span class="ovr" style="background:${ratingColor(ovr)};color:#000;flex-shrink:0">${ovr}</span>
        <span style="font-size:11px;color:#aaa;flex-shrink:0;padding-left:8px">${statStr}</span>
      </div>`;
    }).join('') || '<div style="color:#555;font-size:12px;padding:8px">No game log data</div>';
  }

  const homePerf = topPerformers(game.homeTeam);
  const awayPerf = topPerformers(game.awayTeam);
  const panel = document.getElementById('game-detail-panel');
  if (!panel) return;
  panel.innerHTML = `
    <div style="margin-top:20px;border:1px solid var(--border-mid);border-radius:8px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0;font-size:14px;color:var(--accent)">Week ${game.week} — ${game.awayTeam} @ ${game.homeTeam}</h3>
        <span style="font-size:13px;color:#aaa">${game.awayScore ?? '?'} – ${game.homeScore ?? '?'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:6px">${game.awayTeam}</div>
          ${perfRows(awayPerf)}
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:6px">${game.homeTeam}</div>
          ${perfRows(homePerf)}
        </div>
      </div>
    </div>`;

  // Append drive-level breakdown (lazy — only fetched on game click)
  const [drivesData, playsData] = await Promise.all([loadDrives(currentYear), loadPlaysForWeek(currentYear, game.week)]);
  const driveTeam = game.homeTeam; // show home team drives
  const teamDrives = (drivesData[driveTeam] || []).filter(d => d.gameId === gameId);
  const teamPlays  = (playsData[driveTeam]  || []).filter(p => p.gameId === gameId);

  if (!teamDrives.length) return;

  const driveRows = teamDrives.map((d, idx) => {
    const scoreDot = d.scoring ? '<span style="color:#00c853"> ●</span>' : '';
    const drivePlays = teamPlays.filter(p => p.driveNumber === d.driveNumber);
    const playRows = drivePlays.map(pl => {
      const epaColor = pl.ppa > 0 ? '#8bc34a' : pl.ppa < 0 ? '#f44336' : '#aaa';
      return `<tr style="background:var(--surface-deep);font-size:11px">
        <td style="padding:4px 8px;color:#aaa">${pl.down ? `${pl.down}&amp;${pl.distance}` : '-'}</td>
        <td style="padding:4px 8px">${pl.playType || '-'}</td>
        <td style="padding:4px 8px;color:#ccc;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pl.playText || ''}</td>
        <td style="padding:4px 8px;text-align:right">${pl.yardsGained ?? '-'}</td>
        <td style="padding:4px 8px;text-align:right;color:${epaColor}">${pl.ppa != null ? pl.ppa.toFixed(2) : '-'}</td>
      </tr>`;
    }).join('');

    const playsSection = drivePlays.length ? `
      <tr id="drive-plays-${idx}" style="display:none"><td colspan="6" style="padding:0 0 4px 16px">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="font-size:10px;color:#666">
            <th style="padding:3px 8px;text-align:left">D&amp;D</th>
            <th style="padding:3px 8px;text-align:left">Type</th>
            <th style="padding:3px 8px;text-align:left">Play</th>
            <th style="padding:3px 8px;text-align:right">Yds</th>
            <th style="padding:3px 8px;text-align:right">EPA</th>
          </tr></thead>
          <tbody>${playRows}</tbody>
        </table>
      </td></tr>` : '';

    return `<tr class="clickable" onclick="toggleDrivePlays(${idx})" style="border-top:1px solid var(--border)">
      <td style="padding:6px 8px;color:#aaa;font-size:11px">#${d.driveNumber ?? idx+1}</td>
      <td style="padding:6px 8px;font-weight:700;color:${d.scoring ? '#00c853' : '#ccc'}">${d.result || '-'}${scoreDot}</td>
      <td style="padding:6px 8px;color:#aaa">${d.plays ?? '-'} plays</td>
      <td style="padding:6px 8px;color:#aaa">${d.yards ?? '-'} yds</td>
      <td style="padding:6px 8px;color:#aaa;font-size:11px">${d.startScore ?? '?'}→${d.endScore ?? '?'}</td>
      <td style="padding:6px 8px;color:#555;font-size:10px">${drivePlays.length ? '▶' : ''}</td>
    </tr>${playsSection}`;
  }).join('');

  const drivesPanel = document.getElementById('game-detail-panel');
  if (drivesPanel) drivesPanel.innerHTML += `
    <div style="margin-top:12px;border:1px solid var(--border-mid);border-radius:8px;padding:16px">
      <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:8px">${driveTeam} Drives</div>
      <div class="table-scroll-wrap"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="font-size:10px;color:#666">
          <th style="padding:3px 8px;text-align:left">Drive</th>
          <th style="padding:3px 8px;text-align:left">Result</th>
          <th style="padding:3px 8px;text-align:left">Plays</th>
          <th style="padding:3px 8px;text-align:left">Yards</th>
          <th style="padding:3px 8px;text-align:left">Score</th>
          <th></th>
        </tr></thead>
        <tbody>${driveRows}</tbody>
      </table></div>
    </div>`;
}

function toggleDrivePlays(idx) {
  const row = document.getElementById(`drive-plays-${idx}`);
  if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';

        </tr>`;
      }).join('')}

    <div style="padding:8px;color:#666;font-size:11px">
      ${topSearch ? `${filtered.length} results` : `Top ${displayList.length} of ${filtered.length}`} &bull; click a player for detail
    </div>`;
}

function onTopSearch(val) { topSearch = val.toLowerCase(); renderTopPlayers(); }
function onTopPos(val) { topPosFilter = val; renderTopPlayers(); }
function sortTopBy(col) {
  if (topSortCol === col) topSortAsc = !topSortAsc;
  else { topSortCol = col; topSortAsc = col === 'name' || col === 'team' || col === 'pos'; }
  renderTopPlayers();
}
function goToTeam(teamId) { selectTeam(teamId, true); }

// ── Conferences Tab ────────────────────────────────────────────────────────
function renderConferences() {
  const teams = getTeams();
  const confMap = {};
  for (const t of teams) {
    const c = t.conference || 'Independent';
    if (!confMap[c]) confMap[c] = [];
    confMap[c].push(t);
  }
  const power4 = ['SEC','Big Ten','Big 12','ACC'];
  const confNames = [...power4.filter(c => confMap[c]), ...Object.keys(confMap).filter(c => !power4.includes(c)).sort()];

  document.getElementById('tab-content').innerHTML = confNames.map(conf => {
    const confTeams = confMap[conf].sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
    return `<div class="conf-section">
      <div class="conf-title">${conf} <span style="font-size:11px;color:#555;font-weight:400">${confTeams.length} teams</span></div>
      ${confTeams.map((t, i) => {
        const ovr = t.ratings?.overall || 0;
        const r = t.ratings || {};
        return `<div class="conf-team-row" onclick="selectTeam(${t.id})">
          <span class="conf-rank ${i < 3 ? 'top3' : ''}">${i+1}</span>
          ${t.logoUrl ? `<img class="conf-team-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : ''}
          <div class="conf-team-name">${t.name}</div>
          <div style="display:flex;gap:6px;font-size:10px;color:#888">
            <span>OFF ${r.passOff||0}/${r.runOff||0}</span>
            <span>DEF ${r.passDef||0}/${r.runDef||0}</span>
          </div>
          <span class="conf-ovr" style="background:${ratingColor(ovr)};color:#000">${ovr}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// ── Compare Tab ────────────────────────────────────────────────────────────
function startCompare(teamId) {
  compareTeamId = teamId;
  switchTab('compare');
}

function renderCompare() {
  const teams = getTeams().slice().sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  const leftTeam = getTeams().find(t => t.id === selectedTeamId);
  const rightTeam = compareTeamId ? getTeams().find(t => t.id === compareTeamId) : null;

  const teamOptions = teams.map(t =>
    `<option value="${t.id}" ${t.id === compareTeamId ? 'selected' : ''}>${t.name} (${t.ratings?.overall || '?'})</option>`
  ).join('');

  let compHTML = '';
  if (leftTeam && rightTeam) {
    const cats = [
      ['overall','Overall'],['passOff','Pass Off'],['runOff','Run Off'],
      ['passDef','Pass Def'],['runDef','Run Def'],['specialTeams','Spec Teams'],
    ];
    const lr = leftTeam.ratings || {}, rr = rightTeam.ratings || {};
    compHTML = `
      <div class="compare-section-title">Team Ratings</div>
      ${cats.map(([k, label]) => {
        const lv = lr[k] || 0, rv = rr[k] || 0;
        const max = Math.max(lv, rv, 1);
        const lPct = (lv / 99) * 100, rPct = (rv / 99) * 100;
        const lWin = lv >= rv;
        return `<div class="compare-head-row">
          <span class="compare-val-left" style="color:${ratingColor(lv)}">${lv}</span>
          <div class="compare-bars">
            <div style="flex:1;display:flex;justify-content:flex-end">
              <div class="compare-bar-left" style="width:${lPct}%;background:${lWin ? ratingColor(lv) : '#2a4070'}"></div>
            </div>
            <div class="compare-center"></div>
            <div style="flex:1">
              <div class="compare-bar-right" style="width:${rPct}%;background:${!lWin ? ratingColor(rv) : '#2a4070'}"></div>
            </div>
          </div>
          <span class="compare-val-right" style="color:${ratingColor(rv)}">${rv}</span>
          <span class="compare-cat-label" style="width:80px;text-align:center;font-size:11px;color:#666">${label}</span>
        </div>`;
      }).join('')}
      ${renderPositionGroupComparison(leftTeam, rightTeam)}
    `;
  } else if (leftTeam) {
    compHTML = `<div style="color:#666;padding:20px 0">Select a team on the right to compare.</div>`;
  }

  document.getElementById('tab-content').innerHTML = `
    <div class="compare-controls">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        ${leftTeam ? `
          <img src="${leftTeam.logoUrl}" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'">
          <div>
            <div style="font-weight:700">${leftTeam.name}</div>
            <div style="font-size:11px;color:#888">${leftTeam.conference||''}</div>
          </div>` : '<span style="color:#666">Select a team from sidebar</span>'}
        <span style="color:#444;font-size:20px;margin:0 8px">vs</span>
        <select onchange="compareTeamId=parseInt(this.value);renderCompare()" style="padding:8px 12px;background:var(--input-bg);border:1px solid var(--border-mid);color:var(--text);font-size:13px;border-radius:4px;cursor:pointer;min-width:200px">
          <option value="">-- Select opponent --</option>
          ${teamOptions}
        </select>
      </div>
    </div>
    ${compHTML}`;
}

function renderPositionGroupComparison(leftTeam, rightTeam) {
  const rMap = buildRatingMap();
  const allPlayers = getPlayers();

  function getGroupRating(team, group) {
    const ps = allPlayers.filter(p => p.teamId === team.id && p.positionGroup === group);
    const vals = ps.map(p => rMap[p.id]?.overall || 0).sort((a,b) => b-a).slice(0, 5);
    return vals.length ? Math.round(vals.reduce((s,v) => s+v, 0) / vals.length) : 0;
  }

  const groups = [
    { group:'QB', label:'QB' }, { group:'RB', label:'RB' }, { group:'WR', label:'WR' },
    { group:'TE', label:'TE' }, { group:'DL', label:'DL' },
    { group:'LB', label:'LB' }, { group:'DB', label:'DB' },
  ];

  const rows = groups.map(({ group, label }) => {
    const lv = getGroupRating(leftTeam, group);
    const rv = getGroupRating(rightTeam, group);
    if (!lv && !rv) return '';
    const lWin = lv >= rv;
    const lPct = (lv / 99) * 100, rPct = (rv / 99) * 100;
    return `<div class="compare-head-row">
      <span class="compare-val-left" style="color:${ratingColor(lv)}">${lv||'-'}</span>
      <div class="compare-bars">
        <div style="flex:1;display:flex;justify-content:flex-end">
          <div class="compare-bar-left" style="width:${lPct}%;background:${lWin ? ratingColor(lv) : '#2a4070'}"></div>
        </div>
        <div class="compare-center"></div>
        <div style="flex:1">
          <div class="compare-bar-right" style="width:${rPct}%;background:${!lWin ? ratingColor(rv) : '#2a4070'}"></div>
        </div>
      </div>
      <span class="compare-val-right" style="color:${ratingColor(rv)}">${rv||'-'}</span>
      <span class="compare-cat-label" style="width:80px;text-align:center;font-size:11px;color:#666">${label}</span>
    </div>`;
  }).join('');

  return `<div class="compare-section-title">Position Groups</div>${rows}`;
}

// ── Player Modal ───────────────────────────────────────────────────────────
function showPlayerModal(playerId) {
  // Find player in current year — coerce to string since IDs are strings in JSON
  const pid = String(playerId);
  const players = getPlayers();
  const p = players.find(pl => String(pl.id) === pid);
  if (!p) return;

  const rMap = buildRatingMap();
  const r = rMap[pid] || {};
  const teamMap = buildTeamMap();
  const team = teamMap[p.teamId] || {};
  const posGroup = p.positionGroup;
  const ovr = r.overall || 0;

  // Skill bars
  const skills = SKILL_ATTRS[posGroup] || [];
  const skillBarsHTML = skills.map(([key, label]) => {
    const val = r[key] || 0;

    return `<div class="skill-row">

  // Year-over-year progression

    const yPlayers = yData.players;
    const yTeams = yData.teams;
    const yRatings = yData.ratings;
    if (!yPlayers || !yRatings) return null;
    const yp = yPlayers.find(pl => String(pl.id) === pid);
    if (!yp) return null;
    const yr = yRatings.find(rr => String(rr.playerId) === pid);
    if (!yr) return null;
    const yTeam = (yTeams || []).find(t => t.id === yp.teamId);
    const yTeamName = yTeam ? yTeam.name : '';
    const ySkills = (SKILL_ATTRS[posGroup] || []).map(([k, lbl]) =>
      yr[k] != null ? `<td style="color:${ratingColor(yr[k])}">${yr[k]}</td>` : '<td>-</td>'
    ).join('');
    const yStats = yr.stats || {};
    const yStatsStr = statDefs.filter(([k]) => yStats[k] != null && yStats[k] !== 0)

      ${ySkills}
      <td style="font-size:10px;color:#888">${yStatsStr}</td>
    </tr>`;
  }).filter(Boolean);

  const yoyHTML = yoyRows.length > 1 ? `<div class="modal-section">
    <div class="modal-section-title">Year-over-Year</div>
    <table class="yoy-table">
      <tr>
        <th>Year</th><th>Team</th><th>OVR</th>
        ${(SKILL_ATTRS[posGroup] || []).map(([,lbl]) => `<th>${lbl}</th>`).join('')}
        <th>Key Stats</th>
      </tr>
      ${yoyRows.join('')}
    </table>
  </div>` : '';

  // National + conference rank and similarity (need all players + teams)
  const allPlayers = getPlayers();
  const allTeams = getTeams();
  const positionPeers = allPlayers.filter(pl => pl.positionGroup === posGroup);
  const sortedByOvr = positionPeers.slice().sort((a, b) => (rMap[String(b.id)]?.overall || 0) - (rMap[String(a.id)]?.overall || 0));
  const natRank = sortedByOvr.findIndex(pl => String(pl.id) === pid) + 1;
  const teamConf = (allTeams.find(t => t.id === p.teamId) || {}).conference || '';
  const confPeers = teamConf ? positionPeers.filter(pl => (allTeams.find(t => t.id === pl.teamId) || {}).conference === teamConf) : [];
  const confSorted = confPeers.slice().sort((a, b) => (rMap[String(b.id)]?.overall || 0) - (rMap[String(a.id)]?.overall || 0));
  const confRank = confSorted.findIndex(pl => String(pl.id) === pid) + 1;
  const rankHTML = natRank > 0 ? `
    <div style="display:flex;gap:16px;margin-top:6px">
      <div style="font-size:11px;color:#888">National <span style="color:${natRank<=10?'#ffd700':natRank<=25?'#a78bfa':'#e0e0e0'};font-weight:700;font-size:13px">#${natRank}</span> ${posGroup}</div>

    </div>` : '';

  // Career stats: sum additive stats across all years where the player appears
  const careerTotals = {};
  const CAREER_ADDITIVE = {
    QB:  ['passYds','passTDs','comp','ints','rushYds'],
    RB:  ['rushYds','rushTDs','recYds','recTDs'],
    FB:  ['rushYds','rushTDs','recYds'],
    WR:  ['recYds','recTDs','receptions'],
    TE:  ['recYds','recTDs','receptions'],
    DL:  ['tackles','sacks','tfl','qbh','ff'],
    LB:  ['tackles','sacks','ints','pds','tfl','ff'],
    DB:  ['tackles','ints','pds','ff','tfl'],
    K:   ['fgm','fga','xpm'],

  };
  const careerKeys = CAREER_ADDITIVE[posGroup] || [];
  let careerYears = 0;
  for (const y of years) {
    const yData = dataByYear[y];
    if (!yData) continue;
    const yRatings = yData.ratings;
    if (!yRatings) continue;
    const yr = yRatings.find(rr => String(rr.playerId) === pid);
    if (!yr) continue;
    const yStats = yr.stats || {};
    careerYears++;
    for (const k of careerKeys) {
      if (yStats[k] != null && yStats[k] !== 0) careerTotals[k] = (careerTotals[k] || 0) + yStats[k];
    }

  const careerCells = careerKeys.filter(k => careerTotals[k]).map(k => {
    const lbl = (STAT_LABELS[posGroup] || []).find(([sk]) => sk === k)?.[1] || k;
    const val = typeof careerTotals[k] === 'number' && !Number.isInteger(careerTotals[k])

    return `<div class="stat-cell"><div class="sv">${val}</div><div class="sk">${lbl}</div></div>`;
  }).join('');
  const careerHTML = careerCells && careerYears > 1 ? `<div class="modal-section">
    <div class="modal-section-title">Career Totals (${careerYears} seasons)</div>
    <div class="stat-grid">${careerCells}</div>
  </div>` : '';

  // Similar players
  const similar = computeSimilar(pid, posGroup, rMap, allPlayers, allTeams, 6);
  const similarHTML = similar.length ? `<div class="modal-section">
    <div class="modal-section-title">Similar Players (${currentYear})</div>

      <div class="sim-row" onclick="showPlayerModal('${sp.id}')">

          <div class="sim-team">${st.name || ''}</div>
        </div>
        <span class="pos-badge" style="flex-shrink:0">${sp.position || posGroup}</span>
      </div>`).join('')}

  const _yearLabels = ['','Fr','So','Jr','Sr','Gr'];
  const classYear = _yearLabels[Math.min(p.year || 1, 5)] || (p.year || 'Fr');
  const classYearDisplay = p.yearPrev != null
    ? `${_yearLabels[Math.min(p.yearPrev, 5)] || p.yearPrev} → ${classYear}`

  const projTypeLabels = { returning: 'Returning', transfer: 'Transfer', recruit: 'Recruit', unknown: 'New Player' };
  const projRangeHTML = r.projected && r.overallLow != null && r.overallHigh != null
    ? (() => {
        const label = projTypeLabels[r.projectionType] || 'Projected';

          <span style="font-size:10px;color:#555"> (projected season)</span>
        </div>`;
      })()
    : '';
  const trajectoryHTML = r.trajectory && !r.projected
    ? `<div style="margin-top:6px;font-size:12px;color:#aaa">Trajectory: <span style="color:${ratingColor(r.trajectory)};font-weight:700">${r.trajectory}</span> <span style="font-size:10px;color:#555">(projected)</span></div>`
    : '';

  const overviewHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Skill Ratings</div>
      ${skills.length ? skillBarsHTML : '<div style="color:var(--text-dim);font-size:12px">No skill data available</div>'}
    </div>
    ${statsHTML}
    ${careerHTML}
    ${yoyHTML}

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-player-header">

      <div class="modal-player-info">

          &nbsp;${classYearDisplay}${statusBadgeHTML} &bull; #${p.jersey != null && p.jersey !== '' ? p.jersey : '?'} &bull;
          <span style="cursor:pointer;color:#a0c4ff" onclick="closeModal();goToTeam(${p.teamId})">${team.name || ''}</span>
          ${p.height ? ` &bull; ${p.height}` : ''} ${p.weight ? `/ ${p.weight} lbs` : ''}
        </div>

        ${trajectoryHTML}

    <div id="modal-tab-gamelog" style="display:none"><div style="color:#666;padding:20px;font-size:13px">Loading game log...</div></div>

function switchModalTab(tab, pid) {
  document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mtab === tab));
  document.querySelectorAll('[id^="modal-tab-"]').forEach(el => { el.style.display = el.id === `modal-tab-${tab}` ? 'block' : 'none'; });
  if (tab === 'gamelog' && pid) renderModalGamelog(pid);
}

async function renderModalGamelog(pid) {
  const el = document.getElementById('modal-tab-gamelog');
  if (!el) return;
  const gamelog = await loadGamelog(currentYear);
  const entries = gamelog[pid] || gamelog[String(pid)] || [];
  if (!entries.length) {
    el.innerHTML = '<div style="color:#555;padding:20px;font-size:13px">No game log data available for this season.</div>';
    return;
  }

  const p = getPlayers().find(pl => String(pl.id) === String(pid));
  const posGroup = p ? p.positionGroup : 'QB';
  const statDefs = STAT_LABELS[posGroup] || [];

  // Determine which stat keys actually appear
  const usedKeys = new Set();
  entries.forEach(e => Object.keys(e.stats || {}).forEach(k => usedKeys.add(k)));
  const cols = statDefs.filter(([k]) => usedKeys.has(k));

  const header = `<tr><th>Wk</th><th>Opponent</th><th>Result</th>${cols.map(([,l]) => `<th>${l}</th>`).join('')}</tr>`;

  // Compute per-stat max for highlight threshold
  const maxes = {};
  cols.forEach(([k]) => { maxes[k] = Math.max(...entries.map(e => Number(e.stats?.[k] ?? 0))); });

  const rows = entries.map(e => {
    const resultColor = e.result ? (e.result.startsWith('W') ? '#00c853' : '#f44336') : '#aaa';
    const statCells = cols.map(([k, l]) => {
      const v = e.stats?.[k] ?? '-';
      const isTop = maxes[k] > 0 && Number(v) >= maxes[k] * 0.75;
      return `<td style="${isTop ? 'color:#00c853;font-weight:700' : ''}">${v}</td>`;
    }).join('');
    return `<tr>
      <td>${e.week ?? '-'}</td>
      <td style="font-size:11px">${e.homeGame ? 'vs ' : '@ '}${e.opponent || '-'}</td>
      <td style="color:${resultColor};font-weight:700;font-size:11px">${e.result || '-'}</td>
      ${statCells}
    </tr>`;
  }).join('');

  el.innerHTML = `<div style="overflow-x:auto">
    <table class="roster-table" style="width:100%;margin-top:8px">
      <thead>${header}</thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── Similarity Score ───────────────────────────────────────────────────────
// Euclidean distance across normalized skill attributes within the same
// position group. Returns top N most similar players sorted by similarity.
function computeSimilar(pid, posGroup, rMap, allPlayers, allTeams, n = 6) {
  const skills = (SKILL_ATTRS[posGroup] || []).map(([k]) => k);
  if (!skills.length) return [];

  const ref = rMap[pid];
  if (!ref) return [];

  // Build team map for name lookup
  const tMap = {};
  allTeams.forEach(t => tMap[t.id] = t);

  // Normalize each skill to 0–1 across all players in this position group
  // to give equal weight regardless of rating scale differences
  const peers = allPlayers.filter(p => p.positionGroup === posGroup && String(p.id) !== pid);

  const results = peers.map(p => {
    const r = rMap[String(p.id)];
    if (!r) return null;
    // Euclidean distance in skill space (each skill equally weighted)
    let distSq = 0;
    for (const sk of skills) {
      const diff = (ref[sk] || 0) - (r[sk] || 0);
      distSq += diff * diff;
    }
    const dist = Math.sqrt(distSq / skills.length);  // RMS distance, 0–59 scale
    const similarity = Math.max(0, Math.round(100 - dist * 100 / 59));
    return { p, r, similarity, team: tMap[p.teamId] || {} };
  }).filter(Boolean);

  // Sort by similarity desc, exclude self, take top N
  results.sort((a, b) => b.similarity - a.similarity);
  // Filter to meaningful matches: OVR within ±15 of reference
  const refOvr = ref.overall || 0;
  return results.filter(x => Math.abs((x.r.overall || 0) - refOvr) <= 15).slice(0, n);
}

  document.getElementById('player-modal').classList.remove('open');

let _mapInstance = null;
let _mapData = null;
let _mapMarkerLayer = null;
let _mapSchool = 'All';
let _mapPos = 'All';
let _mapShowR = true;
let _mapShowT = true;

const MAP_COLORS = {
  recruit: '#E8A800',
  xferIn:  '#3db87a',
  xferOut: '#e03b2e',
  xferAll: '#6da8d8',
};
const MAP_POSITIONS = ['All','QB','RB','WR','TE','DL','EDGE','LB','CB','S','ATH','K','P','IOL','OT','OG','OC'];

async function renderMap() {
  const el = document.getElementById('tab-content');
  el.innerHTML = `<div id="portal-map-wrap" style="display:flex;height:100%;position:relative;overflow:hidden">
    <div id="portal-map-sidebar" style="width:260px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;font-size:13px"></div>
    <div style="flex:1;position:relative">
      <div id="portal-map" style="width:100%;height:100%"></div>
      <div id="portal-map-card" style="display:none;position:absolute;bottom:20px;right:20px;width:270px;background:var(--surface);border:1px solid var(--border-mid);border-radius:6px;padding:14px 16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5)"></div>
    </div>
  </div>`;

  if (!_mapData) {
    const [recruits, transfers] = await Promise.all([
      fetch('app/assets/data/map/recruits.json').then(r=>r.json()),
      fetch('app/assets/data/map/transfers.json').then(r=>r.json()),
    ]);
    _mapData = { recruits, transfers };
  }

  if (!_mapInstance) {
    const theme = document.documentElement.getAttribute('data-theme') || '';
    const tileUrl = theme === 'dark' || theme === ''
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
    _mapInstance = L.map('portal-map', {center:[38.5,-96], zoom:4, zoomControl:false, preferCanvas:true});
    L.tileLayer(tileUrl, {attribution:'© OpenStreetMap © CARTO', maxZoom:19}).addTo(_mapInstance);
    L.control.zoom({position:'bottomright'}).addTo(_mapInstance);
    _mapMarkerLayer = L.layerGroup().addTo(_mapInstance);
  } else {
    setTimeout(() => _mapInstance.invalidateSize(), 60);
  }

  _renderMapSidebar();
  _renderMapMarkers();
}

function _renderMapSidebar() {
  const { recruits, transfers } = _mapData;
  const schools = new Set(['All']);
  recruits.forEach(r => { if (r.committedTo) schools.add(r.committedTo); });
  transfers.forEach(t => { if (t.origin) schools.add(t.origin); if (t.dest) schools.add(t.dest); });
  const schoolList = Array.from(schools).sort((a,b) => a==='All'?-1:a.localeCompare(b));

  const fR = _mapFilteredRecruits();
  const fT = _mapFilteredTransfers();
  const tIn  = _mapSchool === 'All' ? fT : fT.filter(t => t.dest === _mapSchool);
  const tOut = _mapSchool === 'All' ? [] : fT.filter(t => t.origin === _mapSchool && t.dest !== _mapSchool);
  const net  = tIn.length - tOut.length;

  const sel = (id, val, opts, onch) => `<select id="${id}" style="width:100%;padding:8px 10px;background:var(--input-bg);border:1px solid var(--border-mid);color:var(--text);font-size:13px;border-radius:4px;outline:none" onchange="${onch}">${opts.map(o=>`<option value="${o}"${o===val?' selected':''}>${o}</option>`).join('')}</select>`;
  const lbl = t => `<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">${t}</div>`;
  const sec = c => `<div style="padding:12px 14px;border-bottom:1px solid var(--border)">${c}</div>`;
  const tog = (id, active, color, label, count, fn) => `<div onclick="${fn}" style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:4px;cursor:pointer;border:1px solid ${active?'var(--border)':'transparent'};background:${active?'rgba(255,255,255,0.04)':'transparent'}"><div style="width:9px;height:9px;border-radius:50%;background:${active?color:'var(--border-mid)'};flex-shrink:0"></div><span style="flex:1;font-weight:600;color:${active?'var(--text)':'var(--text-muted)'}">${label}</span><span style="font-size:12px;font-weight:700;color:${active?color:'var(--text-muted)'}">${count}</span></div>`;
  const stat = (val, label, color) => `<div style="background:var(--surface-deep);border-left:3px solid ${color};border-radius:4px;padding:10px 12px"><div style="font-size:26px;font-weight:800;color:${color};line-height:1">${val}</div><div style="font-size:11px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-top:5px;font-weight:600">${label}</div></div>`;

  document.getElementById('portal-map-sidebar').innerHTML = `
    <div style="padding:16px 14px 12px;border-bottom:1px solid var(--border)">
      <div style="font-size:22px;font-weight:800;letter-spacing:0"><span style="color:var(--text)">Portal</span><span style="color:var(--accent)">Flow</span></div>
      <div style="width:32px;height:3px;background:var(--accent);border-radius:2px;margin:6px 0 4px"></div>
      <div style="font-size:11px;color:var(--text-muted);letter-spacing:1.5px;font-weight:700;text-transform:uppercase">CFB Recruiting &amp; Portal · 2026</div>
      <div style="margin-top:6px;font-size:10px;color:var(--text-dim)">Map data currently available for 2026 only. Multi-year support coming when pipeline generates geocoded data per season.</div>
    </div>
    ${sec(lbl('School') + sel('map-school', _mapSchool, schoolList, '_mapSetSchool(this.value)'))}
    ${sec(lbl('Position') + sel('map-pos', _mapPos, MAP_POSITIONS, '_mapSetPos(this.value)'))}
    ${sec(lbl('Layers') + tog('r', _mapShowR, MAP_COLORS.recruit, '2026 Recruits', fR.length, '_mapToggleR()') + tog('t', _mapShowT, MAP_COLORS.xferAll, 'Transfers', fT.length, '_mapToggleT()'))}
    <div style="padding:12px 14px">
      ${lbl(_mapSchool === 'All' ? 'All Schools' : _mapSchool)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        ${stat(fR.length.toLocaleString(), '2026 Recruits', MAP_COLORS.recruit)}
        ${stat(fT.length.toLocaleString(), 'Total Transfers', MAP_COLORS.xferAll)}
        ${stat(tIn.length.toLocaleString(), 'Transfers In', MAP_COLORS.xferIn)}
        ${stat(tOut.length.toLocaleString(), 'Transfers Out', MAP_COLORS.xferOut)}
        ${_mapSchool !== 'All' ? `<div style="grid-column:span 2">${stat((net>0?'+':'')+net, 'Net Portal', net>0?MAP_COLORS.xferIn:net<0?MAP_COLORS.xferOut:'var(--text-muted)')}</div>` : ''}
      </div>
    </div>`;
}

function _mapFilteredRecruits() {
  if (!_mapData || !_mapShowR) return [];
  return _mapData.recruits.filter(r =>
    (_mapSchool === 'All' || r.committedTo === _mapSchool) &&
    (_mapPos === 'All' || r.pos === _mapPos) &&
    r.lat && r.lon
  );
}

function _mapFilteredTransfers() {
  if (!_mapData || !_mapShowT) return [];
  return _mapData.transfers.filter(t =>
    (_mapSchool === 'All' || t.origin === _mapSchool || t.dest === _mapSchool) &&
    (_mapPos === 'All' || t.pos === _mapPos) &&
    t.lat && t.lon
  );
}

function _renderMapMarkers() {
  if (!_mapInstance || !_mapMarkerLayer) return;
  _mapMarkerLayer.clearLayers();
  const renderer = L.canvas({ padding: 0.5 });

  _mapFilteredRecruits().forEach(r => {
    const m = L.circleMarker([r.lat, r.lon], {renderer, radius:5, fillColor:MAP_COLORS.recruit, color:'rgba(255,255,255,0.15)', weight:1, fillOpacity:0.85});
    m.on('click', () => _showMapCard(r));
    _mapMarkerLayer.addLayer(m);
  });
  _mapFilteredTransfers().forEach(t => {
    let col = MAP_COLORS.xferAll;
    if (_mapSchool !== 'All') col = t.dest === _mapSchool ? MAP_COLORS.xferIn : MAP_COLORS.xferOut;
    const m = L.circleMarker([t.lat, t.lon], {renderer, radius:5, fillColor:col, color:'rgba(255,255,255,0.15)', weight:1, fillOpacity:0.85});
    m.on('click', () => _showMapCard(t));
    _mapMarkerLayer.addLayer(m);
  });
}

function _mapSetSchool(v) { _mapSchool = v; _renderMapSidebar(); _renderMapMarkers(); }
