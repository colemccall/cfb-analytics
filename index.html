// ── Phase 2: Lazy-load caches ──────────────────────────────────────────────
const _scheduleCache = {};
const _gamelogCache  = {};
const _drivesCache   = {};
const _playsCache    = {};  // keyed by `${year}_wk${week}`

// Fetch JSON, preferring .json.gz (browser-native decompression) then .json fallback
async function _fetchJson(base) {
  const gz = base + '.gz';
  try {
    const r = await fetch(gz);
    if (r.ok && typeof DecompressionStream !== 'undefined') {
      const ds = new DecompressionStream('gzip');
      const blob = await new Response(r.body.pipeThrough(ds)).blob();
      return JSON.parse(await blob.text());
    }
  } catch { /* fall through */ }
  return fetch(base).then(r => r.json());
}

async function loadSchedule(year) {
  if (_scheduleCache[year]) return _scheduleCache[year];
  try {
    const data = await _fetchJson(`app/assets/data/${year}/team_schedule.json`);
    _scheduleCache[year] = data;
    return data;
  } catch { return []; }
}

async function loadGamelog(year) {
  if (_gamelogCache[year]) return _gamelogCache[year];
  try {
    const data = await _fetchJson(`app/assets/data/${year}/player_gamelog.json`);
    _gamelogCache[year] = data;
    return data;
  } catch { return {}; }
}

async function loadDrives(year) {
  if (_drivesCache[year]) return _drivesCache[year];
  try {
    const data = await _fetchJson(`app/assets/data/${year}/team_drives.json`);
    _drivesCache[year] = data;
    return data;
  } catch { return {}; }
}

async function loadPlaysForWeek(year, week) {
  // Plays are split into weekly .json.gz files: team_plays_wk01.json.gz etc.
  // Fetch directly (not via _fetchJson which would double-append .gz).
  const cacheKey = `${year}_${week}`;
  if (_playsCache[cacheKey]) return _playsCache[cacheKey];
  try {
    const wk = String(week).padStart(2, '0');
    const url = `app/assets/data/${year}/team_plays_wk${wk}.json.gz`;
    const r = await fetch(url);
    if (!r.ok) return {};
    let data;
    if (typeof DecompressionStream !== 'undefined') {
      const ds = new DecompressionStream('gzip');
      const blob = await new Response(r.body.pipeThrough(ds)).blob();
      data = JSON.parse(await blob.text());
    } else {
      data = await r.json();
    }
    _playsCache[cacheKey] = data;
    return data;
  } catch { return {}; }
}

// ── Analysis Tab (Team Report Card) ────────────────────────────────────────
async function renderAnalysis(t, subNavHTML='') {
  document.getElementById('tab-content').innerHTML = `${teamHeaderHTML(t)}${subNavHTML}<div id="loading">Loading analysis...</div>`;

  const rMap = buildRatingMap();
  const allPlayers = getPlayers();
  const teamPlayers = allPlayers.filter(p => p.teamId === t.id && p.positionGroup !== 'OL');

  // Roster OVR vs national average
  const allOvrs = getRatings().map(r => r.overall || 0).filter(v => v > 0);
  const natAvg = allOvrs.length ? Math.round(allOvrs.reduce((s, v) => s + v, 0) / allOvrs.length) : 70;
  const teamOvrs = teamPlayers.map(p => rMap[p.id]?.overall || 0).filter(v => v > 0);
  const teamAvg = teamOvrs.length ? Math.round(teamOvrs.reduce((s, v) => s + v, 0) / teamOvrs.length) : 0;
  const rosterDelta = teamAvg - natAvg;
  const deltaColor = rosterDelta > 0 ? 'var(--positive)' : rosterDelta < 0 ? 'var(--negative)' : 'var(--text-muted)';

  // Position group ratings
  const posGroups = ['QB','RB','WR','TE','DL','LB','DB'];
  const groupRatings = posGroups.map(group => {
    const ps = teamPlayers.filter(p => p.positionGroup === group);
    const vals = ps.map(p => rMap[p.id]?.overall || 0).sort((a,b) => b-a).slice(0, 5);
    const avg = vals.length ? Math.round(vals.reduce((s,v) => s+v,0) / vals.length) : 0;
    return { group, avg };
  }).filter(g => g.avg > 0);

  const topGroup = groupRatings.slice().sort((a,b) => b.avg - a.avg)[0];
  const weakGroup = groupRatings.slice().sort((a,b) => a.avg - b.avg)[0];

  // Top players per side of ball
  const offGroups = new Set(['QB','RB','WR','TE','FB']);
  const defGroups = new Set(['DL','LB','DB']);
  const topOff = teamPlayers.filter(p => offGroups.has(p.positionGroup))
    .sort((a,b) => (rMap[b.id]?.overall||0) - (rMap[a.id]?.overall||0)).slice(0,3);
  const topDef = teamPlayers.filter(p => defGroups.has(p.positionGroup))
    .sort((a,b) => (rMap[b.id]?.overall||0) - (rMap[a.id]?.overall||0)).slice(0,3);

  const playerChip = (p) => {
    const r = rMap[p.id] || {};
    return `<span style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:var(--surface);border:1px solid var(--border);font-size:13px;margin:3px 3px 3px 0" onclick="showPlayerModal('${p.id}')">
      <span class="ovr" style="background:${ratingColor(r.overall||0)};color:${ratingTextColor(r.overall||0)};width:24px;font-size:10px">${r.overall||'-'}</span>
      ${p.firstName[0]}. ${p.lastName}
      <span style="font-size:10px;color:var(--text-muted)">${p.positionGroup}</span>
    </span>`;
  };

  // Season record (async)
  const schedule = await loadSchedule(currentYear);
  const record = getTeamRecord(t.name, schedule);
  const teamGames = schedule.filter(g => g.homeTeam === t.name || g.awayTeam === t.name);
  const spVals = teamGames.map(g => {
    const isHome = g.homeTeam === t.name;
    return isHome ? g.awaySpRank : g.homeSpRank;
  }).filter(v => v != null && v > 0);
  const sosAvg = spVals.length ? (spVals.reduce((s,v) => s+v,0) / spVals.length).toFixed(3) : null;

  const groupBars = groupRatings.map(({ group, avg }) => {
    const pct = ((avg - 40) / 59) * 100;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <span style="width:28px;font-size:12px;color:var(--text-muted);text-align:right">${group}</span>
      <div style="flex:1;background:var(--surface-deep);border-radius:3px;height:10px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${ratingColor(avg)};border-radius:3px"></div>
      </div>
      <span style="width:28px;font-size:12px;color:${ratingColor(avg)};font-weight:700">${avg}</span>
    </div>`;
  }).join('');

  document.getElementById('tab-content').innerHTML = `
    ${teamHeaderHTML(t)}
    ${subNavHTML}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px 32px;margin-top:4px">
      <div>
        <div class="modal-section-title">Season Summary</div>
        ${record ? `<div style="font-size:22px;font-weight:800;margin-bottom:6px">${record}</div>` : ''}
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">Roster OVR:
          <span style="font-weight:700;color:var(--text)">${teamAvg}</span>
          <span style="color:${deltaColor};font-size:12px;margin-left:4px">(${rosterDelta > 0 ? '+' : ''}${rosterDelta} vs nat. avg ${natAvg})</span>
        </div>
        ${sosAvg ? `<div style="font-size:13px;color:var(--text-muted)">Avg Opp SP+: <span style="font-weight:700;color:var(--text)">${sosAvg}</span></div>` : ''}
        ${topGroup ? `<div style="font-size:13px;color:var(--text-muted);margin-top:6px">Strongest unit: <span style="color:var(--positive);font-weight:700">${topGroup.group}</span> (${topGroup.avg})</div>` : ''}
        ${weakGroup && weakGroup.group !== topGroup?.group ? `<div style="font-size:13px;color:var(--text-muted)">Weakest unit: <span style="color:var(--negative);font-weight:700">${weakGroup.group}</span> (${weakGroup.avg})</div>` : ''}
      </div>
      <div>
        <div class="modal-section-title">Position Group Ratings</div>
        ${groupBars}
      </div>
      <div>
        <div class="modal-section-title">Top Offensive Players</div>
        <div>${topOff.map(playerChip).join('')}</div>
      </div>
      <div>
        <div class="modal-section-title">Top Defensive Players</div>
        <div>${topDef.map(playerChip).join('')}</div>
      </div>
    </div>`;
}

// ── Schedule Tab ───────────────────────────────────────────────────────────
async function renderSchedule(t, subNavHTML='') {
  document.getElementById('tab-content').innerHTML = `${teamHeaderHTML(t)}${subNavHTML}<div id="loading">Loading schedule...</div>`;
  const schedule = await loadSchedule(currentYear);
  const games = schedule.filter(g => g.homeTeam === t.name || g.awayTeam === t.name)
                        .sort((a, b) => (a.week || 0) - (b.week || 0));

  if (!games.length) {
    document.getElementById('tab-content').innerHTML = `${teamHeaderHTML(t)}${subNavHTML}<div style="color:#666;padding:20px">No schedule data available for ${currentYear}.</div>`;
    return;
  }

  const dynasty = isDynasty();
  const teamMap = buildTeamMap();

  const gameRowsHTML = games.map(g => {
    const isHome = g.homeTeam === t.name;
    const opponent = isHome ? g.awayTeam : g.homeTeam;
    const myScore  = isHome ? g.homeScore : g.awayScore;
    const oppScore = isHome ? g.awayScore : g.homeScore;
    const oppSp    = isHome ? g.awaySpRank : g.homeSpRank;
    const loc = g.neutralSite ? 'N' : (isHome ? 'vs' : '@');
    const played = myScore != null && oppScore != null;
    const win = played && myScore > oppScore;
    const margin = played ? myScore - oppScore : null;
    // find opponent team for logo
    const oppTeam = Object.values(teamMap).find(tm => tm.name === opponent);

    if (dynasty) {
      const resultPill = played
        ? `<span class="d-game-result-pill ${win ? 'd-game-result-w' : 'd-game-result-l'}">${win ? 'W' : 'L'} ${myScore}–${oppScore}</span>`
        : `<span style="font-size:11px;color:var(--text-dim)">—</span>`;
      const marginText = margin != null
        ? `<span class="d-game-margin" style="color:${margin > 0 ? 'var(--positive)' : 'var(--negative)'}">${margin > 0 ? '+' : ''}${margin}</span>`
        : `<span class="d-game-margin">—</span>`;
      return `<div class="d-game-row" onclick="showGameDetail(${g.gameId}, '${t.name.replace(/'/g,"\\'")}')">
        <span class="d-game-week">Wk ${g.week ?? '—'}</span>
        <span class="d-game-loc">${loc}</span>
        <div class="d-game-opp">
          ${oppTeam?.logoUrl ? `<img class="d-game-opp-logo" src="${oppTeam.logoUrl}" onerror="this.style.display='none'">` : ''}
          <span class="d-game-opp-name">${opponent}</span>
        </div>
        ${resultPill}
        ${marginText}
        <span class="d-game-opp-sp">${oppSp != null ? `#${oppSp}` : '—'}</span>
      </div>`;
    }

    const resultColor = played ? (win ? 'var(--positive)' : 'var(--negative)') : 'var(--text-dim)';
    const resultText = played ? `${win ? 'W' : 'L'} ${myScore}–${oppScore}` : '—';
    const marginColor = margin != null ? (margin > 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-dim)';
    return `<tr class="clickable" onclick="showGameDetail(${g.gameId}, '${t.name.replace(/'/g,"\\'")}')">
      <td style="color:var(--text-muted);font-size:11px">${g.week ?? '—'}</td>
      <td style="color:var(--text-dim);font-size:11px">${loc}</td>
      <td>
        <div class="a-player-team-cell">
          ${oppTeam?.logoUrl ? `<img class="a-player-team-logo" src="${oppTeam.logoUrl}" onerror="this.style.display='none'">` : ''}
          ${opponent}
        </div>
      </td>
      <td style="color:${resultColor};font-weight:700;font-family:var(--num-font)">${resultText}</td>
      <td style="color:${marginColor};font-family:var(--num-font)">${margin != null ? (margin > 0 ? `+${margin}` : margin) : '—'}</td>
      <td style="color:var(--text-dim);font-size:11px">${oppSp != null ? `#${oppSp}` : '—'}</td>
    </tr>`;
  }).join('');

  const scheduleBody = dynasty
    ? `<div style="border:1px solid var(--border-mid);border-radius:var(--radius);overflow:hidden">${gameRowsHTML}</div>`
    : `<div class="table-scroll-wrap"><table>
        <thead><tr>
          <th>Wk</th><th></th><th>Opponent</th><th>Result</th><th>Margin</th><th>Opp SP+</th>
        </tr></thead>
        <tbody>${gameRowsHTML}</tbody>
      </table></div>`;

  document.getElementById('tab-content').innerHTML = `
    ${teamHeaderHTML(t)}
    ${subNavHTML}
    <div style="padding:12px 0">${scheduleBody}</div>
    <div id="game-detail-panel"></div>`;
}

async function showGameDetail(gameId, teamName) {
  const schedule = await loadSchedule(currentYear);
  const game = schedule.find(g => g.gameId === gameId);
  if (!game) return;

  const gamelog = await loadGamelog(currentYear);
  const rMap = buildRatingMap();
  const players = getPlayers();

  // Collect all players for a team who have game log data for this game
  function getGameParticipants(squadName) {
    const squad = players.filter(p => {
      const t = getTeams().find(t => t.id === p.teamId);
      return t && t.name === squadName;
    });
    const result = [];
    for (const p of squad) {
      const lg = gamelog[p.id] || gamelog[String(p.id)];
      if (!lg) continue;
      const entry = lg.find(e => e.gameId === gameId);
      if (!entry || !entry.stats) continue;
      const r = rMap[p.id] || rMap[String(p.id)] || {};
      result.push({ p, stats: entry.stats, ovr: r.overall || 0 });
    }
    result.sort((a, b) => b.ovr - a.ovr);
    return result;
  }

  // Build a categorized per-player box score table for one team
  function buildBoxScoreSection(participants) {
    const thStyle = 'padding:4px 8px;text-align:right;font-size:10px;color:var(--text-muted);font-weight:600;white-space:nowrap';
    const tdStyle = 'padding:4px 8px;text-align:right;font-size:12px';
    const nameTd = 'padding:4px 8px;font-size:12px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis';

    function catTable(title, cols, rows) {
      if (!rows.length) return '';
      const headers = cols.map(([,l]) => `<th style="${thStyle}">${l}</th>`).join('');
      const bodyRows = rows.map(({ p, stats, ovr }) => {
        const cells = cols.map(([k]) => {
          const v = stats[k];
          return `<td style="${tdStyle}">${v != null ? v : '-'}</td>`;
        }).join('');
        return `<tr class="clickable" onclick="showPlayerModal('${p.id}')">
          <td style="${nameTd}"><span class="pos-badge" style="font-size:9px;padding:1px 4px;margin-right:4px">${p.position || p.positionGroup}</span>${p.firstName[0]}. ${p.lastName}</td>
          ${cells}
        </tr>`;
      }).join('');
      return `<div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">${title}</div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr><th style="${thStyle};text-align:left">Player</th>${headers}</tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>`;
    }

    const passers = participants.filter(({stats:s}) => (s.att || 0) > 0 || (s.passYds || 0) > 0);
    const rushers = participants.filter(({stats:s}) => (s.carries || 0) > 0 || (s.rushYds || 0) > 0);
    const receivers = participants.filter(({stats:s}) => (s.receptions || 0) > 0 || (s.recYds || 0) > 0);
    const defenders = participants.filter(({stats:s}) => (s.tackles || 0) > 0 || (s.sacks || 0) > 0 || (s.ints || 0) > 0 || (s.pds || 0) > 0);

    // Compute YPC and YPR on the fly
    const withYpc = rushers.map(x => ({ ...x, stats: { ...x.stats, ypc: x.stats.carries > 0 ? (x.stats.rushYds / x.stats.carries).toFixed(1) : '-' } }));
    const withYpr = receivers.map(x => ({ ...x, stats: { ...x.stats, ypr: x.stats.receptions > 0 ? (x.stats.recYds / x.stats.receptions).toFixed(1) : '-' } }));
    const passersWithPct = passers.map(x => ({ ...x, stats: { ...x.stats, compPctDisp: x.stats.att > 0 ? ((x.stats.comp || 0) / x.stats.att * 100).toFixed(0) + '%' : '-' } }));

    return [
      catTable('Passing', [['comp','Cmp'],['att','Att'],['compPctDisp','Pct'],['passYds','Yds'],['passTDs','TD'],['ints','INT']], passersWithPct),
      catTable('Rushing', [['carries','Car'],['rushYds','Yds'],['ypc','Avg'],['rushTDs','TD']], withYpc),
      catTable('Receiving', [['receptions','Rec'],['recYds','Yds'],['ypr','Avg'],['recTDs','TD']], withYpr),
      catTable('Defense', [['tackles','Tkl'],['sacks','Sack'],['tfl','TFL'],['ints','INT'],['pds','PD'],['ff','FF']], defenders),
    ].join('');
  }

  const awayParticipants = getGameParticipants(game.awayTeam);
  const homeParticipants = getGameParticipants(game.homeTeam);
  const panel = document.getElementById('game-detail-panel');
  if (!panel) return;

  const awayWin = (game.awayScore ?? 0) > (game.homeScore ?? 0);
  const teamMap2 = buildTeamMap();
  const awayTeamObj = Object.values(teamMap2).find(t => t.name === game.awayTeam);
  const homeTeamObj = Object.values(teamMap2).find(t => t.name === game.homeTeam);

  if (isDynasty()) {
    panel.innerHTML = `
      <div class="d-game-detail-card">
        <div class="d-game-detail-scoreboard">
          <div class="d-scoreboard-team">
            ${awayTeamObj?.logoUrl ? `<img class="d-scoreboard-logo" src="${awayTeamObj.logoUrl}" onerror="this.style.display='none'">` : ''}
            <div class="d-scoreboard-name">${game.awayTeam}</div>
            <div class="d-scoreboard-score ${game.awayScore != null ? (awayWin ? 'win' : 'loss') : ''}">${game.awayScore ?? '—'}</div>
          </div>
          <div class="d-scoreboard-sep">@</div>
          <div class="d-scoreboard-team">
            ${homeTeamObj?.logoUrl ? `<img class="d-scoreboard-logo" src="${homeTeamObj.logoUrl}" onerror="this.style.display='none'">` : ''}
            <div class="d-scoreboard-name">${game.homeTeam}</div>
            <div class="d-scoreboard-score ${game.homeScore != null ? (!awayWin ? 'win' : 'loss') : ''}">${game.homeScore ?? '—'}</div>
          </div>
        </div>
        <div class="d-game-detail-meta">Week ${game.week} · ${game.neutralSite ? 'Neutral Site' : game.homeTeam + ' home'}</div>
        <div class="d-game-detail-body">
          <div class="d-game-detail-col">
            <div class="d-game-detail-col-header">${game.awayTeam}</div>
            ${buildBoxScoreSection(awayParticipants) || '<div style="color:var(--text-dim);font-size:12px;padding:4px">No player data</div>'}
          </div>
          <div class="d-game-detail-col">
            <div class="d-game-detail-col-header">${game.homeTeam}</div>
            ${buildBoxScoreSection(homeParticipants) || '<div style="color:var(--text-dim);font-size:12px;padding:4px">No player data</div>'}
          </div>
        </div>
      </div>`;
  } else {
    const scoreColor = (score, isWinner) => isWinner ? 'var(--positive)' : 'var(--text-muted)';
    panel.innerHTML = `
      <div style="margin-top:20px;border:1px solid var(--border-mid);border-radius:8px;padding:16px">
        <div style="text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">Week ${game.week} · ${game.neutralSite ? 'Neutral' : (game.homeTeam + ' home')}</div>
          <div style="display:flex;justify-content:center;align-items:center;gap:24px">
            <div style="text-align:right">
              <div style="font-size:16px;font-weight:700">${game.awayTeam}</div>
              <div style="font-size:36px;font-weight:900;color:${scoreColor(game.awayScore, awayWin)}">${game.awayScore ?? '?'}</div>
            </div>
            <div style="font-size:20px;color:var(--text-dim);font-weight:300">@</div>
            <div style="text-align:left">
              <div style="font-size:16px;font-weight:700">${game.homeTeam}</div>
              <div style="font-size:36px;font-weight:900;color:${scoreColor(game.homeScore, !awayWin)}">${game.homeScore ?? '?'}</div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px">
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${game.awayTeam}</div>
            ${buildBoxScoreSection(awayParticipants) || '<div style="color:var(--text-dim);font-size:12px;padding:8px">No player data</div>'}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${game.homeTeam}</div>
            ${buildBoxScoreSection(homeParticipants) || '<div style="color:var(--text-dim);font-size:12px;padding:8px">No player data</div>'}
          </div>
        </div>
      </div>`;
  }

  // Append drive-level breakdown — show both teams' drives
  const [drivesData, playsData] = await Promise.all([loadDrives(currentYear), loadPlaysForWeek(currentYear, game.week)]);

  const dyn = isDynasty();

  function buildPlayRows(drivePlays) {
    return drivePlays.map(pl => {
      const yl = pl.yardsToGoal;
      const fieldPos = yl != null ? (yl > 50 ? `Own ${100-yl}` : `Opp ${yl}`) : '—';
      const yds = pl.yardsGained != null ? (pl.yardsGained > 0 ? '+' : '') + pl.yardsGained : '—';
      const epa = pl.ppa != null ? (pl.ppa > 0 ? '+' : '') + pl.ppa.toFixed(2) : '—';
      const epaClass = pl.ppa > 0 ? 'd-epa-pos' : pl.ppa < 0 ? 'd-epa-neg' : 'd-epa-neu';
      const downStr = pl.down ? `${pl.down}&amp;${pl.distance}` : '—';
      const downCls = pl.down === 1 ? 'down-1' : (pl.down === 3 || pl.down === 4) ? `down-${pl.down}` : '';
      if (dyn) {
        return `<div class="d-play-row${pl.scoring ? ' scoring-play' : ''}">
          <span class="d-play-down-chip${downCls ? ' '+downCls : ''}">${downStr}</span>
          <span class="d-play-field">${fieldPos}</span>
          <span class="d-play-text">${pl.playText || ''}</span>
          <span class="d-play-yards">${yds}</span>
          <span class="${epaClass}">${epa}</span>
        </div>`;
      }
      const epaColor = pl.ppa > 0 ? 'var(--positive)' : pl.ppa < 0 ? 'var(--negative)' : 'var(--text-dim)';
      return `<tr class="a-play-row${pl.scoring ? ' scoring-play' : ''}">
        <td class="a-play-down">${downStr}</td>
        <td style="color:var(--text-dim);font-size:10px">${fieldPos}</td>
        <td style="color:var(--text-muted);max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pl.playText || ''}</td>
        <td style="text-align:right">${yds}</td>
        <td class="${pl.ppa > 0 ? 'a-epa-pos' : pl.ppa < 0 ? 'a-epa-neg' : ''}" style="text-align:right">${epa}</td>
      </tr>`;
    }).join('');
  }

  function buildDriveSection(driveTeam, driveIdPrefix) {
    const drives = (drivesData[driveTeam] || []).filter(d => d.gameId === gameId);
    const plays  = (playsData[driveTeam]  || []).filter(p => p.gameId === gameId);
    if (!drives.length) return null;

    return drives.map((d, idx) => {
      const drivePlays = plays.filter(p => p.driveNumber === d.driveNumber);
      const hasPl = drivePlays.length > 0;
      const isTd = d.scoring || (d.result || '').toUpperCase().includes('TD') || (d.result || '').toUpperCase().includes('TOUCHDOWN');
      const isFg = (d.result || '').toUpperCase().includes('FG') || (d.result || '').toUpperCase().includes('FIELD GOAL');
      const isTo = ['INT','FUMBLE','INTERCEPTION'].some(x => (d.result||'').toUpperCase().includes(x));
      const isPunt = (d.result||'').toUpperCase().includes('PUNT') || (d.result||'').toUpperCase() === 'DOWNS';
      const resultLabel = d.result || '—';
      const scoreStr = (d.startScore != null && d.endScore != null) ? `${d.startScore}→${d.endScore}` : '';

      if (dyn) {
        const badgeClass = isTd ? 'd-drive-td' : isFg ? 'd-drive-fg' : isTo ? 'd-drive-to' : 'd-drive-punt';
        // Field position bar: start/end yard line
        const startYtg = d.startYardsToGoal;
        const endYtg   = d.endYardsToGoal;
        let fieldBar = '';
        if (startYtg != null && endYtg != null) {
          // convert yards-to-goal to position on field (0=own goal, 100=opp goal)
          const startPct = Math.min(100, Math.max(0, 100 - startYtg));
          const endPct   = Math.min(100, Math.max(0, 100 - endYtg));
          const left = Math.min(startPct, endPct);
          const width = Math.abs(endPct - startPct) || 2;
          const color = isTd ? 'var(--positive)' : isTo ? 'var(--negative)' : isFg ? 'var(--warning)' : 'var(--accent)';
          const startLabel = startYtg > 50 ? `Own ${100-startYtg}` : `Opp ${startYtg}`;
          const endLabel   = endYtg > 50   ? `Own ${100-endYtg}`   : `Opp ${endYtg}`;
          fieldBar = `<div class="d-drive-field-bar">
            <span>${startLabel}</span>
            <div class="d-drive-field-track">
              <div class="d-drive-field-segment" style="left:${left}%;width:${width}%;background:${color};opacity:0.7"></div>
              <div class="d-drive-field-marker" style="left:${left}%"></div>
              <div class="d-drive-field-marker" style="left:${Math.min(left+width,99)}%"></div>
            </div>
            <span>${endLabel}</span>
          </div>`;
        }
        const playsPanel = hasPl ? `
          <div id="${driveIdPrefix}-drive-plays-${idx}" class="d-drive-plays-panel" style="display:none">
            ${buildPlayRows(drivePlays)}
          </div>` : '';
        return `<div class="d-drive-card" id="${driveIdPrefix}-drive-card-${idx}">
          <div class="d-drive-header" onclick="${hasPl ? `toggleDrivePlays('${driveIdPrefix}',${idx})` : ''}">
            ${hasPl ? `<span class="d-drive-chevron">▶</span>` : '<span style="width:16px;display:inline-block"></span>'}
            <span class="d-drive-num">${d.driveNumber ?? idx+1}</span>
            <span class="d-drive-result-badge ${badgeClass}">${resultLabel}</span>
            <span class="d-drive-summary">${d.plays ?? '—'} plays · ${d.yards ?? '—'} yds</span>
            ${scoreStr ? `<span class="d-drive-score">${scoreStr}</span>` : ''}
          </div>
          ${fieldBar}
          ${playsPanel}
        </div>`;
      }

      // Analytics table row
      const resultColor = isTd ? 'var(--positive)' : isTo ? 'var(--negative)' : 'var(--text-muted)';
      const playsSection = hasPl ? `
        <tr id="${driveIdPrefix}-drive-plays-${idx}" style="display:none">
          <td colspan="5" style="padding:0;background:var(--surface-deep)">
            <div style="padding:4px 8px 8px 20px">
              <table style="width:100%;border-collapse:collapse">
                <thead><tr style="font-size:10px;color:var(--text-dim)">
                  <th style="padding:3px 6px;text-align:left">D&amp;D</th>
                  <th style="padding:3px 6px;text-align:left">Fld</th>
                  <th style="padding:3px 6px;text-align:left">Play</th>
                  <th style="padding:3px 6px;text-align:right">Yds</th>
                  <th style="padding:3px 6px;text-align:right">EPA</th>
                </tr></thead>
                <tbody>${buildPlayRows(drivePlays)}</tbody>
              </table>
            </div>
          </td>
        </tr>` : '';
      return `<tr id="${driveIdPrefix}-drive-row-${idx}" class="clickable" onclick="${hasPl ? `toggleDrivePlays('${driveIdPrefix}',${idx})` : ''}">
        <td style="color:var(--text-dim);font-size:11px">#${d.driveNumber ?? idx+1}</td>
        <td style="font-weight:700;color:${resultColor}">${resultLabel}</td>
        <td style="color:var(--text-muted)">${d.plays ?? '—'} plays</td>
        <td style="color:var(--text-muted)">${d.yards ?? '—'} yds</td>
        <td style="color:var(--text-muted);font-size:11px">${scoreStr}</td>
        <td style="width:16px">${hasPl ? `<span class="drive-chevron" style="font-size:9px;color:var(--text-dim)">▶</span>` : ''}</td>
      </tr>${playsSection}`;
    }).join('');
  }

  const awaySection = buildDriveSection(game.awayTeam, 'away');
  const homeSection = buildDriveSection(game.homeTeam, 'home');
  if (!awaySection && !homeSection) return;

  function driveBlock(label, content) {
    if (!content) return `<div style="color:var(--text-dim);font-size:12px;padding:8px">No drive data for ${label}</div>`;
    const header = `<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">${label}</div>`;
    if (dyn) return `<div>${header}${content}</div>`;
    return `<div>${header}<div class="table-scroll-wrap"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr><th>Drive</th><th>Result</th><th>Plays</th><th>Yards</th><th>Score</th><th></th></tr></thead>
      <tbody>${content}</tbody>
    </table></div></div>`;
  }

  const drivesPanel = document.getElementById('game-detail-panel');
  if (drivesPanel) drivesPanel.innerHTML += `
    <div style="margin-top:14px;border:1px solid var(--border-mid);border-radius:var(--radius);padding:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        ${driveBlock(game.awayTeam, awaySection)}
        ${driveBlock(game.homeTeam, homeSection)}
      </div>
    </div>`;
}

function toggleDrivePlays(prefix, idx) {
  const playsEl = document.getElementById(`${prefix}-drive-plays-${idx}`);
  if (!playsEl) return;
  const opening = playsEl.style.display === 'none';
  // Dynasty: plays panel is a div; Analytics: it's a table-row
  playsEl.style.display = opening ? (playsEl.tagName === 'TR' ? 'table-row' : 'block') : 'none';
  // Toggle chevron rotation on parent drive row/card
  const driveRow  = document.getElementById(`${prefix}-drive-row-${idx}`);
  const driveCard = document.getElementById(`${prefix}-drive-card-${idx}`);
  if (driveRow)  driveRow.classList.toggle('drive-expanded', opening);
  if (driveCard) driveCard.classList.toggle('expanded', opening);
}

// ── Top Players Tab ────────────────────────────────────────────────────────
function renderTopPlayers() {
  const rMap = buildRatingMap();
  const teamMap = buildTeamMap();
  const players = getPlayers();
  const allPositions = ['ALL', ...new Set(players.map(p => p.positionGroup).filter(g => g && g !== 'OL'))].sort();

  let filtered = players.filter(p => {
    if (p.positionGroup === 'OL') return false;
    const matchPos = topPosFilter === 'ALL' || p.positionGroup === topPosFilter;
    const name = `${p.firstName} ${p.lastName}`.toLowerCase();
    const teamName = (teamMap[p.teamId]?.name || '').toLowerCase();
    return matchPos && (!topSearch || name.includes(topSearch) || teamName.includes(topSearch));
  });

  filtered.sort((a, b) => {
    const va = getTopSortVal(a, rMap, topSortCol);
    const vb = getTopSortVal(b, rMap, topSortCol);
    if (typeof va === 'string') return topSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return topSortAsc ? va - vb : vb - va;
  });

  const displayList = topSearch ? filtered : filtered.slice(0, 250);
  const skillCols = topPosFilter !== 'ALL' ? (SKILL_COLS[topPosFilter] || []) : [];
  // Show PPA column for skill positions where PPA data is meaningful
  const showPPA = !['OL','K','P','LS'].includes(topPosFilter);
  const ppaCol = showPPA ? [['ppa','PPA']] : [];
  const headCols = [['name','Name'],['pos','Pos'],['team','Team'],['overall','OVR'], ...ppaCol, ...skillCols];

  const controls = `<div class="top-players-controls">
    <input type="text" id="top-search" placeholder="Search player or team..." value="${topSearch}" oninput="onTopSearch(this.value)">
    <select id="top-pos-filter" onchange="onTopPos(this.value)">
      ${allPositions.map(p => `<option value="${p}" ${p === topPosFilter ? 'selected' : ''}>${p}</option>`).join('')}
    </select>
  </div>`;

  if (isDynasty()) {
    const cards = displayList.map((p, i) => {
      const r = rMap[p.id] || {};
      const team = teamMap[p.teamId] || {};
      const rank = i + 1;
      const rankCls = rank === 1 ? 'rank1' : rank === 2 ? 'rank2' : rank === 3 ? 'rank3' : '';
      const ovr = r.overall || 0;
      const topSkills = (SKILL_COLS[p.positionGroup] || []).slice(0, 3);
      const skillBars = topSkills.map(([a, lbl]) => {
        const val = r[a] || 0;
        const pct = Math.max(4, Math.round(((val - 40) / 59) * 100));
        return `<div class="d-player-skill-row">
          <span class="d-player-skill-label">${lbl}</span>
          <div class="d-player-skill-track"><div class="d-player-skill-fill" style="width:${pct}%;background:${ratingColor(val)}"></div></div>
        </div>`;
      }).join('');
      return `<div class="d-player-card ${rankCls}" onclick="showPlayerModal('${p.id}')">
        <span class="d-player-rank ${rankCls}">${rank}</span>
        <div class="d-player-ovr-box" style="background:${ratingColor(ovr)};color:${ratingTextColor(ovr)}">
          <span class="d-player-ovr-num">${ovr || '-'}</span>
          <span class="d-player-ovr-lbl">OVR</span>
        </div>
        <div class="d-player-info">
          <div class="d-player-name">${p.firstName} ${p.lastName}</div>
          <div class="d-player-team-line">
            ${team.logoUrl ? `<img class="d-player-team-logo" src="${team.logoUrl}" onerror="this.style.display='none'">` : ''}
            <span class="d-player-team-name" onclick="event.stopPropagation();goToTeam(${p.teamId})">${team.name || ''}</span>
          </div>
        </div>
        <span class="d-player-pos-badge" style="background:${posGroupColor(p.positionGroup)[0]};border-color:${posGroupColor(p.positionGroup)[1]}40;color:${posGroupColor(p.positionGroup)[1]}">${p.position || p.positionGroup || '?'}</span>
        ${topSkills.length ? `<div class="d-player-skill-bars">${skillBars}</div>` : ''}
      </div>`;
    }).join('');
    document.getElementById('tab-content').innerHTML = `${controls}
      <div style="border:1px solid var(--border-mid);border-radius:var(--radius);overflow:hidden">${cards}</div>
      <div style="padding:8px;color:var(--text-dim);font-size:11px">${topSearch ? `${filtered.length} results` : `Top ${displayList.length} of ${filtered.length}`}</div>`;
  } else {
    document.getElementById('tab-content').innerHTML = `${controls}
      <div class="table-scroll-wrap"><table>
        <tr>
          <th style="width:28px">#</th>
          ${headCols.map(([col,lbl]) => {
            const cls = topSortCol === col ? (topSortAsc ? 'sorted-asc' : 'sorted-desc') : '';
            return `<th class="${cls}" onclick="sortTopBy('${col}')">${lbl}</th>`;
          }).join('')}
        </tr>
        ${displayList.map((p, i) => {
          const r = rMap[p.id] || {};
          const team = teamMap[p.teamId] || {};
          const rank = i + 1;
          const rankCls = rank <= 3 ? 'top3' : rank <= 10 ? 'top10' : '';
          const ppaColor = r.ppa > 0 ? 'var(--positive)' : r.ppa < 0 ? 'var(--negative)' : 'var(--text-dim)';
          const ppaVal = r.ppa != null && r.ppa !== 0 ? (r.ppa > 0 ? '+' : '') + Number(r.ppa).toFixed(3) : '-';
          return `<tr class="clickable" onclick="showPlayerModal('${p.id}')">
            <td><span class="a-rank-num ${rankCls}">${rank}</span></td>
            <td>${p.firstName} ${p.lastName}</td>
            <td><span class="pos-badge">${p.position || '?'}</span></td>
            <td class="a-player-team-cell" style="cursor:pointer" onclick="event.stopPropagation();goToTeam(${p.teamId})">
              ${team.logoUrl ? `<img class="a-player-team-logo" src="${team.logoUrl}" onerror="this.style.display='none'">` : ''}
              <span style="font-size:12px;color:var(--text-muted)">${team.name || ''}</span>
            </td>
            <td><span class="a-ovr" style="color:${ratingColor(r.overall || 0)}">${r.overall || '-'}</span></td>
            ${showPPA ? `<td style="color:${ppaColor};font-size:12px;font-family:var(--num-font)">${ppaVal}</td>` : ''}
            ${skillCols.map(([a]) => `<td style="font-family:var(--num-font);color:var(--text-muted)">${r[a] != null ? r[a] : '-'}</td>`).join('')}
          </tr>`;
        }).join('')}
      </table></div>
      <div style="padding:8px;color:var(--text-dim);font-size:11px">${topSearch ? `${filtered.length} results` : `Top ${displayList.length} of ${filtered.length}`} · click a player for detail</div>`;
  }
}

function onTopSearch(val) { topSearch = val.toLowerCase(); renderTopPlayers(); }
function onTopPos(val) { topPosFilter = val; renderTopPlayers(); }
function sortTopBy(col) {
  if (topSortCol === col) topSortAsc = !topSortAsc;
  else { topSortCol = col; topSortAsc = col === 'name' || col === 'team' || col === 'pos'; }
  renderTopPlayers();
}
function getTopSortVal(p, rMap, col) {
  const r = rMap[p.id] || {};
  if (col === 'name') return `${p.lastName} ${p.firstName}`.toLowerCase();
  if (col === 'team') return (buildTeamMap()[p.teamId]?.name || '').toLowerCase();
  if (col === 'pos') return (p.positionGroup || '').toLowerCase();
  if (col === 'ppa') return r.ppa || 0;
  if (col === 'overall') return r.overall || 0;
  return r[col] || 0;
}
function goToTeam(teamId) { selectTeam(teamId, true); }

async function showGameDetailFromModal(gameId) {
  // Navigate to schedule tab of current team and open the game detail
  const t = getTeams().find(t => t.id === selectedTeamId);
  if (!t) return;
  await renderSchedule(t);
  // Scroll to and open the game panel
  const schedule = await loadSchedule(currentYear);
  const game = schedule.find(g => g.gameId === gameId);
  if (game) showGameDetail(gameId, t.name);
}

// ── Conferences Tab ────────────────────────────────────────────────────────
function renderConferences() {
  const teams = getTeams();
  const confMap = {};
  for (const t of teams) {
    const c = t.conference || 'Independent';
    if (!confMap[c]) confMap[c] = [];
    confMap[c].push(t);
  }
  const power4 = ['SEC','Big Ten','Big 12','ACC'];
  const confNames = [...power4.filter(c => confMap[c]), ...Object.keys(confMap).filter(c => !power4.includes(c)).sort()];

  const dynasty = isDynasty();
  document.getElementById('tab-content').innerHTML = confNames.map(conf => {
    const confTeams = confMap[conf].sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
    if (dynasty) {
      const rows = confTeams.map((t, i) => {
        const ovr = t.ratings?.overall || 0;
        const r = t.ratings || {};
        const rankClass = i === 0 ? 'd-rank-1' : i === 1 ? 'd-rank-2' : i === 2 ? 'd-rank-3' : 'd-rank-other';
        const miniBarRows = [['OFF', r.passOff||0, r.runOff||0], ['DEF', r.passDef||0, r.runDef||0]].map(([lbl, v1, v2]) => {
          const avg = Math.round((v1 + v2) / 2);
          const pct = Math.max(4, Math.round(((avg - 55) / 44) * 100));
          return `<div class="d-conf-mini-bar-row">
            <span class="d-conf-mini-label">${lbl}</span>
            <div class="d-conf-mini-track"><div class="d-conf-mini-fill" style="width:${pct}%;background:${ratingColor(avg)}"></div></div>
          </div>`;
        }).join('');
        const spRank = t.spRank != null ? `#${t.spRank}` : (t.ratings?.spRank != null ? `#${t.ratings.spRank}` : '');
        return `<div class="d-conf-team-row" onclick="selectTeam(${t.id})">
          <div class="d-rank-badge ${rankClass}">${i+1}</div>
          ${t.logoUrl ? `<img class="d-conf-team-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : ''}
          <div class="d-conf-team-name">${t.name}</div>
          <div class="d-conf-mini-bars">${miniBarRows}</div>
          ${spRank ? `<span class="d-conf-sp-rank">${spRank}</span>` : ''}
          <span class="d-conf-ovr" style="background:${ratingColor(ovr)};color:${ratingTextColor(ovr)}">${ovr}</span>
        </div>`;
      }).join('');
      return `<div class="d-conf-section">
        <div class="d-conf-header">${conf} <span style="font-size:11px;font-weight:400;opacity:0.5;margin-left:8px">${confTeams.length} teams</span></div>
        <div class="d-conf-rows">${rows}</div>
      </div>`;
    }
    // Analytics
    const rows = confTeams.map((t, i) => {
      const ovr = t.ratings?.overall || 0;
      return `<div class="a-conf-team-row" onclick="selectTeam(${t.id})">
        <span class="a-conf-rank ${i < 3 ? 'top3' : ''}">${i+1}</span>
        ${t.logoUrl ? `<img class="a-conf-logo" src="${t.logoUrl}" onerror="this.style.display='none'">` : ''}
        <span class="a-conf-name">${t.name}</span>
        <span class="a-conf-ovr" style="color:${ratingColor(ovr)}">${ovr}</span>
      </div>`;
    }).join('');
    return `<div class="a-conf-section">
      <div class="a-conf-header">${conf} <span style="font-weight:400;opacity:0.6;margin-left:6px">${confTeams.length}</span></div>
      ${rows}
    </div>`;
  }).join('');
}

// ── Compare Tab ────────────────────────────────────────────────────────────
function startCompare(teamId) {
  compareTeamId = teamId;
  switchTab('compare');
}

function getTeamRecord(teamName, schedule) {
  let w = 0, l = 0;
  for (const g of schedule) {
    if (g.homeScore == null) continue;
    const isHome = g.homeTeam === teamName;
    const isAway = g.awayTeam === teamName;
    if (!isHome && !isAway) continue;
    const mine = isHome ? g.homeScore : g.awayScore;
    const theirs = isHome ? g.awayScore : g.homeScore;
    mine > theirs ? w++ : l++;
  }
  return w + l > 0 ? `${w}-${l}` : '';
}

function renderCompare() {
  const teams = getTeams().slice().sort((a, b) => (b.ratings?.overall || 0) - (a.ratings?.overall || 0));
  const leftTeam = getTeams().find(t => t.id === selectedTeamId);
  const rightTeam = compareTeamId ? getTeams().find(t => t.id === compareTeamId) : null;

  const teamOptions = teams.map(t =>
    `<option value="${t.id}" ${t.id === compareTeamId ? 'selected' : ''}>${t.name} (${t.ratings?.overall || '?'})</option>`
  ).join('');

  let compHTML = '';
  if (leftTeam && rightTeam) {
    const cats = [
      ['overall','Overall'],['passOff','Pass Off'],['runOff','Run Off'],
      ['passDef','Pass Def'],['runDef','Run Def'],['specialTeams','Spec Teams'],
    ];
    const lr = leftTeam.ratings || {}, rr = rightTeam.ratings || {};
    compHTML = `
      <div class="compare-section-title">Team Ratings</div>
      ${cats.map(([k, label]) => {
        const lv = lr[k] || 0, rv = rr[k] || 0;
        const max = Math.max(lv, rv, 1);
        const lPct = (lv / 99) * 100, rPct = (rv / 99) * 100;
        const lWin = lv >= rv;
        return `<div class="compare-head-row">
          <span class="compare-val-left" style="color:${ratingColor(lv)}">${lv}</span>
          <div class="compare-bars">
            <div style="flex:1;display:flex;justify-content:flex-end">
              <div class="compare-bar-left" style="width:${lPct}%;background:${lWin ? ratingColor(lv) : '#2a4070'}"></div>
            </div>
            <div class="compare-center"></div>
            <div style="flex:1">
              <div class="compare-bar-right" style="width:${rPct}%;background:${!lWin ? ratingColor(rv) : '#2a4070'}"></div>
            </div>
          </div>
          <span class="compare-val-right" style="color:${ratingColor(rv)}">${rv}</span>
          <span class="compare-cat-label" style="width:80px;text-align:center;font-size:11px;color:#666">${label}</span>
        </div>`;
      }).join('')}
      ${renderPositionGroupComparison(leftTeam, rightTeam)}
    `;
  } else if (leftTeam) {
    compHTML = `<div style="color:#666;padding:20px 0">Select a team on the right to compare.</div>`;
  }

  document.getElementById('tab-content').innerHTML = `
    <div class="compare-controls">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        ${leftTeam ? `
          <img src="${leftTeam.logoUrl}" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'">
          <div>
            <div style="font-weight:700">${leftTeam.name}</div>
            <div style="font-size:11px;color:var(--text-muted)">${leftTeam.conference||''} <span id="compare-left-record" style="color:var(--accent)"></span></div>
          </div>` : '<span style="color:#666">Select a team from sidebar</span>'}
        <span style="color:#444;font-size:20px;margin:0 8px">vs</span>
        <select onchange="compareTeamId=parseInt(this.value);renderCompare()" style="padding:8px 12px;background:var(--input-bg);border:1px solid var(--border-mid);color:var(--text);font-size:13px;border-radius:4px;cursor:pointer;min-width:200px">
          <option value="">-- Select opponent --</option>
          ${teamOptions}
        </select>
      </div>
    </div>
    ${compHTML}`;

  // Async: fill in W-L record after schedule loads
  if (leftTeam) {
    loadSchedule(currentYear).then(sched => {
      const rec = getTeamRecord(leftTeam.name, sched);
      const el = document.getElementById('compare-left-record');
      if (el && rec) el.textContent = `(${rec})`;
    });
  }
}

function renderPositionGroupComparison(leftTeam, rightTeam) {
  const rMap = buildRatingMap();
  const allPlayers = getPlayers();

  function getGroupRating(team, group) {
    const ps = allPlayers.filter(p => p.teamId === team.id && p.positionGroup === group);
    const vals = ps.map(p => rMap[p.id]?.overall || 0).sort((a,b) => b-a).slice(0, 5);
    return vals.length ? Math.round(vals.reduce((s,v) => s+v, 0) / vals.length) : 0;
  }

  const groups = [
    { group:'QB', label:'QB' }, { group:'RB', label:'RB' }, { group:'WR', label:'WR' },
    { group:'TE', label:'TE' }, { group:'DL', label:'DL' },
    { group:'LB', label:'LB' }, { group:'DB', label:'DB' },
  ];

  function getTopPlayer(team, group) {
    const ps = allPlayers.filter(p => p.teamId === team.id && p.positionGroup === group);
    return ps.sort((a, b) => (rMap[b.id]?.overall || 0) - (rMap[a.id]?.overall || 0))[0] || null;
  }

  const rows = groups.map(({ group, label }) => {
    const lv = getGroupRating(leftTeam, group);
    const rv = getGroupRating(rightTeam, group);
    if (!lv && !rv) return '';
    const lWin = lv >= rv;
    const lPct = (lv / 99) * 100, rPct = (rv / 99) * 100;
    const lTop = getTopPlayer(leftTeam, group);
    const rTop = getTopPlayer(rightTeam, group);
    const lTopHTML = lTop ? `<span style="font-size:11px;color:var(--text-muted);cursor:pointer;margin-top:2px" onclick="showPlayerModal('${lTop.id}')">${lTop.lastName}</span>` : '';
    const rTopHTML = rTop ? `<span style="font-size:11px;color:var(--text-muted);cursor:pointer;margin-top:2px" onclick="showPlayerModal('${rTop.id}')">${rTop.lastName}</span>` : '';
    return `<div class="compare-head-row" style="margin-bottom:2px">
      <div style="display:flex;flex-direction:column;align-items:flex-end;min-width:60px">
        <span class="compare-val-left" style="color:${ratingColor(lv)}">${lv||'-'}</span>
        ${lTopHTML}
      </div>
      <div class="compare-bars">
        <div style="flex:1;display:flex;justify-content:flex-end">
          <div class="compare-bar-left" style="width:${lPct}%;background:${lWin ? ratingColor(lv) : '#2a4070'}"></div>
        </div>
        <div class="compare-center"></div>
        <div style="flex:1">
          <div class="compare-bar-right" style="width:${rPct}%;background:${!lWin ? ratingColor(rv) : '#2a4070'}"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-start;min-width:60px">
        <span class="compare-val-right" style="color:${ratingColor(rv)}">${rv||'-'}</span>
        ${rTopHTML}
      </div>
      <span class="compare-cat-label" style="width:80px;text-align:center;font-size:11px;color:#666">${label}</span>
    </div>`;
  }).join('');

  return `<div class="compare-section-title">Position Groups</div>${rows}`;
}

// ── Player Modal ───────────────────────────────────────────────────────────
function showPlayerModal(playerId) {
  // Find player in current year — coerce to string since IDs are strings in JSON
  const pid = String(playerId);
  const players = getPlayers();
  const p = players.find(pl => String(pl.id) === pid);
  if (!p) return;

  const rMap = buildRatingMap();
  const r = rMap[pid] || {};
  const teamMap = buildTeamMap();
  const team = teamMap[p.teamId] || {};
  const posGroup = p.positionGroup;
  const ovr = r.overall || 0;

  const dynasty = isDynasty();

  // Skill bars
  const skills = SKILL_ATTRS[posGroup] || [];
  const skillBarsHTML = skills.map(([key, label]) => {
    const val = r[key] || 0;
    const pct = ((val - 40) / 59) * 100;
    if (dynasty) {
      return `<div class="d-skill-row">
        <span class="d-skill-label">${label}</span>
        <div class="d-skill-track"><div class="d-skill-fill" style="width:${pct}%;background:${ratingColor(val)}"></div></div>
        <span class="d-skill-val" style="color:${ratingColor(val)}">${val}</span>
      </div>`;
    }
    return `<div class="a-skill-row">
      <span class="a-skill-label">${label}</span>
      <div class="a-skill-track"><div class="a-skill-fill" style="width:${pct}%;background:${ratingColor(val)}"></div></div>
      <span class="a-skill-val" style="color:${ratingColor(val)}">${val}</span>
    </div>`;
  }).join('');

  // Stats for current year
  const stats = r.stats || {};
  const statDefs = STAT_LABELS[posGroup] || [];
  const statCells = statDefs.filter(([k]) => stats[k] != null && stats[k] !== 0).map(([k, label]) =>
    dynasty
      ? `<div class="d-stat-cell"><div class="d-stat-val">${stats[k]}</div><div class="d-stat-key">${label}</div></div>`
      : `<div class="stat-cell"><div class="sv">${stats[k]}</div><div class="sk">${label}</div></div>`
  ).join('');
  const statsHTML = statCells ? `<div class="modal-section">
    <div class="${dynasty ? 'd-section-label' : 'modal-section-title'}">Stats (${currentYear})</div>
    <div class="${dynasty ? 'd-stat-grid' : 'stat-grid'}">${statCells}</div>
  </div>` : '';

  // Year-over-year progression
  const yoyRows = years.map(y => {
    const yData = dataByYear[y];
    if (!yData) return null;
    const yPlayers = yData.players;
    const yTeams = yData.teams;
    const yRatings = yData.ratings;
    if (!yPlayers || !yRatings) return null;
    const yp = yPlayers.find(pl => String(pl.id) === pid);
    if (!yp) return null;
    const yr = yRatings.find(rr => String(rr.playerId) === pid);
    if (!yr) return null;
    const yTeam = (yTeams || []).find(t => t.id === yp.teamId);
    const yTeamName = yTeam ? yTeam.name : '';
    const ySkills = (SKILL_ATTRS[posGroup] || []).map(([k, lbl]) =>
      yr[k] != null ? `<td style="color:${ratingColor(yr[k])}">${yr[k]}</td>` : '<td>-</td>'
    ).join('');
    const yStats = yr.stats || {};
    const yStatsStr = statDefs.filter(([k]) => yStats[k] != null && yStats[k] !== 0)
      .slice(0,3).map(([k,lbl]) => `${lbl}: ${yStats[k]}`).join(' · ');
    return `<tr class="${y === currentYear ? 'current-year' : ''}">
      <td style="font-weight:700">${y}</td>
      <td style="font-size:11px;color:#aaa;white-space:nowrap">${yTeamName}</td>
      <td><span class="ovr" style="background:${ratingColor(yr.overall||0)};color:${ratingTextColor(yr.overall||0)}">${yr.overall||'-'}</span></td>
      ${ySkills}
      <td style="font-size:10px;color:#888">${yStatsStr}</td>
    </tr>`;
  }).filter(Boolean);

  const yoyHTML = yoyRows.length > 1 ? `<div class="modal-section">
    <div class="modal-section-title">Year-over-Year</div>
    <table class="yoy-table">
      <tr>
        <th>Year</th><th>Team</th><th>OVR</th>
        ${(SKILL_ATTRS[posGroup] || []).map(([,lbl]) => `<th>${lbl}</th>`).join('')}
        <th>Key Stats</th>
      </tr>
      ${yoyRows.join('')}
    </table>
  </div>` : '';

  // National + conference rank and similarity (need all players + teams)
  const allPlayers = getPlayers();
  const allTeams = getTeams();
  const positionPeers = allPlayers.filter(pl => pl.positionGroup === posGroup);
  const sortedByOvr = positionPeers.slice().sort((a, b) => (rMap[String(b.id)]?.overall || 0) - (rMap[String(a.id)]?.overall || 0));
  const natRank = sortedByOvr.findIndex(pl => String(pl.id) === pid) + 1;
  const teamConf = (allTeams.find(t => t.id === p.teamId) || {}).conference || '';
  const confPeers = teamConf ? positionPeers.filter(pl => (allTeams.find(t => t.id === pl.teamId) || {}).conference === teamConf) : [];
  const confSorted = confPeers.slice().sort((a, b) => (rMap[String(b.id)]?.overall || 0) - (rMap[String(a.id)]?.overall || 0));
  const confRank = confSorted.findIndex(pl => String(pl.id) === pid) + 1;
  const rankHTML = natRank > 0 ? `
    <div style="display:flex;gap:16px;margin-top:6px">
      <div style="font-size:11px;color:#888">National <span style="color:${natRank<=10?'#ffd700':natRank<=25?'#a78bfa':'#e0e0e0'};font-weight:700;font-size:13px">#${natRank}</span> ${posGroup}</div>
      ${confRank > 0 ? `<div style="font-size:11px;color:#888">${teamConf} <span style="color:${confRank<=3?'#ffd700':confRank<=8?'#a78bfa':'#e0e0e0'};font-weight:700;font-size:13px">#${confRank}</span></div>` : ''}
    </div>` : '';

  // Career stats: sum additive stats across all years where the player appears
  const careerTotals = {};
  const CAREER_ADDITIVE = {
    QB:  ['passYds','passTDs','comp','ints','rushYds'],
    RB:  ['rushYds','rushTDs','recYds','recTDs'],
    FB:  ['rushYds','rushTDs','recYds'],
    WR:  ['recYds','recTDs','receptions'],
    TE:  ['recYds','recTDs','receptions'],
    DL:  ['tackles','sacks','tfl','qbh','ff'],
    LB:  ['tackles','sacks','ints','pds','tfl','ff'],
    DB:  ['tackles','ints','pds','ff','tfl'],
    K:   ['fgm','fga','xpm'],
    P:   ['punts'],
  };
  const careerKeys = CAREER_ADDITIVE[posGroup] || [];
  let careerYears = 0;
  for (const y of years) {
    const yData = dataByYear[y];
    if (!yData) continue;
    const yRatings = yData.ratings;
    if (!yRatings) continue;
    const yr = yRatings.find(rr => String(rr.playerId) === pid);
    if (!yr) continue;
    const yStats = yr.stats || {};
    careerYears++;
    for (const k of careerKeys) {
      if (yStats[k] != null && yStats[k] !== 0) careerTotals[k] = (careerTotals[k] || 0) + yStats[k];
    }
  }
  const careerCells = careerKeys.filter(k => careerTotals[k]).map(k => {
    const lbl = (STAT_LABELS[posGroup] || []).find(([sk]) => sk === k)?.[1] || k;
    const val = typeof careerTotals[k] === 'number' && !Number.isInteger(careerTotals[k])
      ? careerTotals[k].toFixed(1) : careerTotals[k];
    return dynasty
      ? `<div class="d-stat-cell"><div class="d-stat-val">${val}</div><div class="d-stat-key">${lbl}</div></div>`
      : `<div class="stat-cell"><div class="sv">${val}</div><div class="sk">${lbl}</div></div>`;
  }).join('');
  const careerHTML = careerCells && careerYears > 1 ? `<div class="modal-section">
    <div class="${dynasty ? 'd-section-label' : 'modal-section-title'}">Career Totals (${careerYears} seasons)</div>
    <div class="${dynasty ? 'd-stat-grid' : 'stat-grid'}">${careerCells}</div>
  </div>` : '';

  // Similar players
  const similar = computeSimilar(pid, posGroup, rMap, allPlayers, allTeams, 6);
  const similarHTML = similar.length ? `<div class="modal-section">
    <div class="modal-section-title">Similar Players (${currentYear})</div>
    ${similar.map(({ p: sp, r: sr, similarity, team: st }) => `
      <div class="sim-row" onclick="showPlayerModal('${sp.id}')">
        <div class="sim-score">${similarity}%</div>
        <div class="sim-bar-wrap"><div class="sim-bar-fill" style="width:${similarity}%"></div></div>
        <span class="ovr" style="background:${ratingColor(sr.overall||0)};color:${ratingTextColor(sr.overall||0)};flex-shrink:0">${sr.overall||'-'}</span>
        <div style="flex:1;min-width:0">
          <div class="sim-name">${sp.firstName} ${sp.lastName}</div>
          <div class="sim-team">${st.name || ''}</div>
        </div>
        <span class="pos-badge" style="flex-shrink:0">${sp.position || posGroup}</span>
      </div>`).join('')}
  </div>` : '';

  const _yearLabels = ['','Fr','So','Jr','Sr','Gr'];
  const classYear = _yearLabels[Math.min(p.year || 1, 5)] || (p.year || 'Fr');
  const classYearDisplay = p.yearPrev != null
    ? `${_yearLabels[Math.min(p.yearPrev, 5)] || p.yearPrev} → ${classYear}`
    : classYear;
  const statusBadgeHTML = p.status === 'transferred_out' ? '<span class="status-pill out" style="margin-left:6px">Transferred Out</span>'
    : p.status === 'likely_leaving' ? '<span class="status-pill leaving" style="margin-left:6px">Likely Leaving</span>'
    : p.status === 'transfer_in' ? '<span class="status-pill in" style="margin-left:6px">Transfer In</span>'
    : p.status === 'recruit' ? '<span class="status-pill recruit" style="margin-left:6px">Recruit</span>' : '';
  const archetypeHTML = '';
  const projTypeLabels = { returning: 'Returning', transfer: 'Transfer', recruit: 'Recruit', unknown: 'New Player' };
  const projRangeHTML = r.projected && r.overallLow != null && r.overallHigh != null
    ? (() => {
        const label = projTypeLabels[r.projectionType] || 'Projected';
        const rangeColor = r.projectionType === 'transfer' ? '#f5a623'
          : r.projectionType === 'recruit' ? '#a8d8a8' : '#a0c4ff';
        return `<div style="margin-top:6px;font-size:12px;color:#aaa">
          <span style="color:${rangeColor};font-weight:600">${label}</span>
          &bull; Range: <span style="color:#ddd;font-weight:700">${r.overallLow}–${r.overallHigh}</span>
          <span style="font-size:10px;color:#555"> (projected season)</span>
        </div>`;
      })()
    : '';

  // Advanced metrics: PPA and usage (available after pipeline re-run)
  const advancedHTML = (() => {
    const cells = [];
    if (r.ppa != null && r.ppa !== 0) {
      const ppaColor = r.ppa > 0 ? 'var(--positive)' : 'var(--negative)';
      cells.push(`<div class="stat-cell"><div class="sv" style="color:${ppaColor}">${r.ppa > 0 ? '+' : ''}${r.ppa.toFixed(3)}</div><div class="sk">Avg PPA</div></div>`);
    }
    if (r.usage?.snap) {
      cells.push(`<div class="stat-cell"><div class="sv">${Math.round(r.usage.snap * 100)}%</div><div class="sk">Snap %</div></div>`);
    }
    if (r.usage?.games) {
      cells.push(`<div class="stat-cell"><div class="sv">${r.usage.games}</div><div class="sk">Games</div></div>`);
    }
    if (!cells.length) return '';
    return `<div class="modal-section">
      <div class="modal-section-title">Advanced</div>
      <div class="stat-grid">${cells.join('')}</div>
    </div>`;
  })();

  const sectionTitle = (lbl) => dynasty
    ? `<div class="d-section-label">${lbl}</div>`
    : `<div class="modal-section-title">${lbl}</div>`;

  const overviewHTML = `
    <div class="modal-section">
      ${sectionTitle(dynasty ? 'Attributes' : 'Skill Ratings')}
      ${skills.length ? skillBarsHTML : '<div style="color:var(--text-dim);font-size:12px">No skill data available</div>'}
    </div>
    ${statsHTML}
    ${advancedHTML}
    ${careerHTML}
    ${yoyHTML}
    ${similarHTML}`;

  const modalHeader = dynasty ? `
    <div class="d-modal-header">
      <div class="d-modal-ovr-box" style="background:${ratingColor(ovr)};color:${ratingTextColor(ovr)}">
        <span class="d-modal-ovr-num">${ovr || '—'}</span>
        <span class="d-modal-ovr-label">OVR</span>
      </div>
      <div style="flex:1;min-width:0">
        <div class="d-modal-name">${p.firstName} ${p.lastName}</div>
        <div class="d-modal-team-line">
          ${team.logoUrl ? `<img class="d-modal-team-logo" src="${team.logoUrl}" onerror="this.style.display='none'">` : ''}
          <span class="d-modal-team-name" onclick="closeModal();goToTeam(${p.teamId})">${team.name || ''}</span>
        </div>
        <div class="d-modal-sub">
          <span class="pos-badge">${p.position || posGroup}</span>
          ${classYearDisplay}${statusBadgeHTML}
          ${p.jersey != null && p.jersey !== '' ? `· #${p.jersey}` : ''}
          ${p.height ? `· ${p.height}` : ''} ${p.weight ? `/ ${p.weight} lbs` : ''}
        </div>
        ${rankHTML}
        ${projRangeHTML}
      </div>
    </div>` : `
    <div class="a-modal-header">
      <div>
        <span class="a-modal-ovr" style="color:${ratingColor(ovr)}">${ovr || '—'}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div class="a-modal-name">${p.firstName} ${p.lastName}</div>
        <div class="a-modal-sub">
          <span class="pos-badge">${p.position || posGroup}</span>
          ${classYearDisplay}${statusBadgeHTML}
          ${p.jersey != null && p.jersey !== '' ? `· #${p.jersey}` : ''}
          · <span style="cursor:pointer;color:var(--accent)" onclick="closeModal();goToTeam(${p.teamId})">${team.name || ''}</span>
          ${p.height ? `· ${p.height}` : ''} ${p.weight ? `/ ${p.weight} lbs` : ''}
        </div>
        ${rankHTML}
        ${projRangeHTML}
      </div>
    </div>`;

  document.getElementById('modal-body').innerHTML = `
    ${modalHeader}
    <div class="modal-tab-bar">
      <div class="modal-tab-btn active" data-mtab="overview" onclick="switchModalTab('overview')">Overview</div>
      <div class="modal-tab-btn" data-mtab="gamelog" onclick="switchModalTab('gamelog', '${pid}')">Game Log</div>
      <div class="modal-tab-btn" data-mtab="career" onclick="switchModalTab('career', '${pid}')">Career</div>
    </div>
    <div id="modal-tab-overview">${overviewHTML}</div>
    <div id="modal-tab-gamelog" style="display:none"><div style="color:#666;padding:20px;font-size:13px">Loading game log...</div></div>
    <div id="modal-tab-career" style="display:none"><div style="color:#666;padding:20px;font-size:13px">Loading career data...</div></div>
  `;
  document.getElementById('player-modal').classList.add('open');
}


function switchModalTab(tab, pid) {
  document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mtab === tab));
  document.querySelectorAll('[id^="modal-tab-"]').forEach(el => { el.style.display = el.id === `modal-tab-${tab}` ? 'block' : 'none'; });
  if (tab === 'gamelog' && pid) renderModalGamelog(pid);
  if (tab === 'career' && pid) renderModalCareer(pid);
}

async function renderModalGamelog(pid) {
  const el = document.getElementById('modal-tab-gamelog');
  if (!el) return;
  const gamelog = await loadGamelog(currentYear);
  const entries = gamelog[pid] || gamelog[String(pid)] || [];
  if (!entries.length) {
    el.innerHTML = '<div style="color:#555;padding:20px;font-size:13px">No game log data available for this season.</div>';
    return;
  }

  const p = getPlayers().find(pl => String(pl.id) === String(pid));
  const posGroup = p ? p.positionGroup : 'QB';
  const statDefs = STAT_LABELS[posGroup] || [];

  // Determine which stat keys actually appear
  const usedKeys = new Set();
  entries.forEach(e => Object.keys(e.stats || {}).forEach(k => usedKeys.add(k)));
  const cols = statDefs.filter(([k]) => usedKeys.has(k));

  const header = `<tr><th>Wk</th><th>Opponent</th><th>Result</th>${cols.map(([,l]) => `<th>${l}</th>`).join('')}</tr>`;

  // Compute per-stat max for highlight threshold
  const maxes = {};
  cols.forEach(([k]) => { maxes[k] = Math.max(...entries.map(e => Number(e.stats?.[k] ?? 0))); });

  const rows = entries.map(e => {
    const resultColor = e.result ? (e.result.startsWith('W') ? '#00c853' : '#f44336') : '#aaa';
    const statCells = cols.map(([k, l]) => {
      const v = e.stats?.[k] ?? '-';
      const isTop = maxes[k] > 0 && Number(v) >= maxes[k] * 0.75;
      return `<td style="${isTop ? 'color:#00c853;font-weight:700' : ''}">${v}</td>`;
    }).join('');
    const clickable = e.gameId ? `class="clickable" onclick="closeModal();showGameDetailFromModal(${e.gameId})"` : '';
    return `<tr ${clickable}>
      <td>${e.week ?? '-'}</td>
      <td style="font-size:11px">${e.homeGame ? 'vs ' : '@ '}${e.opponent || '-'}</td>
      <td style="color:${resultColor};font-weight:700;font-size:11px">${e.result || '-'}</td>
      ${statCells}
    </tr>`;
  }).join('');

  el.innerHTML = `<div style="overflow-x:auto">
    <table class="roster-table" style="width:100%;margin-top:8px">
      <thead>${header}</thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

async function renderModalCareer(pid) {
  const el = document.getElementById('modal-tab-career');
  if (!el) return;

  const _yearLabels = ['','Fr','So','Jr','Sr','Gr'];
  const CAREER_ADDITIVE = {
    QB:  ['passYds','passTDs','comp','att','ints','rushYds','rushTDs'],
    RB:  ['rushYds','rushTDs','carries','recYds','recTDs','receptions'],
    FB:  ['rushYds','rushTDs','carries','recYds','recTDs'],
    WR:  ['recYds','recTDs','receptions'],
    TE:  ['recYds','recTDs','receptions'],
    DL:  ['tackles','sacks','tfl','qbh','ff'],
    LB:  ['tackles','sacks','ints','pds','tfl','ff'],
    DB:  ['tackles','ints','pds','ff','tfl'],
    K:   ['fgm','fga','xpm'],
    P:   ['punts'],
  };

  // Collect all seasons the player appears in
  const seasonData = [];
  for (const y of years) {
    const yData = dataByYear[y];
    if (!yData) continue;
    const yp = (yData.players || []).find(pl => String(pl.id) === pid);
    if (!yp) continue;
    const yr = (yData.ratings || []).find(rr => String(rr.playerId) === pid);
    if (!yr) continue;
    const yTeam = (yData.teams || []).find(t => t.id === yp.teamId);
    seasonData.push({ year: y, player: yp, rating: yr, teamName: yTeam ? yTeam.name : '?' });
  }

  if (!seasonData.length) {
    el.innerHTML = '<div style="color:var(--text-muted);padding:20px;font-size:13px">No career data found.</div>';
    return;
  }

  // Detect position changes and transfers
  const posGroups = [...new Set(seasonData.map(s => s.player.positionGroup))];
  const teamNames = [...new Set(seasonData.map(s => s.teamName))];
  const isTwoWay = posGroups.length > 1;
  const hasTransfers = teamNames.length > 1;

  // Two-way / position change banner
  let bannerHTML = '';
  if (isTwoWay) {
    // Build a timeline of positions
    const posTimeline = [];
    let lastPos = null, startY = null;
    for (const s of seasonData) {
      const pg = s.player.positionGroup;
      if (pg !== lastPos) {
        if (lastPos) posTimeline.push(`${lastPos} (${startY}–${s.year - 1})`);
        lastPos = pg; startY = s.year;
      }
    }
    if (lastPos) posTimeline.push(`${lastPos} (${startY}–${seasonData[seasonData.length-1].year})`);
    bannerHTML = `<div style="background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.3);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px">
      <span style="color:#f0c040;font-weight:700">⚡ Position Change</span>
      <span style="color:var(--text-muted);margin-left:8px">${posTimeline.join(' → ')}</span>
    </div>`;
  }

  // Transfer history banner
  let transferHTML = '';
  if (hasTransfers) {
    const transferLines = [];
    let lastTeam = null;
    for (const s of seasonData) {
      if (s.teamName !== lastTeam) {
        if (lastTeam) transferLines.push(`<span style="color:var(--text-dim)">→</span>`);
        transferLines.push(`<span style="color:var(--text)">${s.year} ${s.teamName}</span>`);
        lastTeam = s.teamName;
      }
    }
    transferHTML = `<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;display:flex;flex-wrap:wrap;gap:4px;align-items:center">
      <span style="color:var(--text-dim);margin-right:4px">Transfer:</span>${transferLines.join(' ')}
    </div>`;
  }

  // Figure out which stats to show — use the last known position group's keys
  const lastPosGroup = seasonData[seasonData.length - 1].player.positionGroup;
  const careerKeys = CAREER_ADDITIVE[lastPosGroup] || [];
  const statDefs = STAT_LABELS[lastPosGroup] || [];

  // Determine which stat columns actually have data across any season
  const usedStatKeys = careerKeys.filter(k => seasonData.some(s => {
    const v = s.rating.stats?.[k];
    return v != null && v !== 0;
  }));

  // Career totals
  const totals = {};
  for (const k of usedStatKeys) {
    for (const s of seasonData) {
      const v = s.rating.stats?.[k];
      if (v != null && v !== 0) totals[k] = (totals[k] || 0) + v;
    }
  }

  // Build year-by-year table
  const thStyle = 'padding:5px 8px;font-size:10px;color:var(--text-muted);font-weight:600;text-align:right;white-space:nowrap';
  const tdStyle = 'padding:5px 8px;font-size:12px;text-align:right';

  const statHeaders = usedStatKeys.map(k => {
    const lbl = statDefs.find(([sk]) => sk === k)?.[1] || k;
    return `<th style="${thStyle}">${lbl}</th>`;
  }).join('');

  let prevTeam = null;
  const tableRows = seasonData.map(s => {
    const isCurrentYear = s.year === currentYear;
    const pg = s.player.positionGroup;
    const classYr = _yearLabels[Math.min(s.player.year || 1, 5)] || '';
    const teamChanged = prevTeam !== null && s.teamName !== prevTeam;
    prevTeam = s.teamName;
    const teamCell = teamChanged
      ? `<td style="${tdStyle};text-align:left;color:var(--warning);white-space:nowrap" title="Transfer">${s.teamName} ↑</td>`
      : `<td style="${tdStyle};text-align:left;color:var(--text-muted);white-space:nowrap">${s.teamName}</td>`;
    const statCells = usedStatKeys.map(k => {
      const v = s.rating.stats?.[k];
      const display = v != null && v !== 0 ? (typeof v === 'number' && !Number.isInteger(v) ? v.toFixed(1) : v) : '-';
      return `<td style="${tdStyle}">${display}</td>`;
    }).join('');
    const rowStyle = isCurrentYear ? 'background:rgba(88,166,255,0.07);font-weight:600' : '';
    return `<tr style="${rowStyle}${teamChanged ? ';border-top:2px solid rgba(210,153,34,0.4)' : ''}">
      <td style="${tdStyle};text-align:left;font-weight:700">${s.year}</td>
      ${teamCell}
      <td style="${tdStyle};text-align:left;font-size:11px;color:var(--text-muted)">${pg}${classYr ? ' · ' + classYr : ''}</td>
      <td style="${tdStyle}"><span class="ovr" style="background:${ratingColor(s.rating.overall||0)};color:${ratingTextColor(s.rating.overall||0)};font-size:11px;padding:1px 5px">${s.rating.overall||'-'}</span></td>
      ${statCells}
    </tr>`;
  }).join('');

  // Career totals footer row
  const totalCells = usedStatKeys.map(k => {
    const v = totals[k];
    const display = v != null ? (typeof v === 'number' && !Number.isInteger(v) ? v.toFixed(1) : v) : '-';
    return `<td style="${tdStyle};font-weight:700;color:var(--text)">${display}</td>`;
  }).join('');

    </div>
  </div>`;
}

// ── Similarity Score ───────────────────────────────────────────────────────
// Euclidean distance across normalized skill attributes within the same
// position group. Returns top N most similar players sorted by similarity.
function computeSimilar(pid, posGroup, rMap, allPlayers, allTeams, n = 6) {
  const skills = (SKILL_ATTRS[posGroup] || []).map(([k]) => k);
  if (!skills.length) return [];

  const ref = rMap[pid];
  if (!ref) return [];

  // Build team map for name lookup
  const tMap = {};
  allTeams.forEach(t => tMap[t.id] = t);

  // Normalize each skill to 0–1 across all players in this position group
  // to give equal weight regardless of rating scale differences
  const peers = allPlayers.filter(p => p.positionGroup === posGroup && String(p.id) !== pid);

  const results = peers.map(p => {
    const r = rMap[String(p.id)];
    if (!r) return null;
    // Euclidean distance in skill space (each skill equally weighted)
    let distSq = 0;
    for (const sk of skills) {
      const diff = (ref[sk] || 0) - (r[sk] || 0);
      distSq += diff * diff;
    }
    const dist = Math.sqrt(distSq / skills.length);  // RMS distance, 0–59 scale
    const similarity = Math.max(0, Math.round(100 - dist * 100 / 59));
    return { p, r, similarity, team: tMap[p.teamId] || {} };
  }).filter(Boolean);

  // Sort by similarity desc, exclude self, take top N
  results.sort((a, b) => b.similarity - a.similarity);
  // Filter to meaningful matches: OVR within ±15 of reference
  const refOvr = ref.overall || 0;
  return results.filter(x => Math.abs((x.r.overall || 0) - refOvr) <= 15).slice(0, n);
}

let _mapInstance = null;
let _mapData = null;
let _mapMarkerLayer = null;
let _mapSchool = 'All';
let _mapPos = 'All';
let _mapShowR = true;
let _mapShowT = true;

const MAP_COLORS = {
  recruit: '#E8A800',
  xferIn:  '#3db87a',
  xferOut: '#e03b2e',
  xferAll: '#6da8d8',
};
const MAP_POSITIONS = ['All','QB','RB','WR','TE','DL','EDGE','LB','CB','S','ATH','K','P','IOL','OT','OG','OC'];

async function renderMap() {
  const el = document.getElementById('tab-content');
  el.innerHTML = `<div id="portal-map-wrap" style="display:flex;height:100%;position:relative;overflow:hidden">
    <div id="portal-map-sidebar" style="width:260px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;font-size:13px"></div>
    <div style="flex:1;position:relative">
      <div id="portal-map" style="width:100%;height:100%"></div>
      <div id="portal-map-card" style="display:none;position:absolute;bottom:20px;right:20px;width:270px;background:var(--surface);border:1px solid var(--border-mid);border-radius:6px;padding:14px 16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5)"></div>
    </div>
  </div>`;

  if (!_mapData) {
    const [recruits, transfers] = await Promise.all([
      fetch('app/assets/data/map/recruits.json').then(r=>r.json()),
      fetch('app/assets/data/map/transfers.json').then(r=>r.json()),
    ]);
    _mapData = { recruits, transfers };
  }

  if (!_mapInstance) {
    const theme = document.documentElement.getAttribute('data-theme') || '';
    const tileUrl = theme === 'dark' || theme === ''
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
    _mapInstance = L.map('portal-map', {center:[38.5,-96], zoom:4, zoomControl:false, preferCanvas:true});
    L.tileLayer(tileUrl, {attribution:'© OpenStreetMap © CARTO', maxZoom:19}).addTo(_mapInstance);
    L.control.zoom({position:'bottomright'}).addTo(_mapInstance);
    _mapMarkerLayer = L.layerGroup().addTo(_mapInstance);
  } else {
    setTimeout(() => _mapInstance.invalidateSize(), 60);
  }

  _renderMapSidebar();
  _renderMapMarkers();
}

function _renderMapSidebar() {
  const { recruits, transfers } = _mapData;
  const schools = new Set(['All']);
  recruits.forEach(r => { if (r.committedTo) schools.add(r.committedTo); });
  transfers.forEach(t => { if (t.origin) schools.add(t.origin); if (t.dest) schools.add(t.dest); });
  const schoolList = Array.from(schools).sort((a,b) => a==='All'?-1:a.localeCompare(b));

  const fR = _mapFilteredRecruits();
  const fT = _mapFilteredTransfers();
  const tIn  = _mapSchool === 'All' ? fT : fT.filter(t => t.dest === _mapSchool);
  const tOut = _mapSchool === 'All' ? [] : fT.filter(t => t.origin === _mapSchool && t.dest !== _mapSchool);
  const net  = tIn.length - tOut.length;

  const sel = (id, val, opts, onch) => `<select id="${id}" style="width:100%;padding:8px 10px;background:var(--input-bg);border:1px solid var(--border-mid);color:var(--text);font-size:13px;border-radius:4px;outline:none" onchange="${onch}">${opts.map(o=>`<option value="${o}"${o===val?' selected':''}>${o}</option>`).join('')}</select>`;
  const lbl = t => `<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">${t}</div>`;
  const sec = c => `<div style="padding:12px 14px;border-bottom:1px solid var(--border)">${c}</div>`;
  const tog = (id, active, color, label, count, fn) => `<div onclick="${fn}" style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:4px;cursor:pointer;border:1px solid ${active?'var(--border)':'transparent'};background:${active?'rgba(255,255,255,0.04)':'transparent'}"><div style="width:9px;height:9px;border-radius:50%;background:${active?color:'var(--border-mid)'};flex-shrink:0"></div><span style="flex:1;font-weight:600;color:${active?'var(--text)':'var(--text-muted)'}">${label}</span><span style="font-size:12px;font-weight:700;color:${active?color:'var(--text-muted)'}">${count}</span></div>`;
  const stat = (val, label, color) => `<div style="background:var(--surface-deep);border-left:3px solid ${color};border-radius:4px;padding:10px 12px"><div style="font-size:26px;font-weight:800;color:${color};line-height:1">${val}</div><div style="font-size:11px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-top:5px;font-weight:600">${label}</div></div>`;

  document.getElementById('portal-map-sidebar').innerHTML = `
    <div style="padding:16px 14px 12px;border-bottom:1px solid var(--border)">
      <div style="font-size:22px;font-weight:800;letter-spacing:0"><span style="color:var(--text)">Portal</span><span style="color:var(--accent)">Flow</span></div>
      <div style="width:32px;height:3px;background:var(--accent);border-radius:2px;margin:6px 0 4px"></div>
      <div style="font-size:11px;color:var(--text-muted);letter-spacing:1.5px;font-weight:700;text-transform:uppercase">CFB Recruiting &amp; Portal · 2026</div>
      <div style="margin-top:6px;font-size:10px;color:var(--text-dim)">Map data currently available for 2026 only. Multi-year support coming when pipeline generates geocoded data per season.</div>
    </div>
    ${sec(lbl('School') + sel('map-school', _mapSchool, schoolList, '_mapSetSchool(this.value)'))}
    ${sec(lbl('Position') + sel('map-pos', _mapPos, MAP_POSITIONS, '_mapSetPos(this.value)'))}
    ${sec(lbl('Layers') + tog('r', _mapShowR, MAP_COLORS.recruit, '2026 Recruits', fR.length, '_mapToggleR()') + tog('t', _mapShowT, MAP_COLORS.xferAll, 'Transfers', fT.length, '_mapToggleT()'))}
    <div style="padding:12px 14px">
      ${lbl(_mapSchool === 'All' ? 'All Schools' : _mapSchool)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        ${stat(fR.length.toLocaleString(), '2026 Recruits', MAP_COLORS.recruit)}
        ${stat(fT.length.toLocaleString(), 'Total Transfers', MAP_COLORS.xferAll)}
        ${stat(tIn.length.toLocaleString(), 'Transfers In', MAP_COLORS.xferIn)}
        ${stat(tOut.length.toLocaleString(), 'Transfers Out', MAP_COLORS.xferOut)}
        ${_mapSchool !== 'All' ? `<div style="grid-column:span 2">${stat((net>0?'+':'')+net, 'Net Portal', net>0?MAP_COLORS.xferIn:net<0?MAP_COLORS.xferOut:'var(--text-muted)')}</div>` : ''}
      </div>
    </div>`;
}

function _mapFilteredRecruits() {
  if (!_mapData || !_mapShowR) return [];
  return _mapData.recruits.filter(r =>
    (_mapSchool === 'All' || r.committedTo === _mapSchool) &&
    (_mapPos === 'All' || r.pos === _mapPos) &&
    r.lat && r.lon
  );
}

function _mapFilteredTransfers() {
  if (!_mapData || !_mapShowT) return [];
  return _mapData.transfers.filter(t =>
    (_mapSchool === 'All' || t.origin === _mapSchool || t.dest === _mapSchool) &&
    (_mapPos === 'All' || t.pos === _mapPos) &&
    t.lat && t.lon
  );
}

function _renderMapMarkers() {
  if (!_mapInstance || !_mapMarkerLayer) return;
  _mapMarkerLayer.clearLayers();
  const renderer = L.canvas({ padding: 0.5 });

  _mapFilteredRecruits().forEach(r => {
    const m = L.circleMarker([r.lat, r.lon], {renderer, radius:5, fillColor:MAP_COLORS.recruit, color:'rgba(255,255,255,0.15)', weight:1, fillOpacity:0.85});
    m.on('click', () => _showMapCard(r));
    _mapMarkerLayer.addLayer(m);
  });
  _mapFilteredTransfers().forEach(t => {
    let col = MAP_COLORS.xferAll;
    if (_mapSchool !== 'All') col = t.dest === _mapSchool ? MAP_COLORS.xferIn : MAP_COLORS.xferOut;
    const m = L.circleMarker([t.lat, t.lon], {renderer, radius:5, fillColor:col, color:'rgba(255,255,255,0.15)', weight:1, fillOpacity:0.85});
    m.on('click', () => _showMapCard(t));
    _mapMarkerLayer.addLayer(m);
  });
}

      <div style="font-size:12px;color:var(--text-muted);margin-top:6px">${p.city||''}${p.state?', '+p.state:''} · Class of ${p.year||2026}</div>
    `}`;
}

function _mapSetSchool(v) { _mapSchool = v; _renderMapSidebar(); _renderMapMarkers(); }
